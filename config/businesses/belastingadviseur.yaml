faqs:
  - question: "Wanneer moet ik aangifte inkomstenbelasting doen?"
    answer: "De aangifte inkomstenbelasting moet in beginsel vóór 1 mei van het jaar volgend op het belastingjaar worden ingediend. Via uw belastingadviseur kan uitstel worden aangevraagd, doorgaans tot 1 september of later via de uitstelregeling. Wij adviseren u zo vroeg mogelijk te beginnen om optimale aftrekposten te kunnen benutten."
  - question: "Kan ik bezwaar maken tegen mijn belastingaanslag?"
    answer: "Ja, u heeft zes weken de tijd na de dagtekening van de aanslag om bezwaar te maken bij de Belastingdienst. Na afwijzing kunt u in beroep bij de belastingrechter. Menno heeft ruime ervaring met bezwaar- en beroepsprocedures en beoordeelt graag uw kansen. Wacht niet te lang, want de termijnen zijn strikt."
  - question: "Wat is de 30%-regeling voor expats?"
    answer: "De 30%-regeling is een fiscaal voordeel voor werknemers die vanuit het buitenland naar Nederland zijn gehaald voor een specifieke deskundigheid. U mag dan 30% van uw loon belastingvrij ontvangen als vergoeding voor extraterritoriale kosten. De regeling heeft een maximale looptijd en strikte toelatingsvoorwaarden. Ons team Internationale Zaken adviseert u hier graag over."
  - question: "Ik heb een naheffingsaanslag btw ontvangen, wat nu?"
    answer: "Een naheffingsaanslag betekent dat de Belastingdienst van mening is dat u te weinig btw heeft betaald. Judith beoordeelt de aanslag op juistheid en begeleid u bij het eventueel indienen van bezwaar. In veel gevallen zijn er gronden om de aanslag te verminderen of te vernietigen."
  - question: "Hoe kan ik als DGA mijn belastingdruk optimaliseren?"
    answer: "Als directeur-grootaandeelhouder zijn er meerdere mogelijkheden: optimaal gebruikmaken van het salaris-dividendsaldo, de Fiscale Oudedagsreserve (FOR) of pensioen in eigen beheer, holdingstructuren en investeringsaftrekken. Menno maakt graag een persoonlijke fiscale analyse voor u."
  - question: "Kunnen jullie ook de belastingaangifte van mijn BV verzorgen?"
    answer: "Ja, wij verzorgen de volledige vennootschapsbelastingaangifte (VPB) voor BV's en NV's. Dit omvat ook de aansluiting met de jaarrekening, de aangifte dividendbelasting en de optimalisatie van de belastbare winst door gebruik van toegestane aftrekposten en faciliteiten zoals de innovatiebox."
  - question: "Wat is transfer pricing en wanneer is het van toepassing?"
    answer: "Transfer pricing betreft de prijsvaststelling van transacties tussen gelieerde partijen binnen een concern, zoals leningen, royalty's of diensten. De Belastingdienst eist dat deze prijzen zakelijk zijn (at arm's length). Bij internationale concernrelaties is documentatie verplicht. Ons team Internationale Zaken stelt de vereiste documentatie op."
  - question: "Hoe lang bewaren jullie mijn belastinggegevens?"
    answer: "Wij bewaren uw fiscale dossiers conform de wettelijke bewaarplicht van minimaal zeven jaar (tien jaar voor internationale btw-dossiers). Uw gegevens worden strikt vertrouwelijk behandeld conform onze beroepsregels en de AVG. Na afloop van de bewaartermijn worden gegevens veilig vernietigd."
  - question: "Kan ik ook terecht voor erfbelasting?"
    answer: "Ja, wij adviseren en verzorgen de aangifte erfbelasting na een overlijden. Wij beoordelen de nalatenschap, maken gebruik van beschikbare vrijstellingen en optimaliseren de belastingdruk op de erfenis. Dit doen wij in nauwe samenwerking met de notaris die de erfenis afwikkelt."


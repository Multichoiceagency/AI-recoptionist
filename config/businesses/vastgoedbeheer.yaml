faqs:
  - question: "Wat is een MJOP en ben ik verplicht er een te hebben?"
    answer: "Een MJOP is een Meerjarenonderhoudsplan. Hierin staat welk onderhoud uw VVE de komende 10 tot 30 jaar verwacht en hoeveel geld daarvoor gereserveerd moet worden. Wettelijk is iedere VVE verplicht een reservefonds aan te houden. Het hebben van een goed MJOP is de basis voor een gezond reservefonds. ProBeheer stelt MJOP's op en bewaakt de reserveopbouw."

  - question: "Hoe meld ik een onderhoudsprobleem of storing?"
    answer: "U kunt een melding telefonisch doorgeven aan Yvonne, via onze e-mail of via het online portaal op onze website. Elke melding krijgt een meldingsnummer en wordt direct opgepakt door de Technische Dienst. Wij streven naar een reactietijd van 2 werkdagen voor regulier onderhoud en 4 uur voor spoedsituaties."

  - question: "Wat kost VVE-beheer bij ProBeheer?"
    answer: "Onze tarieven voor VVE-beheer starten vanaf 25 euro per appartement per maand inclusief BTW voor het basispakket. Grotere complexen of all-in pakketten hebben een ander tarief. Wij maken altijd een maatwerkofferte na een kennismakingsgesprek en inventarisatie van uw complex."

  - question: "Kunnen jullie ook bestaand beheer overnemen van een andere beheerder?"
    answer: "Ja, dat doen wij regelmatig. Marc Hendriksen begeleidt de volledige overstaptraject, inclusief dossieroverdracht, kennismaking met het bestuur en de eerste vergadering. Wij zorgen voor een naadloze overgang met minimale administratieve rompslomp voor het VVE-bestuur."

  - question: "Wat houdt de 24/7 storingsdienst in?"
    answer: "Onze storingsdienst is bereikbaar via het storingsnummer op uw VVE-informatiekaart, buiten kantooruren. Voor spoedsituaties als een actieve lekkage, liftopsluiting of stroomuitval reageren wij direct. Een medewerker van de Technische Dienst wordt ingeschakeld en organiseert noodmaatregelen."

  - question: "Hoe wordt de jaarlijkse VVE-vergadering georganiseerd?"
    answer: "Marc Hendriksen stelt de agenda op samen met het bestuur, verstuurt de uitnodigingen tijdig, begeleidt de vergadering en stelt daarna de officiële notulen op. Alle besluiten worden vastgelegd en wij bewaken de uitvoering ervan."

  - question: "Beheren jullie ook individueel verhuurvastgoed naast VVE's?"
    answer: "Ja. Wij bieden ook technisch en financieel beheer voor particuliere verhuurders met één of meerdere woningen of bedrijfspanden. Dit omvat huurincasso, onderhoudscoördinatie en servicekosten-afrekeningen. Neem contact op voor een maatwerkofferte."

  - question: "Kunnen jullie helpen bij de aanvraag van subsidies voor energiebesparing?"
    answer: "Zeker. ProBeheer begeleidt VVE's bij subsidieaanvragen voor collectieve zonnepanelen, gevelisolatie, dakisolatie en warmtepompen. Wij hebben ervaring met de ISDE, SDE en gemeentelijke subsidies en werken samen met gecertificeerde energieadviseurs."

  - question: "Wat als eigenaren hun VVE-bijdrage niet betalen?"
    answer: "Wij sturen herinneringen en aanmaningen namens het VVE-bestuur. Bij blijvende wanbetaling schakelen wij de incassoprocedure in via onze juridische partner. Uiteindelijk kan de rechter bepalen dat het appartement executoriaal wordt verkocht om de schuld te voldoen."


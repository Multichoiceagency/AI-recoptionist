after_hours_message: |
  U belt buiten de kantooruren van ProBeheer Vastgoed. Onze kantoortijden zijn maandag tot en met
  donderdag van 9 tot 17:30 uur en vrijdag van 9 tot 17 uur. Voor spoedsituaties zoals een actieve
  lekkage of een liftopsluiting kunt u onze 24/7 storingslijn bereiken via het storingsnummer dat
  vermeld staat op uw VVE-informatiekaart. Voor reguliere meldingen kunt u een bericht achterlaten
  met uw naam, adres, VVE-naam en omschrijving van uw vraag.


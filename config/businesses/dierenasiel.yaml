after_hours_message: |
  U heeft Dierenasiel De Pootafdruk bereikt buiten onze openingstijden. We zijn geopend dinsdag tot en met
  zondag van 12:00 tot 17:00 uur. Op maandag zijn wij gesloten. Bij een gevonden dier dat medische nood heeft,
  kunt u contact opnemen met de dierenambulance of een dierenarts. Heeft u een niet-dringende melding,
  stuur dan een e-mail naar info@depootafdruk.nl met een foto en omschrijving. Wilt u een bericht achterlaten?
  We nemen dan zo spoedig mogelijk contact met u op.


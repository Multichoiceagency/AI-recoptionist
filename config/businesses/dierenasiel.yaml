faqs:
  - question: "Hoe verloopt een adoptie bij jullie?"
    answer: "Een adoptie bij De Pootafdruk verloopt zorgvuldig. Eerst een kennismakingsgesprek met Simone, daarna een bezoek aan het asiel om het dier te leren kennen. We doen een huisbezoek als dat passend is. Na akkoord regelen we de adoptieovereenkomst en bieden we nazorg. Het welzijn van het dier staat altijd centraal."
  - question: "Ik heb een dier gevonden, wat moet ik doen?"
    answer: "Breng het dier naar ons asiel of bel ons direct. We registreren het dier in ons systeem en koppelen het aan onze databank van vermiste dieren. Als het dier gechipped is, kunnen we de eigenaar snel achterhalen. Zorg dat het dier veilig is en warm tot u bij ons kunt zijn."
  - question: "Welke dieren hebben jullie momenteel in het asiel?"
    answer: "Ons aanbod wisselt regelmatig. We hebben altijd honden, katten en diverse kleine dieren in ons asiel. Op onze website staan alle dieren met foto, naam en verhaal. Ik adviseer u altijd om online een kijkje te nemen en daarna een bezoek te plannen om het dier in het echt te ontmoeten."
  - question: "Kan ik ook een pleeggezin worden?"
    answer: "Jazeker! Pleeggezinnen zijn ontzettend waardevol voor ons. U vangt tijdelijk een dier op tijdens herstel, socialisatie of wachttijd op een adoptiethuis. We verzorgen het voer, de medische kosten en begeleiden u volledig. Het is een geweldige manier om dieren te helpen zonder definitieve adoptie."
  - question: "Hoe kan ik doneren aan het asiel?"
    answer: "We zijn dankbaar voor elke vorm van steun. U kunt financieel doneren via onze website, goederen afbrengen zoals voer, dekens of speelgoed, of vriend van De Pootafdruk worden via een maandelijkse bijdrage. Grote giften zijn ook aftrekbaar via onze ANBI-status."
  - question: "Hoe kan ik vrijwilliger worden?"
    answer: "We kunnen altijd enthousiaste vrijwilligers gebruiken. Taken zijn onder andere het uitlaten van honden, socialiseren van katten, hulp bij evenementen en administratieve ondersteuning. Stuur uw interesse naar vrijwilligers@depootafdruk.nl en we plannen een kennismakingsgesprek."
  - question: "Mijn dier is vermist, kunnen jullie helpen?"
    answer: "Ja. Meld uw vermiste dier bij ons — we registreren de beschrijving in ons systeem en koppelen het aan gevonden dierenmeldingen. Stuur ook een foto via e-mail. Controleer ook de gemeentelijke meldpunten, dierenartsen in de omgeving en plaats een melding op Amivedi.nl."
  - question: "Zijn de dieren gevaccineerd en gesteriliseerd?"
    answer: "Ja, alle dieren die bij ons geadopteerd worden zijn ingeënt, gesteriliseerd of gecastreerd en microchipped. Medische kosten tijdens het verblijf in het asiel zijn voor onze rekening. U adopteert dus een dier dat klaar is voor zijn nieuwe leven."
  - question: "Kan ik ook een bejaarde hond of kat adopteren?"
    answer: "Ouderen in het asiel worden vaak overgeslagen, maar zijn heerlijke huisdieren: rustiger, getraind en dankbaar. We promoten senior adoptie actief. Heeft u interesse in een ouder dier, dan vertelt Simone u graag meer over de dieren die al lang op een thuis wachten."


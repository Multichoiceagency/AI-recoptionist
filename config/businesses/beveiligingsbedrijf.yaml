after_hours_message: |
  U heeft SecureNL Beveiliging & Alarm bereikt buiten onze kantooruren. Ons kantoor is bereikbaar maandag tot en met
  vrijdag van 08:00 tot 17:30 uur en op zaterdag van 09:00 tot 13:00 uur. Bij een actief alarm of noodsituatie
  wordt u doorgeschakeld naar onze 24/7 meldkamer. Voor storingen aan uw beveiligingssysteem kunt u onze storingslijn
  bellen. Wilt u een bericht achterlaten? Wij nemen dan de eerstvolgende werkdag contact met u op.


faqs:
  - question: "Wat kost een alarmsysteem bij jullie?"
    answer: "De kosten zijn afhankelijk van de grootte van het pand, het type systeem en de gewenste functies. We starten altijd met een gratis beveiligingsscan bij u op locatie, zodat onze adviseur een passend systeem en een eerlijke offerte kan opstellen. Zal ik een afspraak inplannen?"
  - question: "Zijn jullie gecertificeerd?"
    answer: "Ja, SecureNL is Kiwa-gecertificeerd en CCV-gecertificeerd. Dit betekent dat onze systemen erkend worden door alle grote Nederlandse verzekeraars en dat onze installateurs voldoen aan de hoogste kwaliteitseisen."
  - question: "Werken jullie ook met een meldkamer?"
    answer: "Ja, wij koppelen uw alarmsysteem aan een gecertificeerde 24/7 meldkamer. Bij een alarmmelding wordt uw locatie binnen 60 seconden beoordeeld en worden indien nodig de hulpdiensten of een beveiligingsreactie gestuurd."
  - question: "Mijn alarm gaat steeds af zonder reden, wat kan ik doen?"
    answer: "Valse alarmen kunnen verschillende oorzaken hebben: een te gevoelige detector, een bewegend voorwerp zoals een gordijn, of een technisch defect. Ik verbind u graag door met onze technische afdeling om een storingsdienst in te plannen."
  - question: "Kunnen jullie ook camera's installeren?"
    answer: "Zeker. We installeren professionele IP-camerasystemen met nachtzichtfunctie, bewegingsdetectie en cloudopslag. Zowel voor particulieren als voor bedrijven, binnen en buiten. We adviseren u graag over de meest geschikte opstelling voor uw situatie."
  - question: "Wat is de reactietijd als mijn alarm afgaat?"
    answer: "Onze meldkamer reageert binnen 60 seconden op een alarmmelding. Afhankelijk van uw abonnement sturen we een beveiligingsreactie, bellen we u of de politie, of een combinatie hiervan. Contractklanten hebben prioriteit."
  - question: "Kunnen jullie ook zakelijke panden beveiligen?"
    answer: "Ja, een groot deel van onze klanten zijn bedrijven, kantoren, magazijnen en winkels. We bieden geïntegreerde oplossingen met inbraakdetectie, camerabewaking, toegangscontrole en 24/7 monitoring, afgestemd op uw bedrijfsprocessen."
  - question: "Doen jullie ook onderhoud aan bestaande systemen?"
    answer: "Ja, we onderhouden ook systemen die niet door ons zijn geïnstalleerd. We voeren een keuring uit en brengen het systeem zo nodig up-to-date. Dit is ook vereist voor de meeste verzekeringen. Jaarlijks onderhoud is inbegrepen in ons monitoring-abonnement."
  - question: "Wat moet ik doen als ik mijn alarmcode ben vergeten?"
    answer: "Belt u ons direct. Wij kunnen via uw klantprofiel uw identiteit verifiëren en u begeleiden bij het herstellen van uw code. Om veiligheidsredenen doen wij dit altijd telefonisch en nooit via e-mail of berichten."


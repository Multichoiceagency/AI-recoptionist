after_hours_message: |
  Zorgcentrum De Linde is momenteel niet telefonisch bereikbaar. Onze kantoortijden zijn maandag
  tot en met vrijdag van 08:00 tot 17:00 uur. Voor bewoners en hun families die urgente zorg
  nodig hebben buiten kantooruren: het zorgpersoneel in onze locaties is 24/7 aanwezig en
  bereikbaar via de locatietelefoon. Voor algemene vragen kunt u een bericht inspreken of
  een e-mail sturen — wij nemen de eerstvolgende werkdag contact op.


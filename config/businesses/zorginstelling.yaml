faqs:
  - question: "Hoe kan mijn ouder bij jullie opgenomen worden?"
    answer: "Voor opname in ons zorgcentrum is een WLZ-indicatie via het CIZ nodig. We helpen u graag bij de aanvraag en kunnen een intakegesprek inplannen met onze Coördinator Zorg om de mogelijkheden te bespreken."
  - question: "Wat is het verschil tussen een verzorgingshuis en een verpleeghuis?"
    answer: "In een verzorgingshuis woont u zelfstandig maar met ondersteuning bij dagelijkse activiteiten. Een verpleeghuis biedt intensievere medische en verpleegkundige zorg voor mensen met complexere zorgbehoeften."
  - question: "Bieden jullie ook thuiszorg aan?"
    answer: "Ja, we bieden diverse vormen van thuiszorg aan: persoonlijke verzorging, verpleging aan huis, huishoudelijke ondersteuning en nachtzorg. Hiervoor is doorgaans een WMO-indicatie van de gemeente vereist."
  - question: "Wat is respijtzorg en hoe vraag ik dat aan?"
    answer: "Respijtzorg biedt mantelzorgers tijdelijke ontlasting door de zorg tijdelijk over te nemen. Dit kan dagopvang zijn of kortdurend verblijf. Bel ons voor een gesprek over de mogelijkheden en de aanvraagprocedure."
  - question: "Mijn vader heeft dementie — kunnen jullie helpen?"
    answer: "Ja, wij zijn gespecialiseerd in dementiezorg. We bieden dagopvang, thuisbegeleiding, casemanagement en indien nodig opname in onze psychogeriatrische afdeling. We begeleiden ook de naasten."
  - question: "Hoe lang zijn de wachttijden voor opname?"
    answer: "Wachttijden voor intramurale opname variëren afhankelijk van de zorgzwaarte en beschikbaarheid. Bij acute situaties of een onveilige thuissituatie bekijken we altijd of er urgentieprocedures mogelijk zijn."
  - question: "Kunnen jullie ook helpen met het aanvragen van een zorgindicatie?"
    answer: "Ja, onze Coördinator Zorg en Sociaal Werker ondersteunen u bij het aanvragen van een WMO-indicatie (gemeente) of WLZ-indicatie (CIZ). We begeleiden u stap voor stap door de aanvraagprocedure."
  - question: "Bieden jullie ook ondersteuning aan mantelzorgers?"
    answer: "Absoluut. Ons mantelzorgondersteuningsteam biedt emotionele steun, praktische tips, cursussen en lotgenotencontact voor mantelzorgers. Mantelzorgen is zwaar — u hoeft het niet alleen te doen."
  - question: "Kunnen bewoners ook bezoek ontvangen?"
    answer: "Ja, bezoek is altijd welkom. We hanteren flexibele bezoektijden. Neem voor specifieke afspraken of vragen over bezoekbeleid contact op met de receptie van de betreffende locatie."
  - question: "Bieden jullie palliatieve zorg aan?"
    answer: "Ja, we bieden specialistische palliatieve zorg en terminale begeleiding, zowel thuis als in onze locaties. Hierbij staat comfort, waardigheid en betrokkenheid van naasten centraal."


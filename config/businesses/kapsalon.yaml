after_hours_message: |
  Goedendag, u heeft Kapsalon Chique Haar in Haarlem gebeld. Op dit moment zijn wij gesloten.
  Wij zijn open van dinsdag tot en met vrijdag van 09:00 tot 20:00 uur en op zaterdag van 08:00 tot 18:00 uur.
  Maandag en zondag zijn wij gesloten.
  Wilt u een afspraak maken? Spreek uw naam, telefoonnummer en gewenste behandeling in na de toon,
  dan bellen wij u de eerstvolgende werkdag terug.
  U kunt ook online een afspraak inplannen via onze website. Wij kijken ernaar uit u te verwelkomen!


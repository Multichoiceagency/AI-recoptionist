faqs:
  - question: "Hoe maak ik een afspraak?"
    answer: "U kunt bellen tijdens onze openingstijden of online een afspraak inplannen via onze website. Voor complexe behandelingen zoals extensies of kleurcorrectie raden wij aan telefonisch contact op te nemen."
  - question: "Wat zijn jullie openingstijden?"
    answer: "Wij zijn open van dinsdag tot en met vrijdag van 09:00 tot 20:00 uur en op zaterdag van 08:00 tot 18:00 uur. Op maandag en zondag zijn wij gesloten."
  - question: "Hoe lang duurt een kleurbehandeling zoals balayage?"
    answer: "Een balayage behandeling duurt doorgaans 2,5 tot 3,5 uur, afhankelijk van de haarlengte en de gewenste intensiteit. We adviseren u altijd een langere afspraak in te plannen zodat we de tijd nemen voor een perfect resultaat."
  - question: "Werken jullie met Olaplex?"
    answer: "Ja, wij zijn gecertificeerd Olaplex-salon. Olaplex repareert beschadigde haarbanden en geeft uw haar meer glans en sterkte. Het kan worden toegevoegd aan elke kleurbehandeling of als zelfstandige behandeling."
  - question: "Kunnen jullie ook bruidsstyling verzorgen?"
    answer: "Ja! Stylist Vivienne is gespecialiseerd in bruidsstyling. Wij plannen altijd een proef-styling afspraak minimaal 6 weken voor de grote dag. Neem vroeg contact op, want bruidsdatums zijn snel volgeboekt."
  - question: "Bieden jullie extensies aan?"
    answer: "Ja, onze Extensie Specialist werkt met tape-in extensies van professionele kwaliteit. We bieden altijd een adviesgesprek aan voordat de extensies worden geplaatst, om de juiste kleur en lengte te bepalen."
  - question: "Kunnen jullie ook kinderen knippen?"
    answer: "Ja, wij knippen kinderen vanaf 3 jaar. We nemen de tijd en gaan rustig te werk zodat ook de kleinsten zich op hun gemak voelen. Bel voor een afspraak tijdens rustige uren op de dag."
  - question: "Wat is het annuleringsbeleid?"
    answer: "Wij vragen u een afspraak minimaal 24 uur van tevoren te annuleren. Bij latere annulering of no-show kunnen wij een vergoeding van 50% van de behandelingskosten in rekening brengen."
  - question: "Gebruiken jullie professionele producten?"
    answer: "Ja, wij werken uitsluitend met professionele producten van L'Oréal Professionnel, Wella Professionals en Olaplex. Wij verkopen deze producten ook in de salon voor thuisgebruik."


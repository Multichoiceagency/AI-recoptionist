faqs:
  - question: "Wanneer is de showroom open?"
    answer: "Onze showroom in Eindhoven is geopend dinsdag tot en met vrijdag van 10:00 tot 18:00 uur, zaterdag van 10:00 tot 17:00 uur en zondag van 12:00 tot 17:00 uur. Op maandag zijn we gesloten. Voor interieuradvies raden wij u aan vooraf een afspraak te maken met Lisa."
  - question: "Kunnen jullie ook meubelen op maat maken?"
    answer: "Ja, we hebben een eigen maatwerkstudio voor kasten, wandsystemen en keukens. U kunt een afspraak maken met onze maatwerkadviseur Gerrit, die u begeleidt van ontwerp tot plaatsing. Maatwerk heeft een levertijd van 6 tot 10 weken afhankelijk van het product."
  - question: "Leveren jullie ook buiten Eindhoven?"
    answer: "Ja, we bezorgen door heel Nederland. In Eindhoven en directe omgeving werken we met onze eigen bezorgdienst. Voor de rest van Nederland werken we samen met een gespecialiseerde meubeltransporteur. De bezorgkosten zijn afhankelijk van de afstand en de orderomvang."
  - question: "Bieden jullie ook interieuradvies aan huis?"
    answer: "Ja, onze interieuradviseur Lisa biedt huisbezoeken aan voor een persoonlijk interieuradvies. Het eerste gesprek in de showroom is altijd gratis en vrijblijvend. Een huisbezoek is een betaalde dienst, maar de kosten worden verrekend bij een aankoop."
  - question: "Kan ik ook stofstalen aanvragen?"
    answer: "Uiteraard. U kunt stofstalen en materiaalmonsterse aanvragen via onze website of ophalen in de showroom. Voor grote projecten kunnen we ook een uitgebreide materialenmap samenstellen. Geeft u aan welke producten u bekijkt, dan selecteer ik de juiste stalen voor u."
  - question: "Wat is de levertijd van meubelen?"
    answer: "De levertijd verschilt per product en merk. Standaardmeubelen hebben doorgaans een levertijd van 4 tot 8 weken. Sommige producten zijn uit voorraad leverbaar. Maatwerk heeft een levertijd van 6 tot 10 weken. Ik check de actuele levertijd voor uw specifieke product graag."
  - question: "Hebben jullie ook een outlet of aanbiedingen?"
    answer: "Ja, in onze outlet-afdeling vindt u showroommodellen en restpartijen met kortingen tot 40%. Het aanbod wisselt regelmatig. We sturen ook een nieuwsbrief met nieuwe outlet-producten aan onze vaste klanten. Mag ik u aanmelden?"
  - question: "Hoe werkt de retourregeling?"
    answer: "Standaardproducten kunnen worden geretourneerd binnen 14 dagen na levering, mits ongebruikt en in originele verpakking. Maatwerkproducten zijn uitgesloten van retour. Heeft u een probleem met een geleverd product? Neem dan altijd contact met ons op — we zoeken altijd naar een passende oplossing."


after_hours_message: |
  U heeft Meubelhuis De Stijl bereikt buiten onze openingstijden. Onze showroom is geopend dinsdag tot en met
  vrijdag van 10:00 tot 18:00 uur, zaterdag van 10:00 tot 17:00 uur en zondag van 12:00 tot 17:00 uur.
  Op maandag zijn wij gesloten. U kunt ook een bericht sturen naar info@destijl.nl of onze website bezoeken
  op www.meubelhuisdestijl.nl. Wilt u een bericht achterlaten? Wij nemen dan contact met u op.


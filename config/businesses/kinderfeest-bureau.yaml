faqs:
  - question: "Welke leeftijdsgroep is geschikt voor welk entertainment?"
    answer: "Clown Pipi is het populairst bij kinderen van 3 tot 7 jaar met zijn grappige acts en ballonnen. De goochelshow van Max is perfect voor 6 tot 12 jaar. Workshops en de scienceshow werken het beste voor 5 tot 12 jaar. Voor de kleinsten tot 5 jaar adviseren we altijd de clown of een eenvoudige workshop."
  - question: "Hoeveel kinderen kunnen jullie aan?"
    answer: "Dat hangt af van het gekozen entertainment. Een clownsact of goochelshow is geschikt voor groepen van 10 tot 40 kinderen. Workshops werken het beste met maximaal 20 kinderen voor optimale aandacht. Voor grotere groepen kunnen we twee shows of meerdere workshops plannen."
  - question: "Komen jullie ook bij ons thuis?"
    answer: "Ja, de meeste acts komen gewoon bij u thuis of in de tuin. We vragen alleen dat er voldoende ruimte is voor de show of activiteit. In de winter of bij slecht weer werken we ook in een huiskamer — we zijn flexibel. Voor springkastelen hebben we minimaal 5x5 meter vrije buitenruimte nodig."
  - question: "Wat kost een kinderfeestje bij FeestBeest?"
    answer: "Onze pakketten beginnen bij het Basis Pakket voor 1,5 uur entertainment. Het Premium Pakket biedt 3 uur met twee activiteiten en decoratie. Het VIP Pakket is een volledig verzorgd feest van 4 uur. Exacte prijzen staan op onze website en ik stuur ze ook graag per e-mail toe."
  - question: "Hoe ver van tevoren moet ik boeken?"
    answer: "Wij adviseren minimaal 4 tot 6 weken van tevoren te boeken, zeker voor zaterdagen en populaire data zoals verjaardagen in de schoolvakanties. Clown Pipi en Goochelaar Max zijn zeer populair en raken snel volgeboekt. Vroeg boeken = zeker zijn."
  - question: "Wat als het feestje wordt geannuleerd?"
    answer: "Bij annulering meer dan 4 weken voor het feest ontvangt u de aanbetaling volledig terug. Bij annulering korter dan 4 weken geldt een annuleringsvergoeding van 50%. Bij overmacht (zoals ziekte) kijken we altijd naar een passende oplossing of verzetting van de datum."
  - question: "Kunnen jullie ook iets doen op school of voor een kinderclubfeest?"
    answer: "Absoluut! We verzorgen ook schoolactiviteiten, clubfeesten, buurtfeesten en evenementen voor organisaties. Voor grotere groepen stellen we een maatwerkaanbod samen. Neemt u contact op met Bianca voor een offerte op maat."
  - question: "Doen jullie ook verhuur van springkastelen?"
    answer: "Ja, we verhuren springkastelen in verschillende thema's: van prinsessenkasteel tot superhelden en dierentuin. Verhuur is inclusief op- en afbouw. We hebben springkastelen geschikt voor tuin en voor zaal. Minimale buitenruimte is 5x5 meter."
  - question: "Zijn de entertainers gecheckt op veiligheid?"
    answer: "Ja, al onze entertainers hebben een Verklaring Omtrent Gedrag (VOG). Ze zijn getraind in kindveiligheid en EHBO. De veiligheid van de kinderen staat altijd voorop bij alles wat we doen."


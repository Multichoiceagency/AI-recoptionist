after_hours_message: |
  Hoi! U heeft FeestBeest Kinderfeesten bereikt buiten onze bereikbaarheid. We zijn bereikbaar maandag tot en
  met vrijdag van 09:00 tot 18:00 uur en zaterdag van 10:00 tot 15:00 uur. U kunt ook een boeking aanvragen via
  onze website of een e-mail sturen naar feest@feestbeest.nl. Wilt u een bericht achterlaten?
  Wij bellen u de eerstvolgende werkdag terug!


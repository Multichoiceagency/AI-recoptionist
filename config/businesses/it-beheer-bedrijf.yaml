after_hours_message: |
  U heeft TechCare IT Beheer bereikt buiten onze kantooruren. Onze kantooruren zijn maandag tot en met donderdag
  van 08:30 tot 17:30 uur en vrijdag van 08:30 tot 17:00 uur. Contractklanten met een spoedsituatie kunnen gebruik
  maken van onze 24/7 noodlijn die op uw beheercontract staat vermeld. Wilt u een bericht achterlaten?
  Wij nemen dan zo spoedig mogelijk contact met u op.


faqs:
  - question: "Wat is de reactietijd bij een storing?"
    answer: "Voor contractklanten geldt een gegarandeerde reactietijd van 15 minuten via onze helpdesk. We bieden u direct remote ondersteuning en indien nodig plannen we een spoedbezoek in. De exacte SLA staat beschreven in uw beheercontract."
  - question: "Wat kost een IT-beheercontract?"
    answer: "We bieden drie pakketten aan: Basic, Business en Enterprise. De prijs is afhankelijk van het aantal werkplekken en de gewenste diensten. Ons commercieel team stelt graag een op maat gemaakte offerte op. Mag ik een afspraak voor u inplannen?"
  - question: "Kunnen jullie helpen met Microsoft 365?"
    answer: "Absoluut. We zijn Microsoft Partner en bieden de volledige Microsoft 365 suite aan, inclusief installatie, migratie, Exchange Online, SharePoint, Teams-telefonie en Intune-apparaatbeheer. We verzorgen ook de training voor uw medewerkers."
  - question: "Kunnen jullie ook komen als er iets kapot is?"
    answer: "Ja, we bieden zowel remote als on-site ondersteuning. Bij P1-incidenten streven we naar aanwezigheid binnen 4 uur. Voor regulier onderhoud plannen we een afspraak in die voor u uitkomt."
  - question: "Hoe veilig is onze IT-omgeving?"
    answer: "Dat is precies de vraag die wij ook aan onze klanten stellen. We bieden een gratis security-scan aan waarbij we uw netwerk, werkplekken en back-upstrategie beoordelen. Onze security expert rapporteert de bevindingen en geeft concrete aanbevelingen."
  - question: "Kunnen jullie onze server naar de cloud migreren?"
    answer: "Ja, cloud migratie is een van onze specialisaties. We begeleiden u van A tot Z: inventarisatie, planning, migratie en nazorg. We werken voornamelijk met Microsoft Azure en Microsoft 365 Business."
  - question: "Hoe werkt de back-up bij jullie?"
    answer: "We implementeren een gelaagde back-upstrategie: dagelijkse back-ups, off-site opslag en maandelijkse hersteltests. We hanteren duidelijke RTO en RPO afspraken zodat u weet hoe snel uw data hersteld kan worden."
  - question: "Zijn jullie ook beschikbaar voor kleine bedrijven?"
    answer: "Absoluut. We hebben klanten variërend van 2 tot 250 werkplekken. Ons Basic pakket is speciaal ontworpen voor kleine bedrijven met een beperkt budget maar wel behoefte aan betrouwbare IT-ondersteuning."
  - question: "Hoe meld ik een nieuwe storing aan?"
    answer: "U kunt bellen met onze helpdesk, een e-mail sturen naar helpdesk@techcare.nl of een ticket aanmaken via ons klantportaal op portal.techcare.nl. Als contractklant ontvangt u inloggegevens voor het portaal bij aanvang van het contract."


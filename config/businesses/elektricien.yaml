faqs:
  - question: "Mijn groep valt steeds uit, wat moet ik doen?"
    answer: "Probeer eerst alle apparaten in die groep uit te stekken en de groep terug te zetten. Als de groep direct weer uitvalt, is er waarschijnlijk een defect apparaat of een probleem met de bedrading. Wij sturen een monteur om dit te onderzoeken. Wilt u een afspraak inplannen?"
  - question: "Wat kost een groepenkast vervangen?"
    answer: "Een nieuwe groepenkast inclusief plaatsing kost gemiddeld tussen de €800 en €1.500, afhankelijk van de omvang en de huidige situatie. We maken altijd eerst een gratis offerte op locatie zodat u exact weet waar u aan toe bent."
  - question: "Kunnen jullie zonnepanelen installeren?"
    answer: "Zeker! Installatietechnieker De Boer is onze specialist voor zonnepanelen. We verzorgen het complete traject: advies, installatie, omvormer, netaansluiting en aanvraag van subsidies. We werken met topmerken zoals SolarEdge, Enphase en Huawei. Gratis offerte op locatie."
  - question: "Doen jullie ook laadpalen voor thuis?"
    answer: "Ja, wij installeren laadpalen van alle grote merken zoals Alfen, Easee en ABB. We verzorgen ook de subsidieaanvraag (SEAI) en koppelen de laadpaal eventueel aan uw zonnepanelen. Wilt u een vrijblijvende offerte?"
  - question: "Is een elektrische keuring verplicht bij verkoop van mijn woning?"
    answer: "Een elektrische keuring is niet wettelijk verplicht maar wordt sterk aanbevolen bij woningen ouder dan 25 jaar. Steeds meer kopers en notarissen vragen erom. Wij voeren NEN 1010 keuringen uit met een officieel keuringsrapport. De keuring kost gemiddeld €175 inclusief rapport."
  - question: "Hebben jullie een spoeddienst?"
    answer: "Ja, onze storingsdienst is 24 uur per dag, 7 dagen per week bereikbaar voor elektrische storingen, kortsluitingen en noodsituaties. Bij acute veiligheidsrisico's adviseren wij altijd om eerst de hoofdschakelaar uit te zetten en eventueel 112 te bellen."
  - question: "Wat kost een elektricien bij u per uur?"
    answer: "Ons uurtarief overdag is €80 exclusief BTW, plus €70 voorrijkosten. Spoedwerk buiten kantooruren wordt gefactureerd tegen €110 per uur plus €185 voorrijkosten. Alle prijzen zijn inclusief reistijd naar uw adres."
  - question: "Doen jullie ook domotica en slimme verlichting?"
    answer: "Ja, De Boer is onze specialist voor slimme thuissystemen. We installeren Philips Hue, KNX, Z-Wave en andere domoticasystemen. Van slimme verlichting tot volledige huisautomatisering — alles is mogelijk. Vraag naar een demopresentatie."


faqs:
  - question: "Hoe snel kan ik mijn drukwerk ontvangen?"
    answer: "De standaard doorlooptijd is 3 tot 5 werkdagen na goedkeuring van het drukproef. Voor geselecteerde producten bieden we een 24-uursspoedservice aan, waarbij een meerprijs van toepassing is. Vertel me wat u nodig heeft en ik check de huidige productiecapaciteit."
  - question: "Welk bestandsformaat hebben jullie nodig?"
    answer: "We werken het liefst met een drukklaar PDF met ingebedde lettertypen, CMYK-kleurprofiel en 3mm snijtoeslag. We accepteren ook AI, InDesign en PSD-bestanden. Ons DTP-team controleert elk bestand op drukgeschiktheid voordat we starten."
  - question: "Kunnen jullie ook ontwerpen voor mij maken?"
    answer: "Ja, onze DTP-specialist Nadia kan uw ontwerp maken of bestaande bestanden aanpassen. Ontwerp op maat is een betaalde dienst. U kunt uw wensen en merkrichtlijnen aanleveren en wij zorgen voor een professioneel eindresultaat."
  - question: "Wat is het verschil tussen offset en digitaal drukken?"
    answer: "Digitaal drukken is ideaal voor kleine oplagen vanaf 1 stuk tot circa 500 stuks — snel, flexibel en zonder opstarttoeslag. Offset drukken is kostenefficiënter bij grotere oplagen vanaf 500 stuks en levert scherpe, consistente kleuren voor lange series."
  - question: "Kunnen jullie ook bezorgen?"
    answer: "Ja, we bezorgen in Utrecht en omgeving met onze eigen bezorgdienst. Voor heel Nederland werken we met DHL en PostNL. Afhalen in onze productiehal in Utrecht is ook altijd mogelijk."
  - question: "Ik heb een spoedorder voor morgen, kan dat?"
    answer: "We doen ons best. Een spoedorder is afhankelijk van de huidige productiecapaciteit, het product en of uw bestand drukklaar is. Belt u mij gerust en dan check ik direct met het productieteam wat haalbaar is."
  - question: "Wat kost een banner of roll-up?"
    answer: "De prijs is afhankelijk van het formaat, het materiaal en de hoeveelheid. Een standaard roll-up van 85x200 cm begint bij circa 45 euro inclusief het standaard frame. Stuur uw specificaties naar info@printpro.nl voor een exacte offerte."
  - question: "Kunnen jullie ook gevelreclame maken?"
    answer: "Absoluut. Onze signage-afdeling verzorgt foliereclame, composiet reclameborden, vrijstaande letters en verlichte gevelbelettering. We komen ook op locatie kijken voor grotere projecten. Ik verbind u graag door met Patrick voor een adviesgesprek."
  - question: "Wat als ik niet tevreden ben met de kwaliteit?"
    answer: "Kwaliteit staat bij ons voorop. Als u niet tevreden bent, nemen we altijd contact op om dit te bespreken. Aantoonbare productiefouten van onze kant worden altijd kosteloos hergedrukt. U kunt een foto sturen naar info@printpro.nl ter beoordeling."


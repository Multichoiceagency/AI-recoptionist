faqs:
  - question: "Vanaf welke leeftijd kan mijn kind beginnen met rijles?"
    answer: "Voor 2toDrive kan uw kind al beginnen met rijles op 16,5 jaar. Op de 17e verjaardag mag het dan begeleid rijden met een begeleider die minimaal 27 jaar is en 8 jaar rijbewijs heeft. Voor zelfstandig rijden en het rijexamen is minimaal 18 jaar vereist."

  - question: "Hoeveel lessen heeft een gemiddelde leerling nodig?"
    answer: "In Nederland heeft een gemiddelde leerling 40 tot 50 rijlessen nodig. RijSchool Top beoordeelt elke leerling individueel. Na de proefles geeft Jan of Susan een eerlijke inschatting van het benodigde aantal lessen en het te verwachten tijdpad."

  - question: "Wat is jullie slagingspercentage?"
    answer: "Ons slagingspercentage bij het eerste rijexamen was 71 procent in 2023, ruim boven het landelijk gemiddelde van circa 60 procent. Wij plannen geen examen voordat de leerling echt rijklaar is, wat bijdraagt aan onze hogere slagingskans."

  - question: "Hoe werkt een spoedcursus?"
    answer: "Bij een spoedcursus rijdt u elke dag meerdere lessen achter elkaar om snel voldoende rijervaring op te bouwen. Onze 5-daagse spoedcursus kost 750 euro inclusief CBR-aanmelding. Dit is geschikt voor mensen met een rijachtergrond of die snel een rijbewijs nodig hebben voor werk."

  - question: "Kan ik ook alleen theorie volgen zonder rijlessen?"
    answer: "Ja. Wij bieden een online theoriecursus aan voor 49 euro en wekelijkse klassikale lessen op dinsdagavond. U kunt de theorie apart volgen en het CBR-theorieexamen afleggen onafhankelijk van uw rijlessen."

  - question: "Wat kost het CBR-examen?"
    answer: "Het CBR brengt voor het theorieexamen 42,55 euro in rekening en voor het praktijkrijexamen 107,35 euro overdag of 116,30 euro voor avond en weekendexamen. Deze kosten zijn separaat van de rijlessen en worden direct aan het CBR betaald. Wij verzorgen de aanmelding voor u."

  - question: "Welke auto rijden jullie rijlessen in?"
    answer: "Wij rijden lessen in een Volkswagen Polo (handgeschakeld) en een Volkswagen Golf automaat. De Polo is onze standaardauto. Voor automaat-rijbewijs (code 78) rijden wij in de Golf. De auto is voorzien van dubbele bediening zodat de instructeur altijd kan ingrijpen."

  - question: "Kunnen jullie ook motorrijlessen geven?"
    answer: "Ja. Susan verzorgt ook motorrijlessen voor het rijbewijs A1, A2 en A. De kosten bedragen 65 euro per les van 60 minuten. Wij begeleiden ook het CBR motorexamen inclusief het verplichte terreinprogramma. Neem contact op voor het exacte programma en vereisten per categorie."

  - question: "Ik ben geslaagd maar rij te weinig, kan ik een opfriscursus doen?"
    answer: "Zeker. Wij bieden opfriscursussen aan voor rijders die al lang niet hebben gereden, die onzekerder zijn geworden of die na een incident meer zelfvertrouwen willen opbouwen. Jan is hier specialist in. Een pakket van 2 tot 3 lessen geeft meestal al veel meer rijzekerheid."


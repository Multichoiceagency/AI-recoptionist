after_hours_message: |
  U heeft RijSchool Top Nederland Leiden bereikt buiten onze kantooruren. Wij zijn bereikbaar
  van maandag tot en met donderdag van 9 tot 20 uur, vrijdag van 9 tot 18 uur en zaterdag van
  9 tot 17 uur. U kunt ook online een proefles boeken via rijschooltop.nl. Laat uw naam,
  telefoonnummer en de naam van de leerling achter en Mieke belt u de volgende ochtend terug.


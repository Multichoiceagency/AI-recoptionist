faqs:
  - question: "Werken jullie samen met mijn verzekeraar?"
    answer: "Wij werken samen met alle grote verzekeraars in Nederland waaronder Interpolis, Univé, ANWB Verzekeringen, Allianz, Centraal Beheer, Nationale Nederlanden en tientallen andere. Ria regelt het complete verzekeringscontact voor u zodat u zich geen zorgen hoeft te maken."

  - question: "Heb ik het recht zelf een schadehersteller te kiezen?"
    answer: "Ja, absoluut. U heeft altijd het wettelijk vrije keuze recht om een erkend schadehersteller naar eigen keuze te selecteren, ook als uw verzekeraar een voorkeursgarage aanbeveelt. U hoeft die suggestie niet op te volgen. Wij zijn erkend en werken met alle verzekeraars."

  - question: "Hoe lang duurt de reparatie?"
    answer: "Dit is afhankelijk van de ernst van de schade. Kleine schades als een deukje of een kras zijn vaak in 1 tot 2 werkdagen gereed. Matige schades duren 3 tot 5 werkdagen. Grote schades inclusief het bestellen van onderdelen kunnen 1 tot 3 weken duren. Ria geeft u bij de schade-opname een realistische tijdsindicatie."

  - question: "Kunnen jullie ook een vervangende auto regelen?"
    answer: "Ja. Veel cascoverzekeringen dekken een vervangende auto tijdens de reparatieperiode. Wij controleren voor u of dit in uw polis is opgenomen en regelen de vervangende auto via ons huurbedrijf in de regio. Zo staat u nooit zonder vervoer."

  - question: "Wat is PDR oftewel deukenherstel zonder spuiten?"
    answer: "PDR staat voor Paintless Dent Removal. Bij kleine deuken waarbij de lak nog intact is, kunnen wij de deuk van binnenuit terugduwen zonder dat er gespoten hoeft te worden. Dit is sneller, goedkoper en er is geen risico op kleurverschil. Dit is ook de voorkeursmethode bij hagelschade."

  - question: "Bieden jullie garantie op uw reparaties?"
    answer: "Ja. Wij geven 5 jaar garantie op al ons spuitwerk en 2 jaar garantie op carrosseriereparaties. Als binnen die termijn een probleem optreedt dat te wijten is aan de reparatie, lossen wij dat kosteloos op. Wij staan volledig achter ons werk."

  - question: "Mijn voorruit heeft een ster, moet ik die laten vervangen?"
    answer: "Niet altijd. Kleine sterretjes of chips kleiner dan 3 cm die niet in uw directe zichtlijn liggen, kunnen vaak worden gerepareerd met harsinjectie voor circa 60 tot 80 euro. Grotere scheuren of schade in het rijveld moeten worden vervangen. Wij beoordelen het kosteloos voor u."

  - question: "Heeft een nieuwe voorruit gevolgen voor mijn rijhulpsystemen?"
    answer: "Ja, op moderne auto's met ADAS-systemen zoals noodremassistentie of rijstrookbewaking moet na vervanging van de voorruit de camera opnieuw worden gekalibreerd. Wij voeren deze ADAS-kalibratie uit met speciaal gereedschap. Wij attenderen u altijd hierop zodat uw veiligheidssystemen correct blijven functioneren."

  - question: "Wat als de schade minder is dan mijn eigen risico?"
    answer: "Dan is het in veel gevallen verstandiger de schade zelf te betalen en niet bij de verzekeraar te melden. Elke schademelding kan uw bonus-malus ladder beïnvloeden en uw toekomstige premie verhogen. Ria adviseert u eerlijk over of claimen of zelf betalen in uw situatie voordeliger is."


after_hours_message: |
  U heeft Carrosseriebedrijf De Meester Gouda bereikt buiten onze openingstijden. Wij zijn
  bereikbaar van maandag tot en met vrijdag van 8 tot 17:30 uur en op zaterdag van 9 tot 13
  uur voor spoedadvies. Laat uw naam, telefoonnummer en kenteken achter met een omschrijving
  van de schade en wij bellen u de volgende ochtend als eerste terug. Bij ernstige schade
  na een aanrijding waarbij letsel is, belt u altijd 112.


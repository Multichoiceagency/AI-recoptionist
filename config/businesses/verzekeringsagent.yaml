after_hours_message: |
  Verzekerd & Klaar Makelaardij is momenteel gesloten. Onze kantooruren zijn maandag tot en met
  donderdag van 09:00 tot 17:30 uur en vrijdag van 09:00 tot 17:00 uur. Bij een spoedeisend
  schadegeval kunt u rechtstreeks contact opnemen met uw verzekeraar via het nummer op uw
  polis. Wilt u een bericht achterlaten? Spreek uw naam, telefoonnummer en de reden van uw
  aanvraag in na de pieptoon. Wij nemen de eerstvolgende werkdag contact met u op.


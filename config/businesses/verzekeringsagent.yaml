faqs:
  - question: "Hoe meld ik een schade?"
    answer: "U kunt een schade telefonisch melden bij onze schadeafdeling via Corina, of per e-mail. Zorg dat u de polisgegevens, een beschrijving van de schade en eventuele foto's bij de hand heeft. Wij nemen de melding direct in behandeling en begeleiden u door het volledige schadeproces."
  - question: "Wat is het verschil tussen WA en allrisk autoverzekering?"
    answer: "WA (wettelijke aansprakelijkheid) is de minimale verplichte autoverzekering en dekt schade die u aan anderen toebrengt. Allrisk (volledig casco) dekt ook schade aan uw eigen voertuig, zoals diefstal, brand, hagel of eigen schuld. WA+ zit daar tussenin en dekt extra specifieke gevallen. Hans adviseert u graag over de optimale keuze."
  - question: "Ben ik verplicht een inboedelverzekering te hebben?"
    answer: "Een inboedelverzekering is niet wettelijk verplicht, maar sterk aanbevolen. Het dekt schade aan uw inboedel door brand, inbraak, wateroverlast en andere calamiteiten. Veel mensen onderschatten de waarde van hun inboedel. Wij verzorgen een gratis waardeberekening tijdens ons adviesgesprek."
  - question: "Kan ik mijn zorgverzekering ook via u afsluiten?"
    answer: "Ja, wij adviseren over basisverzekeringen en aanvullende pakketten. Wij vergelijken het aanbod van meerdere zorgverzekeraars en adviseren de dekking die het beste past bij uw gezondheidsbehoeften en budget. Let op: de overstapperiode is in de meeste gevallen beperkt tot november en december."
  - question: "Ik ben zzp'er, welke verzekeringen heb ik nodig?"
    answer: "Als zzp'er zijn de belangrijkste verzekeringen: een arbeidsongeschiktheidsverzekering (AOV), een beroepsaansprakelijkheidsverzekering, en afhankelijk van uw werk een bedrijfsverzekering. Hans heeft uitgebreide ervaring met zzp-verzekeringsoplossingen en kan een totaalpakket samenstellen dat aansluit bij uw risicoprofiel."
  - question: "Kunnen jullie mijn complete verzekeringspakket controleren?"
    answer: "Absoluut. Wij bieden een gratis jaarlijkse portefeuillecheck aan waarbij wij alle lopende polissen beoordelen op dekking, premie en overlap of lacunes. Veel klanten besparen hiermee honderden euro's per jaar. Bel ons voor een afspraak."
  - question: "Hoe lang duurt het voordat mijn polis ingaat?"
    answer: "Bij de meeste standaard verzekeringen kan de dekking de volgende werkdag of zelfs dezelfde dag ingaan. Bij complexere bedrijfsverzekeringen kan dit enkele werkdagen in beslag nemen vanwege acceptatieprocessen bij de verzekeraar. Wij informeren u altijd over de exacte ingangsdatum."
  - question: "Wat is een cyberverzekering en heb ik die nodig?"
    answer: "Een cyberverzekering dekt schade door digitale incidenten zoals hacking, ransomware, datalekken en systeemuitval. Voor bedrijven die werken met klantdata of digitale systemen is dit steeds relevanter. Hans beoordeelt uw digitale risicoprofiel en adviseert of en welke cyberdekking passend is."

messages:

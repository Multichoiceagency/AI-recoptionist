faqs:
  - question: "Hoe werkt het inburgeringsbudget (PIB)?"
    answer: "Het Persoonlijk Inburgeringsbudget (PIB) is een budget van maximaal €10.000 dat u van DUO ontvangt voor inburgeringscursussen. SpraakSnel is een erkend DUO-instituut, dus u kunt uw PIB volledig bij ons inzetten. U betaalt dan niets zelf. Wij helpen u met de aanvraag en afhandeling."
  - question: "Wanneer starten de NT2-cursussen?"
    answer: "Onze NT2-groepen starten vier keer per jaar: in januari, april, september en november. Aanmelden kan op elk moment. We doen altijd eerst een gratis niveautest zodat we u in de juiste groep plaatsen. Bel of mail ons voor de eerstvolgende startdatum."
  - question: "Hoe lang duurt een inburgeringscursus?"
    answer: "Een standaard NT2 inburgeringscursus duurt 6 tot 12 maanden bij 3 lessen per week. Intensieve programma's (dagelijks) kunnen sneller. De duur hangt af van uw beginiveau en leertempo. Na afronding kunt u direct examen doen bij DUO."
  - question: "Geven jullie ook zakelijke taallessen voor bedrijven?"
    answer: "Ja, ons bedrijfstaaldienst team verzorgt in-company taaltrainingen op locatie of online. We passen de cursus aan op uw branche (zorg, finance, techniek) en het niveau van de deelnemers. Vraag naar een offerte voor uw team."
  - question: "Kan ik ook individuele lessen volgen?"
    answer: "Ja, individuele lessen zijn beschikbaar voor alle talen en niveaus. U bepaalt zelf het tempo en de leertijden. Prijs is €75 per uur. Individueel leren gaat gemiddeld 30% sneller dan groepslessen door de volledige focus op uw persoonlijke leerdoelen."
  - question: "Welke talen geven jullie les in?"
    answer: "We geven les in Nederlands (NT2), Engels, Duits, Frans en Spaans. Voor minder gangbare talen werken we samen met externe docenten. Neem contact op voor beschikbaarheid van uw gewenste taal."
  - question: "Geven jullie ook certificaten?"
    answer: "Ja, we bereiden cursisten voor op erkende certificaatexamens: NT2 Staatsexamen (Programma I en II), Cambridge (B1-C2), IELTS, TOEIC, Goethe-Institut en DELF/DALF. Alle certificaten zijn internationaal erkend door werkgevers en onderwijsinstellingen."
  - question: "Kan ik ook online lessen volgen?"
    answer: "Ja, we bieden volledig online cursussen aan via ons leerplatform en wekelijkse live-sessies via Teams. Online leren is even effectief als op locatie en biedt maximale flexibiliteit. Ideaal als u een druk schema heeft of ver van Rotterdam woont."

messages:

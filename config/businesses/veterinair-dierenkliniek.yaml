after_hours_message: |
  Dierenkliniek Het Beestje is momenteel gesloten. Onze openingstijden zijn maandag tot en met
  donderdag van 08:00 tot 18:00, vrijdag van 08:00 tot 17:00 en zaterdag van 09:00 tot 13:00.
  Bij een veterinaire spoedsituatie buiten openingstijden kunt u onze spoeddienst bereiken —
  het spoednummer vindt u op onze website of door dit nummer nogmaals te bellen en de
  spoedinstructies te volgen. Bij levensbedreigende situaties: kom direct naar de kliniek.
  Voor niet-urgente vragen kunt u een bericht inspreken.


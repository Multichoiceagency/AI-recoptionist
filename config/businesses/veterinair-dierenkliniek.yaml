faqs:
  - question: "Hoe maak ik een afspraak voor mijn huisdier?"
    answer: "Bel ons tijdens openingstijden of maak een afspraak via onze website. We proberen u zo snel mogelijk in te plannen. Voor spoedgevallen proberen we u nog dezelfde dag te helpen."
  - question: "Welke dieren behandelen jullie?"
    answer: "We behandelen honden, katten, konijnen, cavia's en andere kleine huisdieren. Voor exotische dieren of landbouwdieren kunt u contact opnemen — in sommige gevallen kunnen we doorverwijzen."
  - question: "Wat zijn de kosten van een consultatie?"
    answer: "Een regulier consult kost €40 tot €60 afhankelijk van de duur en behandeling. Spoedconsulten buiten openingstijden zijn duurder. We zijn altijd transparant over kosten voordat we beginnen."
  - question: "Mijn hond is aangereden, wat moet ik doen?"
    answer: "Dit is een spoedsituatie. Kom zo snel mogelijk naar de kliniek. Bel ons onderweg zodat we klaarstaan bij aankomst. Probeer uw hond zo rustig mogelijk te vervoeren."
  - question: "Hoe weet ik of mijn kat spoed heeft?"
    answer: "Bel ons altijd bij benauwdheid, stuipen, niet kunnen plassen (bij katten extreem gevaarlijk), ernstige lethargie, niet willen eten gecombineerd met andere klachten, of na een trauma."
  - question: "Bieden jullie ook tandheelkunde aan voor huisdieren?"
    answer: "Ja, we verwijderen tandsteen onder narcose en kunnen ook tandextracties uitvoeren. Regelmatige tandcontrole is belangrijk — gebitsproblemen zijn bij honden en katten heel vaak voorkomend."
  - question: "Hoe werkt castratie en wanneer is het het juiste moment?"
    answer: "Het juiste moment voor castratie hangt af van de soort, het ras en het geslacht. Dr. Van Dam adviseert u hierover tijdens een consult. Over het algemeen geldt: honden en katten kunnen gecastreerd worden vanaf 6 maanden."
  - question: "Kan ik een huisdierverzekering afsluiten?"
    answer: "Wij raden huisdierverzekering aan — met name voor honden en katten. We werken samen met meerdere verzekeraars. Vraag ons naar meer informatie of bezoek vergelijkingssites online."
  - question: "Moeten katten vaccinaties hebben?"
    answer: "Ja, we adviseren vaccinaties tegen kattenziekte (FVRCP), kattenleukemie (FeLV) en rabiës. De frequentie hangt af van de levensstijl van de kat. Dr. Van Dam adviseert u hierover."
  - question: "Wat moet ik doen als mijn hond iets heeft ingeslikt wat giftig kan zijn?"
    answer: "Bel ons direct of kom meteen langs. Neem indien mogelijk de verpakking mee van wat het dier heeft ingenomen. Bij chocolade, druiven, uien, medicijnen of planten altijd spoedsituatie."


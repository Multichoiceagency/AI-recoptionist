after_hours_message: |
  Onze praktijk is momenteel gesloten. Onze openingstijden zijn maandag tot en met donderdag
  van 08:00 tot 17:30 (donderdag tot 19:00) en vrijdag van 08:00 tot 16:00.
  Heeft u spoed buiten onze openingstijden? Bel dan de tandartsenpost op 0900-8213.
  Wilt u een bericht achterlaten? Dan bellen wij u zo snel mogelijk terug.


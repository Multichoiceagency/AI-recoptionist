faqs:
  - question: "Hoe maak ik een afspraak?"
    answer: "U kunt een afspraak maken door te bellen naar onze receptie. We proberen u zo snel mogelijk een passende tijd aan te bieden. Voor spoed proberen we u nog diezelfde dag in te plannen."
  - question: "Nemen jullie nieuwe patiënten aan?"
    answer: "Ja, we verwelkomen graag nieuwe patiënten. We plannen voor nieuwe patiënten een uitgebreide intake-afspraak van 45 minuten zodat we uw gebit goed kunnen beoordelen."
  - question: "Wat moet ik doen bij een tandarts noodgeval buiten openingstijden?"
    answer: "Buiten onze openingstijden kunt u de regionale tandartsenpost bereiken via 0900-8213. Deze post is 24/7 bereikbaar voor spoedhulp."
  - question: "Wordt tandheelkunde vergoed door mijn zorgverzekering?"
    answer: "Voor kinderen t/m 17 jaar valt tandheelkunde onder de basisverzekering. Volwassenen hebben een aanvullende tandartsverzekering nodig. We kunnen voor u controleren wat uw polis dekt."
  - question: "Bieden jullie tanden bleken aan?"
    answer: "Ja, we bieden zowel in-office bleking aan (resultaat in één behandeling) als een thuisbleekkit met op maat gemaakte bitjes. Dr. Jansen bespreekt graag welke optie het beste bij u past."
  - question: "Hoe lang duurt een reguliere controle?"
    answer: "Een standaard controle duurt ongeveer 30 minuten. Als er ook een reiniging door de mondhygiëniste bij zit, rekent u op ongeveer 60 minuten totaal."
  - question: "Ik heb tandartsvrees, kan ik toch langskomen?"
    answer: "Absoluut. Dr. Jansen heeft ruime ervaring met angstpatiënten en neemt altijd de tijd om u op uw gemak te stellen. We kunnen ook kalmerende middelen bespreken als dat nodig is."
  - question: "Bieden jullie orthodontie aan voor volwassenen?"
    answer: "Ja, we bieden orthodontie aan voor zowel kinderen als volwassenen, inclusief transparante aligners (zoals Invisalign). Plan een gratis oriëntatiegesprek voor meer informatie."
  - question: "Hoe vaak moet ik naar de tandarts?"
    answer: "We adviseren een controle elke 6 maanden en een professionele reiniging door onze mondhygiëniste minimaal 1 keer per jaar, of vaker bij tandvleesproblemen."
  - question: "Waar is de praktijk gevestigd?"
    answer: "Tandartspraktijk De Glimlach is gevestigd in Rotterdam. Bel ons voor het exacte adres en parkeermogelijkheden in de buurt."

messages:
  delivery: "file"
  file_path: "./messages/tandarts-praktijk/"

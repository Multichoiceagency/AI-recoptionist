faqs:
  - question: "Wanneer moet ik overschakelen naar winterbanden?"
    answer: "Als vuistregel geldt: zodra de nachttemperaturen structureel onder 7 graden Celsius komen, zijn winterbanden veiliger. In Nederland is dat doorgaans rond begin november. Wij adviseren niet te wachten tot het vriest: plan uw wissel al in oktober om de piekdrukte te vermijden."

  - question: "Wat kost een bandenwisseling bij BandenXpert?"
    answer: "Een bandenwisseling van zomer naar winter of vice versa met uw eigen opgeslagen set kost bij ons 59 euro voor een complete set van vier banden inclusief balancering. Als u ook TPMS sensoren heeft kosten wij 79 euro inclusief herprogrammering."

  - question: "Bieden jullie ook bandenopslag aan?"
    answer: "Ja. Wij slaan uw banden op in een klimaatgecontroleerde ruimte. De kosten bedragen 45 euro per seizoen exclusief wisseling of 89 euro inclusief de seizoenswisseling. Uw banden zijn digitaal gelabeld en worden bij aflevering altijd opgemeten op profieldiepte."

  - question: "Mijn band is lek, kunnen jullie die repareren?"
    answer: "Dat hangt af van de locatie en aard van de lekkage. Een lek in het midden van het loopvlak door een spijker of schroef is in de meeste gevallen repareerbaar voor circa 25 euro. Een lek in de flank of bij de rand is niet veilig te repareren en de band moet dan vervangen worden."

  - question: "Wat is uitlijnen en wanneer is het nodig?"
    answer: "Uitlijnen corrigeert de stand van de wielen. Dit is nodig na een harde klap op een put, na vervanging van stuurinrichting of ophangingsdelen, of als de auto naar één kant trekt. Foutieve uitlijning sloopt banden snel en kost meer brandstof. Een 4-wiel uitlijning bij ons kost 55 euro."

  - question: "Hebben jullie ook een mobiele service voor pech onderweg?"
    answer: "Ja. Stan onze mobiele monteur rijdt uit in de regio Dordrecht, Zwijndrecht en Papendrecht. Bij een lekke band of wiselprobleem ter plaatse is de gemiddelde aanrijtijd 45 tot 90 minuten. Bel het nummer op onze website voor de mobiele spoedservice."

  - question: "Welke bandmerken verkopen jullie?"
    answer: "Wij verkopen banden van alle gangbare merken, van premium als Michelin, Continental, Bridgestone en Goodyear tot middenklasse merken als Falken, Hankook en Yokohama en budget merken als Nexen en Roadstone. Wij adviseren altijd eerlijk op basis van uw rijprofiel en budget."

  - question: "Wanneer moet ik nieuwe banden kopen?"
    answer: "Wettelijk minimum profieldiepte is 1,6 mm. Wij adviseren nieuwe banden bij een diepte van 3 mm of minder voor optimale veiligheid, zeker in de herfst en winter. Banden ouder dan 6 jaar worden ook aanbevolen te vervangen ongeacht het profiel vanwege rubber veroudering."


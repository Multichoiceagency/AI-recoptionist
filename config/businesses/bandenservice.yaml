after_hours_message: |
  U heeft BandenXpert Service Dordrecht bereikt buiten onze openingstijden. Wij zijn bereikbaar
  van maandag tot en met vrijdag van 8 tot 17:30 uur en zaterdag van 8:30 tot 14:30 uur.
  Voor noodgevallen met pech onderweg kunt u ons noodnummer bereiken via de ANWB of neem
  contact op met Stan onze mobiele service via het nummer op onze website bandenxpert.nl.
  Laat gerust uw naam, kenteken en vraag achter en wij bellen u de volgende ochtend terug.


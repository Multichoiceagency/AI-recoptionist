faqs:
  - question: "Wat doet Multichoice Agency?"
    answer: "Multichoice Agency is een full-service digitaal bureau opgericht in 2015. Wij bouwen websites, apps en software op maat, en regelen uw online marketing en AI-oplossingen. Met 900+ afgeronde projecten en kantoren in Rotterdam en Delft helpen wij bedrijven digitaal groeien."

  - question: "Wat kost een website?"
    answer: "Wij werken altijd met een offerte op maat, zodat u betaalt voor wat u écht nodig heeft. Ik stel graag een paar vragen over uw project en stuur u binnen 24 uur een vrijblijvende offerte toe."

  - question: "Hoe lang duurt een project?"
    answer: "Dat hangt af van de omvang. Een standaard website is doorgaans in 2 tot 6 weken klaar. Apps en maatwerk software nemen meer tijd. We stellen altijd een heldere planning op bij de start."

  - question: "Maken jullie ook apps?"
    answer: "Ja, wij ontwikkelen iOS en Android apps, web applicaties en portals. We werken met React Native en Flutter voor cross-platform apps. Wilt u meer weten over uw specifieke app idee?"

  - question: "Doen jullie ook AI?"
    answer: "Absoluut. AI is een groeiende dienst bij ons. We bouwen chatbots, automatiseringsoplossingen, content generatie tools en data-analyse systemen. Wat voor AI-toepassing heeft u in gedachten?"

  - question: "Doen jullie ook marketing?"
    answer: "Ja, via onze partner ESSMarketing.nl verzorgen we SEO, Google Ads, social media advertenties en e-mailmarketing. Een complete digitale strategie dus."

  - question: "Waar zijn jullie gevestigd?"
    answer: "Wij hebben kantoren in Rotterdam op Otto Reuchlin 1008 en in Delft op Elektronicaweg 2. We werken ook met klanten uit het hele land en internationaal."

  - question: "Hoe vraag ik een offerte aan?"
    answer: "Dat kan ik direct voor u regelen. Mag ik u een paar vragen stellen over uw project? Dan stelt ons team binnen 24 uur een vrijblijvende offerte op."

  - question: "Wat maakt jullie anders?"
    answer: "Onze co-founders zijn persoonlijk betrokken bij elk project. We werken data-gedreven: eerst strategie, dan uitvoering. En met 900+ projecten en 10 jaar ervaring weten we wat werkt."


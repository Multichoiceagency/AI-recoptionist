faqs:
  - question: "Wat is het verschil tussen gel en acrylnagels?"
    answer: "Gelnagels zijn lichter en flexibeler, ideaal voor een natuurlijke look of lichte verlenging. Acrylnagels zijn steviger en langduriger, geschikt voor langere nagels of mensen die snel afbreken. Onze stylisten helpen u graag kiezen op basis van uw leefstijl."
  - question: "Hoe lang gaan gelnagels of Shellac mee?"
    answer: "Gel nagellak zoals Shellac of Gelish gaat doorgaans 2 tot 3 weken mee zonder afschilferen. Gel extensions houden 3 tot 4 weken voordat bijwerking nodig is. Bij goed onderhoud thuis nog langer."
  - question: "Kan ik ook nail art laten doen op korte nagels?"
    answer: "Ja! Nail art is op elke nagellengte mogelijk. Zelfs op korte nagels kunnen we mooie designs maken zoals glazen nagels, chrome effect, ombre of een subtiele bloemetjesdecoratie."
  - question: "Hoe ver van tevoren moet ik boeken voor een bruidsnagelset?"
    answer: "Wij raden aan minimaal 6 tot 8 weken van tevoren contact op te nemen. We plannen altijd een proef-sessie voor de grote dag zodat u zeker weet hoe het eindresultaat eruitziet."
  - question: "Is het veilig om acrylnagels te laten doen?"
    answer: "Ja, bij professionele toepassing met kwaliteitsproducten is acryl veilig. Wij werken met gecertificeerde producten en opgeleide stylisten. Regelmatige bijwerking en goede verwijdering zijn belangrijk voor de gezondheid van uw eigen nagels."
  - question: "Kunnen jullie ook pedicure doen?"
    answer: "Ja, onze Pedicure Expert verzorgt zowel cosmetische als medische pedicure. Ook bij ingegroeide nagels, eeltknobbels of voetproblemen kunt u bij ons terecht. Vraag naar beschikbaarheid en tarieven."
  - question: "Wat als ik een nagel breek tussen twee afspraken door?"
    answer: "Geen zorgen! Bel ons voor een spoedrepair. We proberen u zo snel mogelijk in te plannen voor een reparatie van de gebroken nagel, zodat uw set er weer perfect uitziet."
  - question: "Bieden jullie ook nagelverzorging aan voor beschadigde nagels?"
    answer: "Ja. Als uw nagels beschadigd zijn door eerdere extensies of andere behandelingen, biedt onze pedicure expert een herstelbehandeling aan met voedende producten en nagelversteviging. Geef dit aan bij het boeken."
  - question: "Hoe verwijder ik gel nagellak thuis veilig?"
    answer: "Wij raden altijd aan gel nagellak door een professional te laten verwijderen om beschadiging te voorkomen. Thuis verwijderen via weken in aceton is mogelijk maar risicovol voor de nagelplaat. Kom liever langs voor een veilige verwijdering."


faqs:
  - question: "Wat zijn de huurprijzen in Rotterdam momenteel?"
    answer: "De huurprijzen in Rotterdam variëren sterk per wijk en type woning. Studio's starten rond de 950 euro per maand. Appartementen liggen tussen 1.200 en 2.000 euro. Gezinswoningen in Hillegersberg of Kralingen kosten doorgaans 1.500 tot 2.500 euro per maand. Wij adviseren u graag vrijblijvend over de optimale huurprijs voor uw woning."

  - question: "Aan welke inkomensvereisten moet ik als huurder voldoen?"
    answer: "Als huurder dient u een bruto maandinkomen te hebben van minimaal drie keer de kale huurprijs. Heeft u een tijdelijk contract, dan vragen wij een werkgeversverklaring. ZZP-ers dienen de laatste drie jaarrekeningen te overleggen. Wij beoordelen elk geval individueel en staan u graag bij met advies."

  - question: "Hoe lang duurt het gemiddeld voordat mijn woning verhuurd is?"
    answer: "Via Huurmarkt Makelaardij staat uw woning gemiddeld 11 dagen te koop voordat wij een geschikte huurder gevonden hebben. Wij plaatsen de woning op Pararius, Funda Huur en onze eigen database, waarna wij direct uit ons bestand van geregistreerde huurzoekenden kunnen putten."

  - question: "Wat houdt de huurderscreening in?"
    answer: "Onze screening omvat een inkomenscheck, verificatie van arbeidsovereenkomst of ondernemer status, een BKR-toets, referentiecheck bij de vorige verhuurder en een persoonlijk gesprek met Fatima. Alleen kandidaten die aan alle criteria voldoen worden aan u gepresenteerd."

  - question: "Bieden jullie ook woningbeheer aan?"
    answer: "Ja, ons beheer team kan de volledige verhuuradministratie overnemen. Dit omvat huurincasso, jaarlijkse huurverhoging doorvoeren, onderhoudscoördinatie, communicatie met de huurder en jaarlijkse afrekeningen. De kosten bedragen 5 procent van de maandelijkse huur."

  - question: "Wat is de Wet Betaalbare Huur en hoe raakt die mij?"
    answer: "De Wet Betaalbare Huur (ingevoerd in 2024) reguleert de huur voor woningen tot 186 WWS-punten. Dit betekent dat woningen in dit segment niet meer dan circa 1.157 euro per maand mogen kosten. Woningen boven 186 punten vallen in de vrije sector en zijn niet gereguleerd. Wij berekenen gratis de puntentelling voor uw woning."

  - question: "Hoe hoog mag de borgsom zijn?"
    answer: "Wettelijk is de borgsom gemaximeerd op twee maanden kale huur. Bij Huurmarkt Makelaardij hanteren wij doorgaans één tot twee maanden afhankelijk van het object en de huurder. De borgsom wordt aan het einde van de huurperiode teruggestort mits er geen schade is."

  - question: "Kunnen jullie ook helpen bij het verhuren aan expats?"
    answer: "Zeker. Wij hebben uitgebreide ervaring met expat verhuur. Onze expat service omvat Engelstalige contracten, begeleiding bij inschrijving in de gemeente, hulp bij het regelen van een BSN-nummer en verwijzing naar belastingadviseurs voor de 30-procent regeling."

  - question: "Wat als mijn huurder niet betaalt?"
    answer: "Bij betalingsachterstand schakelen wij voor beheerklanten direct de incassoprocedure in. Wij sturen aanmaningen, nemen contact op met de huurder en starten indien nodig de juridische procedure. Wij werken samen met een gespecialiseerd huurrecht advocatenkantoor."


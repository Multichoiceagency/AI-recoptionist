after_hours_message: |
  U bent buiten onze openingstijden bij Huurmarkt Makelaardij Rotterdam. Wij zijn bereikbaar
  van maandag tot en met vrijdag van 9 tot 18 uur en op zaterdag van 10 tot 16 uur. Laat
  gerust uw naam, telefoonnummer en een korte omschrijving van uw vraag achter, dan nemen
  wij zo snel mogelijk de volgende werkdag contact met u op. U kunt ook onze website bezoeken
  via huurmarktmakelaardij.nl voor het actuele huurwoningaanbod.


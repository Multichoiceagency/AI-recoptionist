faqs:
  - question: "Hoe vraag ik een herhaalrecept aan?"
    answer: "U kunt een herhaalrecept aanvragen via telefoon, onze app of aan de balie. De verwerkingstijd is doorgaans dezelfde of de volgende werkdag. We kunnen u ook aanmelden voor de automatische herhaalservice."
  - question: "Kunnen jullie mijn medicijnen bezorgen?"
    answer: "Ja, voor chronisch zieken en minder mobiele klanten bieden wij een bezorgservice aan. Neem contact op met onze balie voor de mogelijkheden en voorwaarden in uw omgeving."
  - question: "Wat is een medicatiereview en heb ik dat nodig?"
    answer: "Bij een medicatiereview beoordeelt Farida al uw medicijnen op interacties, bijwerkingen en correcte dosering. Dit wordt aangeraden bij gebruik van 5 of meer medicijnen tegelijk en is vergoed door de zorgverzekering."
  - question: "Wat doe ik bij een ernstige bijwerking van een medicijn?"
    answer: "Bel direct ons of bij spoed het Vergiftigingen Informatie Centrum via 030-2748888. Bij levensbedreigende klachten belt u altijd 112. Wacht niet af bij ernstige reacties."
  - question: "Kan ik bloeddruk laten meten bij de apotheek?"
    answer: "Ja, u kunt bij ons gratis uw bloeddruk laten meten. Geen afspraak nodig — loop gewoon binnen tijdens openingstijden."
  - question: "Worden mijn medicijnen vergoed door de zorgverzekering?"
    answer: "Medicijnen op recept worden doorgaans vergoed vanuit de basisverzekering, na aftrek van het eigen risico. Zelfzorgmiddelen zonder recept worden normaal gesproken niet vergoed."
  - question: "Ik slik veel medicijnen en raak het overzicht kwijt. Kunnen jullie helpen?"
    answer: "Ja, wij kunnen uw medicijnen klaarzetten in een weekdoseersysteem (Baxter), zodat u altijd precies weet wat u wanneer moet innemen. Vraag ons naar de mogelijkheden."
  - question: "Zijn mijn medicatiegegevens veilig bij jullie?"
    answer: "Absoluut. Wij werken strikt volgens de AVG-privacywetgeving. Uw medicatiegegevens worden nooit gedeeld zonder uw toestemming en zijn alleen toegankelijk voor bevoegde zorgverleners."
  - question: "Kunnen jullie advies geven over zelfzorgmedicatie?"
    answer: "Ja, Rob en Farida staan altijd klaar voor advies over zelfzorgmedicatie, vitamines en gezondheidsproducten. U kunt ook vragen stellen over interacties met uw huidige medicijnen."
  - question: "Waar vind ik buiten openingstijden een apotheek?"
    answer: "De dichtstbijzijnde dienstdoende apotheek vindt u via www.dienstapotheek.nl. Bij vergiftiging kunt u 24 uur per dag het Vergiftigingen Informatie Centrum bellen: 030-2748888."


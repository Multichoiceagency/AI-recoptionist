after_hours_message: |
  Apotheek De Gezondheid is momenteel gesloten. Onze openingstijden zijn maandag tot en met vrijdag
  van 08:00 tot 18:00 en zaterdag van 09:00 tot 17:00.
  Bij een medicijnspoed of vergiftiging kunt u 24 uur per dag contact opnemen met het
  Vergiftigingen Informatie Centrum via 030-2748888. Bij levensbedreigende situaties belt u 112.
  De dichtstbijzijnde dienstdoende apotheek kunt u vinden via www.dienstapotheek.nl.
  Wilt u een herhaalrecept aanvragen? Dit kan ook via onze app of website.


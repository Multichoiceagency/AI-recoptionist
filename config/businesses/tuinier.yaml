faqs:
  - question: "Wat kost een tuinontwerp?"
    answer: "Een compleet tuinontwerp inclusief schetsplan en beplantingsplan kost tussen de €250 en €650, afhankelijk van de grootte van de tuin. Bij opdrachten boven €2.000 is een 3D-visualisatie inbegrepen. We beginnen altijd met een gratis tuinconsultatie zodat u weet wat u kunt verwachten."
  - question: "Kunnen jullie ook terugkerend onderhoud verzorgen?"
    answer: "Ja, we bieden onderhoudscontracten aan op maat — maandelijks, tweemaandelijks of seizoensmatig. Elke beurt omvat maaien, snoeien, onkruid verwijderen en indien nodig bemesten. Prijs vanaf €85 per beurt. Vraag naar een onderhoudsplan op maat."
  - question: "Wanneer is het beste moment om mijn tuin aan te leggen?"
    answer: "Het voorjaar (maart-mei) en het najaar (september-oktober) zijn ideaal voor tuinaanleg. Beplanting wortelt dan het beste. Grond- en bestratingswerk kan het hele jaar door als de bodem niet bevroren is. We plannen graag een consultatie om de beste startdatum te bepalen."
  - question: "Kunnen jullie grote bomen snoeien of vellen?"
    answer: "Ja, Snoeier Dirk is gecertificeerd boomverzorger (ISA arborist) en verzorgt kroonvorming, gevaarlijk hangende takken en het veilig vellen van bomen. We werken conform de Wet Natuurbescherming — voor het vellen van grote bomen is soms een kapvergunning nodig, wij regelen dat."
  - question: "Doen jullie ook vijvers aanleggen?"
    answer: "Zeker, Hovenier Rob heeft al tientallen vijvers aangelegd. Van een kleine siervijver tot een grote natuurvijver met vissen. We verzorgen de volledige aanleg inclusief liner, pomp, filter, waterplanten en beplanting rondom de vijver. Prijs vanaf €1.200."
  - question: "Hoe onderhoudsvriendelijk kan mijn tuin worden?"
    answer: "Met een slim beplantingsplan vol vaste planten, bodembedekkers en inheemse soorten is een tuin bijna onderhoudvrij te maken. Tuinontwerper Anna is gespecialiseerd in duurzame en onderhoudsarme tuinen. Ze adviseert ook over robotmaaiers en druppelirrigatie."
  - question: "Kunnen jullie ook bestrating leggen?"
    answer: "Ja, Rob legt alle soorten bestrating inclusief betontegels, tegels van natuursteen, klinkers, grind en steenslag. We verzorgen ook funderingswerk en drainage. Goede drainage voorkomt wateroverlast. Prijs is afhankelijk van het materiaal en de oppervlakte."
  - question: "Werken jullie ook voor woningcorporaties en bedrijven?"
    answer: "Ja, we verzorgen groenonderhoud voor woningcorporaties, bedrijfsterreinen en VVE's. We stellen meerjarige onderhoudscontracten op met vaste prijsafspraken. Neem contact op voor een offerte op maat voor uw organisatie."


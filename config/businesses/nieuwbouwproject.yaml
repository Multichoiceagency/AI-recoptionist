faqs:
  - question: "Moet ik overdrachtsbelasting betalen bij nieuwbouw?"
    answer: "Nee. Bij nieuwbouw koopt u vrij op naam (V.O.N.). Dit betekent dat de notariskosten voor de eigendomsoverdracht voor rekening van de verkopende partij zijn en dat u geen overdrachtsbelasting van 2 procent betaalt. Dit scheelt direct duizenden euros vergeleken met bestaande bouw."

  - question: "Hoe lang duurt de bouw voordat ik de sleutel krijg?"
    answer: "De bouwtijd is afhankelijk van het project maar bedraagt gemiddeld 18 tot 24 maanden na het sluiten van de koopovereenkomst. Rob houdt u gedurende de hele bouwperiode op de hoogte van de voortgang via voortgangsberichten en bouwbezoeken."

  - question: "Wat is meer- en minderwerk?"
    answer: "Meer- en minderwerk zijn de persoonlijke keuzes die u als koper kunt maken tijdens de bouw. U kunt de keuken, badkamer, vloer, tegelkeuzes en soms de indeling aanpassen. Meerwerk kost extra geld, minderwerk geeft een verrekening terug. Tim of Anke begeleidt u door het complete keuzeproces."

  - question: "Welke garanties heb ik op een nieuwbouwwoning?"
    answer: "Alle woningen van Nieuwbouw Nederland worden opgeleverd met een 10-jarige structuurgarantie via SWK of Woningborg. Dit dekt ernstige gebreken aan de constructie. Daarnaast geldt de wettelijke garantie van de aannemer en zijn de woningen gebouwd conform de meest recente bouwnormen en het Bouwbesluit."

  - question: "Is een nieuwbouwwoning energiezuiniger dan bestaande bouw?"
    answer: "Ja, aanzienlijk. Alle nieuwbouwwoningen van Nieuwbouw Nederland voldoen aan de BENG-norm (Bijna Energie Neutraal Gebouw). Ze zijn volledig all-electric zonder gasaansluiting, goed geïsoleerd en worden standaard voorzien van zonnepanelen. Uw energierekening is daarmee aanzienlijk lager dan bij een gemiddelde bestaande woning."

  - question: "Hoe werkt de hypotheek voor nieuwbouw?"
    answer: "Bij nieuwbouw werkt de hypotheek anders dan bij bestaande bouw. U heeft een bouwdepot nodig: de bank reserveert het hypotheekbedrag en keert dit in termijnen uit naarmate de bouw vordert. Onze partnerfinanciers zijn gespecialiseerd in nieuwbouwhypotheken en begeleiden u door dit proces."

  - question: "Kan ik de woning bezoeken tijdens de bouw?"
    answer: "Ja. Rob organiseert meerdere georganiseerde bouwbezoeken per project zodat u de voortgang kunt zien. Individuele bezoeken aan de bouwplaats zijn om veiligheidsredenen alleen mogelijk met begeleiding en op afspraak."

  - question: "Wat als ik de woning wil verkopen voor oplevering?"
    answer: "Het is in principe mogelijk om uw kooprechten over te dragen aan een derde partij vóór oplevering, maar hiervoor heeft u onze toestemming nodig en kunnen notariskosten en overdrachtsbelasting van toepassing zijn voor de nieuwe koper. Neem contact op voor de specifieke voorwaarden."

  - question: "Zijn er nog woningen beschikbaar?"
    answer: "De beschikbaarheid wisselt voortdurend. Het beste is om contact op te nemen voor de meest actuele informatie of u in te schrijven op onze interesselijst. Silvia houdt u als eerste op de hoogte zodra er woningen beschikbaar komen die bij uw wensen passen."


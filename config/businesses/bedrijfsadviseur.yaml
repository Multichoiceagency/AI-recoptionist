faqs:
  - question: "Wat onderscheidt SABN van andere adviesbureaus?"
    answer: "SABN combineert academische diepgang (Dr. Hendriks) met jarenlange praktijkervaring (Ruud) en een pragmatische aanpak. Wij leveren geen rapporten die in laden verdwijnen, maar adviseren tot en met de implementatie. Ons team is klein, persoonlijk betrokken en altijd beschikbaar voor de opdrachtgever."
  - question: "Voor wat voor soort organisaties werken jullie?"
    answer: "Wij werken voor MKB-ondernemingen, familiebedrijven, scale-ups en grote nationale en internationale organisaties. Onze cliënten zijn actief in diverse sectoren: industrie, dienstverlening, zorg, technologie en overheid. De gemeenschappelijke deler is de behoefte aan serieus strategisch advies."
  - question: "Hoe verloopt een typisch adviestraject?"
    answer: "Een traject begint altijd met een intakegesprek en een quickscan van de situatie. Op basis hiervan stellen wij een offerte op met een heldere scope, tijdlijn en tarief. Na akkoord starten wij met de analysefase, gevolgd door advisering en indien gewenst implementatiebegeleiding. U wordt gedurende het traject actief betrokken."
  - question: "Kunnen jullie ook helpen bij een fusie of overname?"
    answer: "Ja, wij begeleiden M&A-trajecten van strategische oriëntatie tot en met integratieplanning. Dit omvat target-identificatie, strategische fit-analyse, ondersteuning bij due diligence, onderhandelingsstrategie en post-merger integratie. Alle M&A-trajecten verlopen onder strikte vertrouwelijkheid."
  - question: "Wat is een strategische quickscan?"
    answer: "Een strategische quickscan is een gerichte analyse van uw organisatie in 60 tot 90 minuten. Wij beoordelen uw huidige strategie, marktpositie, interne kracht en de drie grootste kansen of risico's. U ontvangt een beknopt rapport met concrete aanbevelingen. De quickscan is gratis en vrijblijvend voor nieuwe relaties."
  - question: "Werken jullie ook met NDA's?"
    answer: "Ja, SABN werkt standaard met een Non-Disclosure Agreement (NDA) voordat inhoudelijke gesprekken over uw bedrijfsstrategie, financiën of plannen plaatsvinden. Wij beschouwen vertrouwelijkheid als een fundamentele voorwaarde voor een goede samenwerking."
  - question: "Hoe zijn jullie tarieven opgebouwd?"
    answer: "Wij werken op basis van projectprijzen of dagtarieven, afhankelijk van de aard van de opdracht. U ontvangt altijd een transparante offerte vooraf. Wij werken niet met open-end contracten; de scope en het budget worden vooraf vastgesteld. Neem contact op voor een vrijblijvend gesprek over uw situatie."
  - question: "Kunnen jullie ook interim management leveren?"
    answer: "Ja, wij plaatsen ervaren interimmanagers op directie- en senior management niveau. Onze interim professionals hebben minimaal 15 jaar ervaring en zijn inzetbaar bij vacatures, reorganisaties, crisis- of transitiesituaties. Ruud bespreekt graag uw behoefte en de beschikbare profielen."
  - question: "Hoe lang duurt een gemiddeld adviestraject?"
    answer: "De duur varieert sterk: een strategische quickscan duurt één dag, een volledig strategisch plan gemiddeld zes tot twaalf weken en een organisatieveranderingstraject kan zes tot twaalf maanden omvatten. Wij stemmen de scope altijd af op uw tijdlijn en behoeften."


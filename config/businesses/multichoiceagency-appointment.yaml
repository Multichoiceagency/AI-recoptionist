after_hours_message: |
  De planningsafdeling is bereikbaar maandag t/m vrijdag van 09:00 tot 17:00 en zaterdag van 09:00 tot 13:00.
  Laat uw naam, telefoonnummer en het type afspraak dat u wilt boeken achter.
  Sophie belt u de volgende ochtend terug om een passend moment in te plannen.


faqs:
  - question: "Kan ik een afspraak maken?"
    answer: "Natuurlijk! Ik plan dat graag voor u in. Mag ik vragen wat voor soort gesprek u zoekt — een kennismaking, projectbespreking of technische support? Dan zet ik u door naar de juiste persoon."

  - question: "Is het gesprek online of op kantoor?"
    answer: "Beide zijn mogelijk. We hebben kantoren in Rotterdam (Otto Reuchlin 1008) en Delft (Elektronicaweg 2). Online gaat via Teams of Zoom. Wat heeft uw voorkeur?"

  - question: "Hoe snel kan ik een afspraak krijgen?"
    answer: "Wij proberen u altijd binnen 48 uur te helpen. Voor urgente zaken kunnen we soms al dezelfde dag of de volgende ochtend iets inplannen. Laat me even in de agenda kijken."

  - question: "Is het gesprek gratis?"
    answer: "Ja, het eerste kennismakingsgesprek is altijd volledig gratis en vrijblijvend. Geen verplichtingen."

  - question: "Kan ik afzeggen of verzetten?"
    answer: "Uiteraard. U kunt bellen of mailen (info@multichoiceagency.nl) om te verzetten. We vragen u dit minimaal 24 uur van tevoren te doen, dan kunnen we de tijd aan een andere klant geven."

  - question: "Met wie spreek ik?"
    answer: "Voor salesgesprekken bent u met Mark — onze sales specialist. Voor technische vragen met Tom. Voor strategische gesprekken plannen we u in bij de directie. Wat zoekt u?"

  - question: "Kan ik ook 's avonds of in het weekend terecht?"
    answer: "We zijn formeel gesloten na 17:00 en op zondag. Op zaterdag tot 13:00. Voor specifieke verzoeken kijken we altijd wat mogelijk is — laat het me weten."

  - question: "Hoe bevestigen jullie de afspraak?"
    answer: "U ontvangt direct na het inplannen een bevestigingsmail met alle details, en een herinnering de dag voor de afspraak. Voor online gesprekken sturen we ook de Teams- of Zoomlink mee."


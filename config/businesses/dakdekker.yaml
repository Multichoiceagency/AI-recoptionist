faqs:
  - question: "Mijn dak lekt na de storm, kunnen jullie snel komen?"
    answer: "Ja, bij stormschade geven we prioriteit. We proberen dezelfde dag of de volgende werkdag een inspectie te doen. Onze schadespecialist Van Dijk kan ook het verzekeringstraject voor u opstarten. Wilt u dat ik een urgente afspraak inplan?"
  - question: "Wat kost een dakinspectie?"
    answer: "Een dakinspectie is bij ons volledig gratis en vrijblijvend. Dakdekker Visser inspecteert uw dak en maakt een gedetailleerd conditierapport. Binnen 2 werkdagen ontvangt u een schriftelijke offerte op basis van de bevindingen."
  - question: "Hoe lang gaat een bitumendak mee?"
    answer: "Een goed aangelegd bitumendak gaat gemiddeld 20 tot 25 jaar mee. Wij geven 10 jaar garantie op nieuw aangebrachte bitumendaken. Regelmatig onderhoud kan de levensduur aanzienlijk verlengen. We adviseren een dakinspectie elke 5 jaar."
  - question: "Werken jullie samen met verzekeringen voor stormschade?"
    answer: "Ja, we werken nauw samen met alle grote verzekeraars. Schadespecialist Van Dijk maakt een professioneel schadebestek en communiceert rechtstreeks met uw verzekeraar. Klanten hoeven hier zelf weinig voor te doen."
  - question: "Kunnen jullie ook dakisolatie plaatsen?"
    answer: "Zeker. We plaatsen dakisolatie in diverse uitvoeringen: PUR-schuim, PIR-platen, en minerale wol. Een goed geïsoleerd dak kan tot 30% energiebesparing opleveren. We adviseren u graag over de beste oplossing voor uw situatie."
  - question: "Doen jullie ook dakkapellen plaatsen of renoveren?"
    answer: "Ja, zowel nieuwe dakkapellen als renovaties van bestaande dakkapellen. Zinkmonteur Hendriks is gespecialiseerd in de dakaaansluiting en het zinkwerk rondom de dakkapel. We werken samen met timmerbedrijven voor de dakkapelconstructie zelf."
  - question: "Hoe snel kunnen jullie starten met het werk?"
    answer: "Voor regulier werk hebben we momenteel een wachtlijst van 2 tot 3 weken. Voor urgente lekkages en stormschade proberen we binnen 24 tot 48 uur te komen. Na de inspectie plannen we het werk zo snel als materialen beschikbaar zijn."
  - question: "Doen jullie ook mosverwijdering en dakreiniging?"
    answer: "Ja, we reinigen daken van mossen, algen en aanslag met professionele apparatuur. Na de reiniging brengen we een biocide coating aan die het dak jarenlang mos- en algvrij houdt. Vraag naar onze onderhoudscontracten voor jaarlijkse reiniging."


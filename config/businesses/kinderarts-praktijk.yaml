after_hours_message: |
  Kindergeneeskunde Praktijk is momenteel gesloten. Onze openingstijden zijn maandag tot en met
  donderdag van 08:00 tot 17:00 en vrijdag van 08:00 tot 16:00.
  Heeft uw kind acute medische hulp nodig buiten onze openingstijden?
  Bel dan de huisartsenpost via 0900-8844 of ga bij ernstige klachten direct naar de spoedeisende
  hulp van het Radboudumc. Bij levensbedreigende situaties belt u altijd 112.
  Voor niet-urgente vragen kunt u een bericht inspreken.


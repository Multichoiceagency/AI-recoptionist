faqs:
  - question: "Hoe maak ik een afspraak voor mijn kind?"
    answer: "Bel ons op werkdagen van 08:00 tot 17:00. U heeft een verwijsbrief van de huisarts nodig voor een vergoede afspraak bij Dr. Peeters. Voor spoed proberen we u dezelfde dag te helpen."
  - question: "Heb ik een verwijzing van de huisarts nodig?"
    answer: "Ja, voor gespecialiseerde kindergeneeskunde is een verwijsbrief van de huisarts vereist voor vergoeding via de basisverzekering. Bij acute situaties maken we altijd ruimte, ook zonder verwijzing."
  - question: "Wat zijn de symptomen waarbij ik direct 112 moet bellen?"
    answer: "Bel 112 bij benauwdheid of blauw worden, onafbreekbare stuipen, bewusteloosheid, ernstig trauma of brandwonden, of wanneer uw kind opeens erg ziek en slap wordt."
  - question: "Worden kindergeneeskunde afspraken vergoed?"
    answer: "Ja, kindergeneeskunde is volledig gedekt door de basisverzekering voor kinderen t/m 17 jaar. Kinderen hebben geen eigen risico. Een verwijsbrief van de huisarts is wel vereist."
  - question: "Mijn kind heeft last van astma. Kunnen jullie helpen?"
    answer: "Ja, Dr. Peeters is gespecialiseerd in kindastma. We stellen een behandelplan op, begeleiden bij het correct gebruik van inhalers en bewaken de longfunctie. Vera begeleidt de dagelijkse medicatietoediening."
  - question: "Ik denk dat mijn kind ADHD heeft. Hoe werkt de diagnose?"
    answer: "Bij vermoeden van ADHD wordt er een uitgebreide observatie en vragenlijstonderzoek gedaan. Dr. Peeters werkt samen met kinderpsychologen voor diagnose en behandeling. Een verwijzing van de huisarts is het startpunt."
  - question: "Hoe laat moet ik bellen bij hoge koorts bij een baby?"
    answer: "Bel ons direct of de huisartsenpost bij koorts bij een baby onder de 3 maanden (boven 38 graden). Bij kinderen ouder dan 3 maanden: bel bij koorts boven 40 graden, of als de koorts langer dan 5 dagen aanhoudt."
  - question: "Bieden jullie ook vaccinaties aan?"
    answer: "Ja, Vera voert alle vaccinaties uit van het Rijksvaccinatieprogramma, evenals inhaalvaccinaties en reisvaccinaties. Neem het vaccinatieboekje van uw kind mee."
  - question: "Mijn kind heeft een voedselallergie. Kunnen jullie helpen?"
    answer: "Ja, Dr. Peeters verricht allergieonderzoek en begeleidt bij de behandeling van voedselallergieën. We geven ook advies over het omgaan met allergieën op school en BSO."
  - question: "Hoe lang duurt een reguliere afspraak bij de kinderarts?"
    answer: "Een standaard consult duurt 20 tot 30 minuten. Voor een uitgebreid onderzoek of intake rekent u op 45 tot 60 minuten. Kom bij voorkeur met de verwijsbrief en het vaccinatieboekje."


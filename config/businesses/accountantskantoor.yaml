after_hours_message: |
  Accountancy Firma Dijkstra is momenteel gesloten. Onze kantooruren zijn maandag tot en met
  donderdag van 09:00 tot 17:30 uur en vrijdag van 09:00 tot 17:00 uur. U kunt na de pieptoon
  uw naam, telefoonnummer en de reden van uw aanvraag inspreken. Wij nemen de eerstvolgende
  werkdag contact met u op. U kunt ook een e-mail sturen naar ons kantoor. Hartelijk dank.


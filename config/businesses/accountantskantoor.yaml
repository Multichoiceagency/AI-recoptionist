faqs:
  - question: "Wanneer moet ik mijn jaarrekening deponeren?"
    answer: "Voor BV's geldt een wettelijke termijn van 12 maanden na afloop van het boekjaar voor het deponeren bij de KvK, maar de publicatietermijn is in de meeste gevallen 8 maanden. Wij adviseren u zo vroeg mogelijk te starten. Neem contact op zodat wij de planning voor uw jaarrekening kunnen bepalen."
  - question: "Kunnen jullie ook mijn belastingaangifte doen?"
    answer: "Ja, wij verzorgen zowel inkomstenbelasting (IB) voor particulieren, zzp'ers en eenmanszaken als vennootschapsbelasting (VPB) voor BV's en NV's. Wij zorgen voor een optimale aangifte en attenderen u op aftrekposten en fiscale kansen die u wellicht mist."
  - question: "Ik ben zzp'er, wat kan jullie kantoor voor mij doen?"
    answer: "Als zzp'er kunt u bij ons terecht voor uw volledige administratie: facturering, boekhouding, btw-aangifte, inkomstenbelasting en advies over de Zelfstandigenaftrek en MKB-winstvrijstelling. Wij hebben speciale pakketten voor zzp'ers afgestemd op uw situatie."
  - question: "Hoe werkt de loonadministratie?"
    answer: "Wij verwerken maandelijks de salarisgegevens van uw medewerkers, stellen loonstroken op, verzorgen de loonaangifte bij de Belastingdienst en stellen jaaropgaven op. Wij werken met moderne salarissoftware en rapporteren overzichtelijk. U hoeft zich nergens zorgen over te maken."
  - question: "Kunnen jullie ook mijn btw-aangifte verzorgen?"
    answer: "Ja, wij verzorgen btw-aangiften op maand-, kwartaal- of jaarbasis, afhankelijk van uw omzet en categorie. Wij controleren ook op suppletie-aangiften indien nodig en adviseren over btw-optimalisaties voor uw bedrijf."
  - question: "Wat zijn jullie tarieven?"
    answer: "Onze tarieven zijn afhankelijk van de omvang van uw administratie en de gewenste diensten. Voor zzp'ers beginnen onze all-in pakketten vanaf een vast maandbedrag. Voor MKB-ondernemingen werken wij op basis van maatwerk. Ik plan graag een kennismakingsgesprek in zodat wij u een passende offerte kunnen doen."
  - question: "Ik heb een brief van de Belastingdienst ontvangen, wat nu?"
    answer: "Geen zorgen. Wij helpen u graag bij het beoordelen en beantwoorden van correspondentie van de Belastingdienst. Of het nu gaat om een naheffing, bezwaarschrift of informatieverzoek — onze belastingspecialist bekijkt de brief en adviseert de beste aanpak."
  - question: "Kunnen jullie ook mijn boekhouding overnemen van een ander kantoor?"
    answer: "Ja, wij nemen regelmatig administraties over van andere kantoren of van ondernemers die zelf geboekt hebben. Wij zorgen voor een soepele overgang en controleren de historische administratie op volledigheid en juistheid. Dit verloopt altijd in goed overleg."
  - question: "Hoe veilig zijn mijn financiële gegevens bij u?"
    answer: "Wij behandelen alle financiële gegevens strikt vertrouwelijk conform de beroepsregels van de Nederlandse Beroepsorganisatie van Accountants (NBA) en de AVG. Onze systemen zijn beveiligd en wij werken met versleutelde communicatie. Uw gegevens worden nooit gedeeld met derden zonder uw toestemming."

messages:

faqs:
  - question: "Mijn kind heeft moeite met wiskunde op de middelbare school, kunnen jullie helpen?"
    answer: "Ja, zeker! Bijlesdocent Mark is gespecialiseerd in wiskunde van VMBO tot VWO. We beginnen altijd met een gratis proefles om te zien waar de kennishiaten zitten. Daarna stellen we een persoonlijk leerplan op. Resultaten zijn gemiddeld zichtbaar binnen 4 tot 6 weken."
  - question: "Geven jullie ook bijles voor de basisschool?"
    answer: "Ja, we begeleiden leerlingen vanaf groep 3 t/m groep 8. We zijn gespecialiseerd in rekenen, technisch lezen, begrijpend lezen en spelling. Bij de Cito-voorbereiding hebben we speciale intensieve trajecten beschikbaar."
  - question: "Wat kost bijles bij Leerlicht?"
    answer: "Individuele bijles kost €35 tot €45 per uur, afhankelijk van het niveau. Groepsbijles (2-4 leerlingen) is €22 tot €28 per leerling per uur. We bieden altijd een gratis proefles aan als kennismaking. Met een 10-lessenkaart krijgt u 10% korting."
  - question: "Bieden jullie ook online bijles aan?"
    answer: "Ja, ons online tutor team geeft lessen via Teams of Zoom voor alle vakken en niveaus. Online bijles is even effectief als op locatie en biedt meer flexibiliteit qua tijdstippen. Tarieven zijn gelijk aan reguliere bijles."
  - question: "Mijn kind heeft dyslexie, kunnen jullie daarmee omgaan?"
    answer: "Ja, Taalcoach Yasmine is gespecialiseerd in dyslexiebegeleiding en heeft aanvullende certificering. We werken met erkende dyslexiemethodes en geven ook advies aan ouders over hoe ze thuis kunnen ondersteunen. Informeer naar onze dyslexiepakketten."
  - question: "Hoe snel zie ik resultaten?"
    answer: "De meeste leerlingen laten al na 4 tot 6 weken merkbare verbetering zien. Na elke les ontvangt u een voortgangsrapport via onze online portal. Na 4 weken plannen we een evaluatiegesprek. Transparantie over de voortgang is voor ons essentieel."
  - question: "Kan ik ook tussentijds stoppen als het niet bevalt?"
    answer: "Ja, wij werken zonder langlopende contracten. U kunt per les afrekenen of een lessenkaart kopen. Opzeggen kan altijd, zonder opzegtermijn. We vinden het echter fijn als u ons laat weten waarom, zodat we onze service kunnen verbeteren."
  - question: "Geven jullie ook bijles voor HBO of universiteit?"
    answer: "Ja, we hebben tutors met universitaire achtergrond voor statistiek, methoden van onderzoek, academisch schrijven en vakspecifieke ondersteuning voor economie, rechten en technische studies. Informeer naar beschikbaarheid en tarieven."


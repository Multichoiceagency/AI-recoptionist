faqs:
  - question: "Hoe vaak moet mijn auto voor APK?"
    answer: "Een nieuwe auto hoeft de eerste 4 jaar niet voor APK. Daarna is de APK jaarlijks verplicht. Wij sturen u een herinnering als wij uw gegevens in ons systeem hebben staan. De APK-keuring kost bij ons circa 35 tot 45 euro inclusief RDW-keuringskosten."

  - question: "Mijn storingsmelding brandt, hoe urgent is dat?"
    answer: "Dat hangt af van welk lampje het is. Een oranje motorlampje betekent dat er een fout is geregistreerd maar dat de auto nog rijdbaar is. Een rood lampje of olielampje betekent direct stoppen. Wij lezen de foutcodes gratis uit, ook zonder afspraak. Kom gerust even langs of bel ons voor een snelle beoordeling."

  - question: "Verliezen mijn garantie als ik niet bij de dealer ga?"
    answer: "Nee. Europese wetgeving (blokuitzondering) stelt dat uw fabrieksgarantie geldig blijft als wij originele of gelijkwaardige kwaliteitsonderdelen gebruiken en het onderhoud conform de onderhoudsschema's uitvoeren. Wij registreren alle werkzaamheden digitaal zodat u altijd bewijs heeft."

  - question: "Wat kost een airco service?"
    answer: "Een airco-service inclusief gasvulling, reinigen en desinfecteren kost bij ons 89 euro inclusief BTW. Wij adviseren dit elke 2 jaar of bij merkbaar verminderd koelrendement. Als er een lek is voegen wij eerst sporingsgas toe om de locatie te vinden. Dat kost extra maar voorkomt dat u steeds opnieuw gas bij moet vullen."

  - question: "Kunnen jullie ook elektrische auto's onderhouden?"
    answer: "Ja. Wij hebben monteurs die gecertificeerd zijn voor elektrische en hybride voertuigen. Wij kunnen remmen, banden, koelsysteem en de meeste elektrische systemen onderhouden. Voor accuproblemen of hogespanningssystemen werken wij samen met een gespecialiseerde EV-garage in de regio."

  - question: "Hoe lang duurt een grote beurt?"
    answer: "Een grote beurt duurt gemiddeld 3 tot 4 uur. Wij hebben een wachtruimte met koffie of wij kunnen u een vervangende auto of vervoer naar het centrum regelen. Bel vooraf zodat wij goed kunnen plannen en onderdelen op voorraad kunnen hebben."

  - question: "Bieden jullie een ophaal- en brengservice?"
    answer: "Ja. Binnen een straal van 15 kilometer rond Breda halen wij uw auto op aan huis of op uw werkadres en bezorgen hem na de werkzaamheden weer terug. Hier zijn beperkte kosten aan verbonden afhankelijk van de afstand. Vraag René om de exacte kosten bij het maken van de afspraak."

  - question: "Wat kost een distributieriem vervangen?"
    answer: "De kosten voor een distributieriem hangen sterk af van het merk en model. Gemiddeld liggen de kosten tussen de 350 en 750 euro inclusief onderdelen en arbeid. Wij geven altijd een schriftelijke kostenopgave voor akkoord. Niet tijdig vervangen kan leiden tot motorschade van duizenden euros, dus het is echt een investering."


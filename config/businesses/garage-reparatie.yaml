after_hours_message: |
  U heeft AutoService Centrum Nederland Breda bereikt buiten onze openingstijden. Wij zijn
  bereikbaar van maandag tot en met vrijdag van 8 tot 17:30 uur en zaterdag van 8:30 tot 14 uur.
  Laat uw naam, kenteken en een omschrijving van uw probleem achter en wij bellen u de
  volgende ochtend direct terug. Bij pech onderweg kunt u de ANWB bellen via 0800-0888.


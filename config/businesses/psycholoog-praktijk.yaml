after_hours_message: |
  PsychoWell Praktijk is momenteel gesloten. Onze telefonische bereikbaarheid is maandag tot en met
  woensdag en vrijdag van 09:00 tot 17:00, donderdag van 09:00 tot 20:00.
  Heeft u een psychische crisis of bent u in nood? Bel dan 113 (Zelfmoordpreventie) of 0800-0113 —
  deze lijn is 24 uur per dag, 7 dagen per week bereikbaar. Bij direct gevaar belt u 112.
  Voor een niet-urgente vraag of aanmelding kunt u een bericht inspreken — wij nemen de volgende
  werkdag contact met u op.


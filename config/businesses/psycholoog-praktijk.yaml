faqs:
  - question: "Hoe meld ik me aan voor psychologische hulp?"
    answer: "U kunt ons bellen of een aanmeldformulier invullen via onze website. We hebben een verwijsbrief van uw huisarts nodig voor vergoeding via uw zorgverzekering. Na aanmelding plaatsen we u op de wachtlijst en plant Lisa een intakegesprek in."
  - question: "Heb ik een verwijzing van de huisarts nodig?"
    answer: "Ja, voor vergoeding vanuit de basisverzekering heeft u een verwijsbrief van uw huisarts nodig. Heeft u geen verwijzing, dan kunt u ook zelf betalen. Vraag ons naar de tarieven."
  - question: "Wat wordt vergoed door mijn zorgverzekering?"
    answer: "Psychologische zorg via de Basis GGZ of Gespecialiseerde GGZ wordt vergoed vanuit de basisverzekering, na aftrek van uw eigen risico. We werken samen met de meeste zorgverzekeraars."
  - question: "Hoe lang zijn de wachttijden?"
    answer: "De wachttijden variëren. We informeren u bij aanmelding over de actuele verwachting. Bij ernstige klachten kijken we altijd of we u eerder kunnen helpen via ons spoedintake-protocol."
  - question: "Behandelen jullie ook burnout?"
    answer: "Ja, Martijn is gespecialiseerd in burnout en werkstress. Hij begeleidt u bij herstel, stressmanagement en re-integratietrajecten, eventueel in samenwerking met uw bedrijfsarts."
  - question: "Wat is EMDR?"
    answer: "EMDR staat voor Eye Movement Desensitization and Reprocessing. Het is een wetenschappelijk bewezen methode voor de behandeling van trauma en PTSS. Dr. Bakker is hierin gecertificeerd."
  - question: "Bieden jullie ook relatietherapie aan?"
    answer: "Ja, Martijn biedt relatietherapie aan voor koppels. Dit omvat systeemtherapie, communicatietraining en conflictbegeleiding. Beide partners nemen deel aan de sessies."
  - question: "Hoe verloopt de intake?"
    answer: "De intake duurt 60 tot 90 minuten en wordt afgenomen door Lisa. Ze stelt vragen over uw klachten, achtergrond en hulpvraag. Op basis hiervan wordt een behandeladvies gegeven en wordt u gekoppeld aan de juiste behandelaar."
  - question: "Is mijn gesprek vertrouwelijk?"
    answer: "Ja, alles wat u bespreekt met onze behandelaars is strikt vertrouwelijk. We werken volgens de beroepscode van het NIP (Nederlands Instituut van Psychologen) en de AVG-privacywetgeving."
  - question: "Wat doe ik als ik in een crisis zit buiten openingstijden?"
    answer: "Bel bij een psychische crisis 113 of 0800-0113 (Zelfmoordpreventie), 24 uur per dag bereikbaar. Bij direct gevaar voor uzelf of anderen belt u altijd 112."


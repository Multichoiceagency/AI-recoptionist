faqs:
  - question: "Wat kost een lidmaatschap bij FitLife?"
    answer: "Wij bieden maand- en jaarabonnementen aan in verschillende prijsklassen. Er zijn kortingen voor studenten en jongeren. Bel ons voor de actuele tarieven of bekijk onze website. We bieden ook een gratis proefdag aan."
  - question: "Kan ik eerst een keer proberen voordat ik lid word?"
    answer: "Ja, absoluut! Wij bieden een gratis proefdag aan zodat u zelf kunt ervaren hoe fijn onze sportschool is. Geheel vrijblijvend, zonder verplichtingen. Bel ons of vraag het aan via de website."
  - question: "Zijn groepslessen inbegrepen in het lidmaatschap?"
    answer: "Ja, bij alle lidmaatschapsvormen zijn alle groepslessen inclusief. We bieden meer dan 30 lessen per week aan, van yoga en pilates tot bootcamp, HIIT, bodypump en spinning."
  - question: "Hoe vroeg is de sportschool open?"
    answer: "Doordeweeks openen wij om 06:00 uur — ideaal voor een vroege ochtendsessie voor het werk. In het weekend zijn we open vanaf 08:00 uur."
  - question: "Bieden jullie personal training aan?"
    answer: "Ja! Personal Trainer Sara biedt individuele trainingssessies en persoonlijke trainingsschema's aan. Bel voor een vrijblijvend kennismakingsgesprek om uw doelen te bespreken."
  - question: "Kan ik ook voedingsadvies krijgen?"
    answer: "Ja, onze voedingscoach stelt persoonlijke voedingsplannen op die aansluiten bij uw sportdoelen. Dit is een betaalde dienst los van het lidmaatschap. Neem contact op voor meer informatie."
  - question: "Is er een kleedkamer en douche aanwezig?"
    answer: "Ja, wij hebben ruime, schone kleedkamers met douches voor heren en dames. Er zijn ook lockers beschikbaar. Handdoeken kunt u huren bij de receptie."
  - question: "Kunnen ouderen ook bij jullie sporten?"
    answer: "Absoluut! Bij ons is iedereen welkom, alle leeftijden en niveaus. Wij bieden ook speciale lessen aan die geschikt zijn voor 55-plussers, zoals gentle yoga, aquafitness en rustige conditielessen."
  - question: "Hoe kan ik mijn lidmaatschap opzeggen?"
    answer: "Een maandabonnement kan maandelijks worden opgezegd met één kalendermaand opzegtermijn. Een jaarabonnement loopt voor de overeengekomen periode en is daarna maandelijks opzegbaar. Neem contact op met de receptie."


after_hours_message: |
  Goedendag, u heeft FitLife Sportschool in Zoetermeer gebeld. Op dit moment is onze receptie gesloten.
  De sportschool is doordeweeks open van 06:00 tot 23:00 uur en in het weekend van 08:00 tot 21:00 uur.
  Wilt u informatie over een lidmaatschap of een proefdag aanvragen? Spreek uw naam en telefoonnummer
  in na de toon — wij bellen u de eerstvolgende werkdag terug.
  U kunt ook een gratis proefdag aanvragen via onze website. Wij motiveren u graag verder!


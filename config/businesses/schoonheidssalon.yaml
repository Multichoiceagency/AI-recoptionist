faqs:
  - question: "Hoe maak ik een afspraak?"
    answer: "U kunt bellen tijdens onze openingstijden of online een afspraak inplannen via onze website. Voor microblading en permanent make-up is een consult verplicht vooraf."
  - question: "Wat is een HydraFacial en wat doet het voor mijn huid?"
    answer: "De HydraFacial is een geavanceerde vacuüm-hydraterende behandeling die in drie stappen de huid reinigt, exfolieert en intensief hydrateert. Het resultaat is direct zichtbaar: stralende, gladde huid zonder roodheid."
  - question: "Wat is BB Glow?"
    answer: "BB Glow is een semi-permanente foundation behandeling waarbij pigment in de huid wordt aangebracht via microneedling. Het egaliseer de huidskleur en geeft een natuurlijke, gezonde uitstraling voor 3 tot 6 maanden."
  - question: "Hoe lang duurt microblading en is het pijnlijk?"
    answer: "Een microblading afspraak duurt inclusief consult en behandeling circa 2,5 uur. Er wordt een verdovende crème gebruikt zodat de behandeling zo comfortabel mogelijk is. Een nazorgafspraak na 4-6 weken is inbegrepen."
  - question: "Is waxen beter dan epileren of scheren?"
    answer: "Waxen verwijdert haar vanaf de wortel, waardoor het haar langzamer teruggroeit en de huid gladder blijft. Onze Wax Expert adviseert u graag over de beste methode voor uw huidtype en lichaamsdeel."
  - question: "Bieden jullie ook wimperextensies aan?"
    answer: "Ja! Wij bieden klassieke, volume en mega volume wimperextensies aan, evenals wimperlifting en wimpertinting. Vraag naar de beschikbaarheid en prijzen bij onze receptie."
  - question: "Kan ik een cadeaubon kopen?"
    answer: "Ja, wij verkopen cadeaubonnen in verschillende waarden. Perfect als cadeau voor een verjaardag, moederdag of een andere bijzondere gelegenheid. Bel ons of vraag ernaar bij de salon."
  - question: "Zijn jullie behandelingen geschikt voor gevoelige huid?"
    answer: "Ja. Schoonheidsspecialist Lena werkt altijd met een uitgebreide huidanalyse vooraf en past de behandeling aan op uw huidtype. Bij gevoelige huid gebruiken wij mildere producten en technieken."
  - question: "Hoe lang van tevoren moet ik boeken?"
    answer: "Voor reguliere behandelingen adviseren wij 1 tot 2 weken van tevoren te boeken. Voor microblading, permanent make-up en uitgebreide behandelingen raden wij 3 tot 4 weken aan."


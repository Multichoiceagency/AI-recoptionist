after_hours_message: |
  Goedendag, u heeft Beauty Studio Glow in Amstelveen gebeld. Op dit moment zijn wij gesloten.
  Onze openingstijden zijn maandag en vrijdag van 09:00 tot 18:00 uur, dinsdag tot en met donderdag
  van 09:00 tot 20:00 uur en zaterdag van 09:00 tot 17:00 uur. Zondag zijn wij gesloten.
  Wilt u een afspraak maken of een vraag stellen? Spreek uw naam, telefoonnummer en gewenste behandeling
  in na de toon — wij bellen u de eerstvolgende werkdag terug.
  U kunt ook online een afspraak inplannen via onze website. Wij kijken ernaar uit u te verwelkomen!


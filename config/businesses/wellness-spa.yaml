faqs:
  - question: "Moet ik reserveren of kan ik ook gewoon binnenlopen?"
    answer: "Voor alle massages en behandelingen is reservering vereist. De saunafaciliteiten kunt u ook zonder reservering bezoeken, mits er voldoende capaciteit is. Bellen of online reserveren wordt altijd aangeraden."
  - question: "Wat zijn de openingstijden?"
    answer: "Wij zijn 7 dagen per week geopend van 10:00 tot 22:00 uur, ook op feestdagen. De laatste incheck voor behandelingen is om 20:00 uur."
  - question: "Bieden jullie ook koppelbehandelingen aan?"
    answer: "Ja! Onze koppelkamer is speciaal ingericht voor twee personen. U kunt samen genieten van een ontspanningsmassage, aromamassage of hotstone massage. Inclusief een privé sauna-uur op aanvraag."
  - question: "Hoe werkt een cadeaubon?"
    answer: "Cadeaubonnen zijn beschikbaar voor een vast bedrag of voor een specifieke behandeling. Ze zijn 2 jaar geldig en verkrijgbaar als digitale bon (e-mail) of als luxe fysieke bon. Bel ons of bestel via de website."
  - question: "Zijn de saunafaciliteiten inclusief bij een behandeling?"
    answer: "Bij onze dag-arrangementen is sauna-toegang inbegrepen. Bij losse behandelingen kunt u saunatoegang apart bijboeken voor een vriendelijk tarief. Vraag naar de actuele mogelijkheden."
  - question: "Is er een leeftijdsgrens voor de sauna?"
    answer: "Ja, de saunafaciliteiten zijn toegankelijk voor personen van 16 jaar en ouder. Voor massages en beauty behandelingen gelden voor minderjarigen speciale regels — neem contact op voor meer informatie."
  - question: "Wat moet ik meenemen voor een sauna bezoek?"
    answer: "U heeft een handdoek of sauna laken nodig (huurbaar bij ons), badslippers en eventueel badkleding voor het buitenterras. Alle andere faciliteiten zijn aanwezig. Sieraden kunt u het beste thuis laten."
  - question: "Zijn de behandelingen ook geschikt bij stress of burn-out?"
    answer: "Absoluut. Met name de aromamassage, hotstone massage, Yoga Nidra en sauna zijn bij uitstek geschikt voor stressvermindering en herstel. Onze therapeuten passen de intensiteit altijd aan uw behoeften aan."
  - question: "Werken jullie ook met groepen of bedrijfsevenementen?"
    answer: "Ja, wij bieden speciale groepsarrangementen aan voor verjaardagsgroepen, vrijgezellenfeesten en bedrijfsuitjes. Neem contact op voor een maatwerkaanbod voor groepen van 6 of meer personen."


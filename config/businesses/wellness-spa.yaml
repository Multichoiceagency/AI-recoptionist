  Goedenavond, u heeft Wellness Oase De Ontspanning in Maastricht gebeld.
  Op dit moment zijn wij gesloten. Wij zijn dagelijks geopend van 10:00 tot 22:00 uur, ook in het weekend.
  Wilt u een behandeling reserveren of een cadeaubon bestellen?
  Spreek uw naam, telefoonnummer en uw wens in na de toon — wij bellen u morgen terug.
  U kunt ook reserveren en cadeaubonnen bestellen via onze website. Wij kijken ernaar uit u te verwelkomen.


faqs:
  - question: "Welke soorten evenementen organiseren jullie?"
    answer: "Wij organiseren bedrijfsevenementen, bruiloften, productlanceringen, teambuilding, jubilea, borrels en veel meer. Van 10 tot meer dan 1000 personen, in Rotterdam en door heel Nederland."
  - question: "Hoe vraag ik een offerte aan?"
    answer: "U kunt bellen naar onze receptie of een aanvraagformulier invullen op onze website. Eventmanager Thomas neemt dan contact op voor een gratis oriëntatiegesprek om uw wensen te bespreken."
  - question: "Hoe ver van tevoren moet ik boeken?"
    answer: "Voor bruiloften adviseren wij 9 tot 12 maanden vooraf contact op te nemen. Voor bedrijfsevenementen rekent u op 3 tot 6 maanden. Voor kleinere borrels of netwerkevenementen kan dat korter zijn."
  - question: "Organiseren jullie ook evenementen buiten Rotterdam?"
    answer: "Ja, wij werken door heel Nederland. We hebben een uitgebreid netwerk van locaties en leveranciers in alle grote steden. Vertel ons uw wensen en wij zoeken de perfecte locatie."
  - question: "Kunnen jullie ook de catering regelen?"
    answer: "Ja, onze Catering Coördinator selecteert en begeleidt de beste cateraars passend bij uw evenement, stijl en budget. Van walking dinner tot galadiner en van brunch tot festival-catering."
  - question: "Wat kost het inhuren van een eventbureau?"
    answer: "De kosten hangen af van het type evenement, het aantal gasten en de gewenste diensten. Wij werken met transparante offertes. Bel ons voor een gratis indicatie of gebruik ons online aanvraagformulier."
  - question: "Kunnen jullie ook decoratie en styling verzorgen?"
    answer: "Ja! Ons Decoratie & Styling team creëert een complete sfeer op locatie: van thematische inrichting en bloemendecoratie tot verlichtingsconcepten en merkbeleving voor bedrijfsevents."
  - question: "Is een gratis oriëntatiegesprek mogelijk?"
    answer: "Absoluut. Wij bieden altijd een gratis en vrijblijvend oriëntatiegesprek aan met Eventmanager Thomas. Bel ons om een afspraak in te plannen of stuur uw aanvraag via de website."
  - question: "Kunnen jullie ook bij locatiezoeking helpen?"
    answer: "Ja, locatiescouting is een van onze sterkste diensten. Wij kennen de mooiste en meest unieke locaties in Rotterdam en heel Nederland, van historische panden tot industriële loodsen."
  - question: "Werken jullie ook met vaste leveranciers of kan ik mijn eigen leveranciers meenemen?"
    answer: "Beide zijn mogelijk. Wij werken met een betrouwbaar netwerk van vaste leveranciers, maar als u een voorkeur heeft voor een eigen fotograaf, DJ of cateraar, werken wij daar graag mee samen."


after_hours_message: |
  Goedendag, u heeft EventMasters Nederland gebeld. Op dit moment zijn wij gesloten.
  Onze kantooruren zijn maandag tot en met vrijdag van 09:00 tot 17:30 uur.
  Wilt u een terugbelverzoek of aanvraag achterlaten? Spreek dan uw naam, telefoonnummer
  en een korte omschrijving van uw evenement in na de toon.
  Wij bellen u de eerstvolgende werkdag terug. U kunt ook een offerte-aanvraag indienen via onze website.
  Wij verheugen ons op het organiseren van uw onvergetelijke evenement!


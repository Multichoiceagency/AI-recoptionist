faqs:
  - question: "Hoe lang duurt het schilderen van een kamer?"
    answer: "Een gemiddelde kamer schilderen (muren, plafond en schilderwerk) duurt 1 tot 2 werkdagen, afhankelijk van de staat van de muren en het aantal lagen verf. We werken met twee schilders tegelijk voor de meeste projecten zodat we snel klaar zijn."
  - question: "Geven jullie ook kleuradvies?"
    answer: "Ja, bij opdrachten boven €500 geven wij gratis kleuradvies inclusief staalkaarten en digitale kleurvisualisatie. Schilder Stevens heeft een oog voor kleur en interieur en helpt u graag de perfecte keuze te maken."
  - question: "Kunnen jullie ook houtrot herstellen?"
    answer: "Ja, wij herstellen houtrot met professionele epoxyvullers in plaats van het hout te vervangen. Dit is goedkoper, sneller en duurzamer. We behandelen het hout vervolgens met een primer en topcoat voor optimale bescherming. Bij ernstige aantasting adviseren we soms wel vervanging."
  - question: "Wanneer is het beste seizoen voor buitenschilderwerk?"
    answer: "Het beste seizoen is van april tot en met september. De temperatuur moet tussen 10 en 25 graden zijn en er mag geen neerslag verwacht worden. We plannen buitenwerk altijd aan de hand van de weersvoorspelling zodat het eindresultaat perfect is."
  - question: "Hoe lang gaat buitenschilderwerk mee?"
    answer: "Met onze A-merk verfproducten en professionele voorbereiding gaat buitenschilderwerk 6 tot 10 jaar mee. We geven 5 jaar garantie op uitgevoerd buitenschilderwerk. Regelmatig onderhoud van kozijnen verlengt de levensduur aanzienlijk."
  - question: "Kunnen jullie ook een keuken spuiten?"
    answer: "Ja, Interieurspezialist Mulder is gespecialiseerd in het spuiten van keukens. Een gespoten keuken ziet er als nieuw uit en kost een fractie van een nieuwe keuken. We werken met tweecomponentenlak voor een duurzaam resultaat. Vraag naar onze keukenschilderservice."
  - question: "Wat kost het schilderen van mijn woning van buiten?"
    answer: "De kosten voor buitenschilderwerk zijn afhankelijk van de grootte van de woning, het aantal kozijnen en de staat van het houtwerk. Een gemiddelde rijtjeswoning kost tussen de €1.500 en €3.000. We maken altijd eerst een gratis offerte op locatie."
  - question: "Moeten we de kamer leeg hebben voor de schilders?"
    answer: "U hoeft alleen de meubels van de muren af te plaatsen. Onze schilders beschermen alle meubels en vloeren met plastic afdekzeilen. Voor grotere klussen bieden we ook een service aan om meubels te verplaatsen."


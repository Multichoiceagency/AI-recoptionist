faqs:
  - question: "Hoe kan ik een kamer reserveren?"
    answer: "U kunt telefonisch reserveren via onze front desk of online via onze website. Bij direct boeken via het hotel is ontbijt altijd inbegrepen zonder extra kosten."
  - question: "Wat zijn de check-in en check-out tijden?"
    answer: "Check-in is mogelijk vanaf 15:00 uur en check-out is uiterlijk 11:00 uur. Early check-in en late check-out zijn mogelijk op aanvraag en onder voorbehoud van beschikbaarheid."
  - question: "Is ontbijt inbegrepen?"
    answer: "Ja, bij reservering via het hotel is ons uitgebreide ontbijtbuffet altijd inbegrepen. Het ontbijt wordt dagelijks geserveerd in ons restaurant van 07:00 tot 10:30 uur."
  - question: "Hebben jullie parkeerplaatsen?"
    answer: "Het hotel heeft geen eigen parkeergarage, maar er is betaald parkeren beschikbaar op loopafstand. Onze concierge helpt u graag met informatie over de dichtstbijzijnde parkeergarages en tarieven."
  - question: "Is er wifi beschikbaar?"
    answer: "Ja, gratis snel wifi is beschikbaar in alle kamers en in de gehele hotelruimte, inclusief lobby, restaurant en vergaderzalen."
  - question: "Kunnen jullie een romantisch arrangement samenstellen?"
    answer: "Absoluut! We maken graag een speciaal arrangement voor u: bloemen op de kamer, champagne bij aankomst, een romantisch diner in het restaurant. Vertel ons de gelegenheid en wij regelen de rest."
  - question: "Zijn er vergaderfaciliteiten beschikbaar?"
    answer: "Ja, wij beschikken over twee sfeervolle vergaderzalen voor 6 tot 20 personen. Inclusief beamer, scherm, flip-over en catering op aanvraag. Onze front desk geeft u graag meer informatie."
  - question: "Is het hotel huisdiervriendelijk?"
    answer: "Wij accepteren kleine huisdieren in bepaalde kamers, met een toeslag van €15 per nacht. Geef dit altijd bij reservering aan zodat wij een geschikte kamer voor u kunnen inplannen."
  - question: "Hoe ver is het hotel van het Centraal Station?"
    answer: "Het hotel ligt op circa 10 minuten loopafstand van Utrecht Centraal Station. Onze concierge regelt ook graag een taxi of deelfiets voor u."
  - question: "Bieden jullie wellness faciliteiten aan?"
    answer: "Ja, hotelgasten hebben toegang tot onze kleine maar sfeervolle wellnessruimte met sauna en stoombad. Reservering is vereist. Vraag bij de front desk naar beschikbaarheid tijdens uw verblijf."


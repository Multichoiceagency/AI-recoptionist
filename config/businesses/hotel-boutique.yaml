after_hours_message: |
  U heeft Boutique Hotel De Kanaalzijde gebeld. Op dit moment is onze front desk even niet bereikbaar,
  maar wij zijn 24 uur per dag, 7 dagen per week aanwezig voor onze hotelgasten.
  Voor dringende zaken kunt u onze nachtreceptie bereiken via de hoofdlijn.
  Wilt u een kamer reserveren of heeft u een vraag? Spreek uw naam en telefoonnummer in,
  dan bellen wij u zo spoedig mogelijk terug. U kunt ook reserveren via onze website.


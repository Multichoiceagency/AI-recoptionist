faqs:
  - question: "Hoe snel kan ExpatNL een woning voor mij vinden?"
    answer: "Afhankelijk van uw budget en wensen vinden wij gemiddeld binnen 1 tot 2 weken geschikte opties. Voor spoedgevallen kunnen wij tijdelijke oplossingen regelen binnen 48 uur. David of Nadia bespreken uw zoekprofiel en plannen direct bezichtigingen in zodra de intake is afgerond."

  - question: "Wat is een BSN en hoe vraag ik die aan?"
    answer: "Een BSN is uw Burgerservicenummer, het Nederlandse equivalent van een sofinummer. U heeft het nodig voor uw werkgever, bankrekening, zorgverzekering en belastingdienst. Ons Municipal Registration Team regelt de complete aanvraag en gemeente-afspraak voor u. Dit is doorgaans geregeld binnen 5 tot 10 werkdagen na aankomst."

  - question: "Wat is de 30-procent regeling en kom ik er voor in aanmerking?"
    answer: "De 30-procent regeling is een fiscaal voordeel voor internationaal aangetrokken werknemers in Nederland. U ontvangt tot 30 procent van uw salaris onbelast als kostenvergoeding. De aanvraag loopt via uw werkgever en de Belastingdienst. Mr. Van Osch adviseert u over de voorwaarden en begeleidt de aanvraag."

  - question: "Bieden jullie ook gemeubileerde woningen aan?"
    answer: "Ja. Wij hebben een netwerk van gemeubileerde appartementen en studio's beschikbaar voor tijdelijke verhuur van 1 tot 12 maanden. Dit is ideaal voor de periode voor uw aankomst totdat u uw permanente woning heeft gevonden. De huurprijzen voor gemeubileerde woningen liggen hoger dan ongestofferd maar bieden alles wat u direct nodig heeft."

  - question: "Werken jullie ook met bedrijven die medewerkers naar Nederland relocaten?"
    answer: "Ja. Wij bieden corporate relocation pakketten aan voor bedrijven die medewerkers naar Amsterdam of omgeving laten verhuizen. Dit omvat woningzoekopdrachten, registratiebegeleiding, school en kinderopvang advies en alle administratieve processen. Wij kunnen een raamcontract afsluiten voor regelmatige instroom van nieuwe medewerkers."

  - question: "In welke wijken van Amsterdam zoeken jullie woningen?"
    answer: "Wij zoeken in alle wijken van Amsterdam maar zijn het meest actief in de expat-preferred gebieden: Oud-Zuid, Rivierenbuurt, De Pijp, Jordaan, Amsterdam-West, de Zuidas en Amstelveen. Wij zoeken ook buiten Amsterdam in gemeenten als Haarlem, Amstelveen en Diemen indien gewenst."

  - question: "Kan ik een woning huren als ik nog niet in Nederland ben?"
    answer: "Ja, wij organiseren bezichtigingen via videobellen voor klanten die nog in het buitenland zijn. Na het tekenen van het huurcontract op afstand verzorgen wij de sleuteloverdracht en staan wij klaar om u te verwelkomen op de dag van aankomst."

  - question: "Hoe lang is een standaard huurcontract in Nederland?"
    answer: "De meeste vrije sector huurcontracten in Nederland zijn voor onbepaalde tijd met een opzegtermijn van 1 maand voor de huurder. Tijdelijke contracten van 1 tot 2 jaar zijn ook mogelijk maar worden strenger gereguleerd. Mr. Van Osch controleert elk huurcontract op oneerlijke clausules voor uw bescherming."

  - question: "Wat kost de relocation service van ExpatNL?"
    answer: "Onze basisdienst voor woning zoeken bedraagt 1 maand huur als bemiddelingsvergoeding inclusief contractcontrole. Uitgebreide relocation pakketten inclusief registratiebegeleiding starten vanaf 1.500 euro. Corporate pakketten worden op maat geprijsd. Wij sturen u graag een gedetailleerde offerte na het intake gesprek."


after_hours_message: |
  You have reached ExpatNL Housing and Relocation outside of our office hours. We are available
  Monday to Friday from 9 AM to 6 PM and Saturday from 10 AM to 3 PM. You are welcome to leave
  a message with your name, phone number, your current location and your planned arrival date
  in the Netherlands. We will call you back the next business day. You can also visit our website
  at expatnl.nl for our current property listings and relocation guides.


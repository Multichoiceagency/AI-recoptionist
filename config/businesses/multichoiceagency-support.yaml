faqs:
  - question: "Mijn website is down"
    answer: "Dit is P1 prioriteit. Ik ga dit direct escaleren. Geeft u mij uw domeinnaam en het tijdstip waarop het begon? Dan zet ik direct een technicus aan het werk. U ontvangt binnen 30 minuten een update."

  - question: "Hoe maak ik een back-up van mijn website?"
    answer: "Als u bij ons op het onderhoudscontract zit, maken wij dagelijks automatisch back-ups. Staat u er niet op, dan legt u uit hoe u dat kunt instellen in uw CMS — of we zetten u op het onderhoudscontract."

  - question: "Mijn e-mails komen niet aan"
    answer: "Dit is waarschijnlijk een DNS/SPF probleem. Controleer uw spam-map eerst. Als dat niet helpt, hebben we uw domein en hosting provider nodig om de e-mailconfiguratie te controleren."

  - question: "Kan ik zelf tekst aanpassen op mijn website?"
    answer: "Dat hangt af van uw CMS. WordPress en andere CMS-systemen die wij leveren hebben een gebruiksvriendelijk beheerpaneel. We kunnen u ook een korte instructievideo sturen."

  - question: "Hoe snel lossen jullie problemen op?"
    answer: "P1 (kritiek): < 1 uur. P2 (hoog): < 4 uur. P3 (normaal): < 24 uur. P4 (laag): volgende sprint. Wij communiceren actief over de status."

  - question: "Mijn SSL-certificaat is verlopen"
    answer: "Dit kan uw website onveilig laten verschijnen voor bezoekers. We lossen dit direct op. Bent u bij ons gehost? Dan regel ik dit vandaag nog. Bent u elders gehost? Dan sturen we u instructies."

  - question: "Wil ik een nieuwe functie toevoegen aan mijn website"
    answer: "Uitbreidingswensen zijn welkom! Ik verbind u door met Mark van ons salesteam — die kan u een offerte opstellen en de planning bespreken."

  - question: "Hebben jullie een onderhoudspakket?"
    answer: "Ja, we bieden maandelijkse onderhoudscontracten aan: updates, security, back-ups en kleine aanpassingen inbegrepen. Prijzen variëren op basis van de website. Zal ik u de informatie doorsturen?"


after_hours_message: |
  Ons supportteam is bereikbaar maandag t/m vrijdag van 09:00 tot 17:00.
  Voor kritieke storingen (P1 - website down) buiten kantooruren: stuur een e-mail naar support@multichoiceagency.nl
  met "SPOED" in het onderwerp. Wij monitoren dit en reageren zo snel mogelijk.
  Laat anders uw naam, nummer en een omschrijving van het probleem achter — wij bellen u de volgende ochtend terug.


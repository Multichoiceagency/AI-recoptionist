faqs:
  - question: "Heb ik een verwijzing nodig van de huisarts?"
    answer: "Een verwijzing is niet verplicht, maar vergroot de kans op vergoeding via uw zorgverzekering. Voor medische indicaties zoals diabetes of coeliakie is een verwijsbrief sterk aanbevolen."
  - question: "Vergoedt mijn zorgverzekering de diëtist?"
    answer: "Diëtetiek wordt vergoed via de aanvullende verzekering, doorgaans 3 tot 8 uur per jaar. Bij bepaalde medische aandoeningen wordt meer vergoed via de basisverzekering. Informeer bij uw verzekeraar."
  - question: "Wat is het verschil tussen een diëtist en een gewichtscoach?"
    answer: "Sandra is een geregistreerde diëtist met medische expertise voor behandeling van voedingsgerelateerde aandoeningen. Kim is gewichtscoach en richt zich op gedragsverandering en leefstijlbegeleiding."
  - question: "Bieden jullie ook online consulten aan?"
    answer: "Ja, we bieden uitgebreide online consulten aan via beveiligde videoverbinding. De kwaliteit is gelijkwaardig aan een fysiek bezoek en u bespaart reistijd."
  - question: "Ik heb het prikkelbare darmsyndroom (PDS). Kunnen jullie mij helpen?"
    answer: "Ja, Sandra heeft ruime ervaring met PDS en begeleiding bij het FODMAPs-dieet. Dit is een bewezen aanpak die bij veel mensen klachten aanzienlijk vermindert."
  - question: "Mijn kind heeft een voedselallergie. Kunnen jullie helpen?"
    answer: "Absoluut. We begeleiden zowel kinderen als volwassenen bij voedselallergieën en -intoleranties, inclusief gluten, lactose, noten en andere allergenen. Neem contact op voor een intake-afspraak."
  - question: "Hoe lang duurt een traject?"
    answer: "Een gemiddeld traject bestaat uit 3 tot 6 consulten, afhankelijk van uw doelen en eventuele medische situatie. Bij complexe problematiek kan dit worden uitgebreid."
  - question: "Bieden jullie ook begeleiding bij sportvoeding aan?"
    answer: "Ja, Sandra biedt gespecialiseerde sportvoedingsbegeleiding aan voor zowel recreatieve als competitieve sporters. Denk aan energiebalans, herstelprogramma's en optimale voeding rondom training."
  - question: "Wat moet ik meenemen naar de eerste afspraak?"
    answer: "Het helpt als u een voedingsdagboek van 3 dagen meeneemt. Neem ook een lijst van uw medicijnen, eventuele uitslagen van bloedonderzoek en uw verwijsbrief mee als u die heeft."
  - question: "Kan ik ook terecht voor begeleiding bij emotioneel eten?"
    answer: "Ja, Kim begeleidt specifiek bij emotioneel eten, eetgedrag en de relatie tussen emoties en voedsel. Dit gecombineerd met Sandras voedingsadvies biedt een complete aanpak."

messages:

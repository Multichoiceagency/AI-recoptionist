faqs:
  - question: "Wat kost een website?"
    answer: "Dat hangt volledig af van uw wensen. Simpele websites starten vanaf €3.000, e-commerce shops vanaf €6.000 en volledig maatwerk vanaf €10.000+. Ik stel graag een specifieke offerte op. Mag ik u een paar vragen stellen?"

  - question: "Hoe lang duurt een project?"
    answer: "Een standaard website: 4-8 weken. Een webshop: 6-12 weken. Een custom applicatie: 3-6 maanden. Spoedtrajecten zijn mogelijk. We starten altijd met een heldere planning."

  - question: "Doen jullie ook onderhoud na oplevering?"
    answer: "Absoluut. We bieden maandelijkse onderhoudscontracten aan. Updates, security patches, backups en kleine aanpassingen zijn dan altijd geregeld. Vraag ernaar in uw offerte."

  - question: "Kunnen jullie mijn bestaande website verbeteren?"
    answer: "Jazeker. We doen ook redesigns, snelheidsoptimalisatie, conversie-optimalisatie en SEO-verbeteringen op bestaande websites. Stuur me uw URL en ik kijk er gratis naar."

  - question: "Werken jullie met vaste prijzen?"
    answer: "We werken met gedetailleerde offertes, zodat u precies weet waar u aan toe bent. Geen verborgen kosten. Sommige klanten kiezen voor een uurtarief model, anderen voor een vaste projectprijs."

  - question: "Hebben jullie ervaring in mijn branche?"
    answer: "Met 900+ projecten in 10 jaar hebben we vrijwel elke branche bediend: retail, zorg, vastgoed, horeca, B2B, SaaS en meer. Ik laat u graag relevante cases zien."

  - question: "Wat is jullie minimumbudget?"
    answer: "We werken vanaf projecten van €2.500. Onder dat bedrag kunnen we u doorverwijzen naar templatebureaus. Voor serieuze groeiambities raden we een minimum van €5.000-€8.000 aan."

  - question: "Zijn jullie ook bereikbaar buiten kantooruren?"
    answer: "Voor spoedgevallen bij bestaande projecten: ja, via onze supportlijn. Voor salesgesprekken plannen we altijd een moment dat u goed uitkomt — ook 's avonds of in het weekend."


  De Kleine Wereld Kinderopvang is momenteel gesloten. Onze openingstijden zijn maandag
  t/m vrijdag van 07:00 tot 18:30 uur. Wilt u een bericht achterlaten met uw naam,
  telefoonnummer, de leeftijd van uw kind en uw gewenste startdatum? Dan neemt Janneke
  de volgende werkdag contact met u op voor een vrijblijvend kennismakingsgesprek.


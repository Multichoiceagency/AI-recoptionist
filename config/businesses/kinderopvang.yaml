faqs:
  - question: "Hoe werkt de kinderopvangtoeslag?"
    answer: "De Belastingdienst verstrekt kinderopvangtoeslag op basis van uw inkomen en het aantal uur dat u werkt. De toeslag kan tot 96% van de kosten dekken. Het maximum vergoed uurprijs voor dagopvang is €10,25. Onze administratie Miriam helpt u graag met het berekenen van uw nettodagprijs."
  - question: "Hoe lang is de wachtlijst?"
    answer: "Onze wachtlijst voor dagopvang is momenteel 4 tot 6 maanden. Voor BSO is dat gemiddeld 2 tot 4 maanden. Aanmelden is gratis en volledig vrijblijvend. We adviseren zo vroeg mogelijk te starten met de aanmelding, bij voorkeur minimaal 6 maanden voor de gewenste startdatum."
  - question: "Hoe groot zijn de groepen?"
    answer: "Onze dagopvang groepen bestaan uit maximaal 9 kinderen per PM-er voor baby's en peuters. BSO groepen hebben maximaal 12 kinderen per begeleider. We houden kleine groepen bewust klein zodat elk kind de aandacht krijgt die het verdient."
  - question: "Hoe kan ik de dagelijkse bezigheden van mijn kind volgen?"
    answer: "Via onze VKO-app ontvangen ouders dagelijks berichten, foto's en updates over hoe het met hun kind gaat. U kunt ook berichten sturen naar de PM-ers. Bij het ophalen maakt de begeleider altijd tijd voor een kort gesprek."
  - question: "Wat als mijn kind ziek is?"
    answer: "Als uw kind ziek is, vragen we u dit voor 07:30 uur te melden. Bij besmettelijke ziektes passen we de GGD-richtlijnen toe. We informeren de andere ouders discreet. Koorts boven 38,5 graden en zichtbare ziekte zijn redenen om uw kind thuis te laten."
  - question: "Geven jullie ook opvang tijdens schoolvakanties?"
    answer: "Ja, ons BSO team organiseert gevarieerde vakantie-opvang voor kinderen van 4 tot 12 jaar. Het programma is een combinatie van uitjes, sport, knutselen en spelactiviteiten. Aanmelden voor vakantieopvang gaat via de VKO-app minimaal 3 weken van tevoren."
  - question: "Zijn jullie gecertificeerd en geïnspecteerd?"
    answer: "Ja, we worden jaarlijks geïnspecteerd door de GGD en zijn ingeschreven in het Landelijk Register Kinderopvang (LRK). Onze meest recente inspectie is beschikbaar via de app. Alle PM-ers hebben minimaal diploma Pedagogisch Werk MBO niveau 3 en zijn gecertificeerd in Eerste Hulp aan Kinderen."
  - question: "Kunnen mijn kind ook flexibel worden opgevangen?"
    answer: "Ja, flexibele opvang is mogelijk op basis van beschikbaarheid. U koopt dan dagdelen of losse opvangdagen bij onze vaste contracten. Ideaal voor ouders met wisselende werkroosters of als aanvulling op uw bestaande opvang. Informeer naar beschikbaarheid bij Janneke."


after_hours_message: |
  Ons kantoor is momenteel gesloten. Onze openingstijden zijn maandag t/m vrijdag van 07:00
  tot 18:00 uur en zaterdag van 08:00 tot 14:00 uur. Voor spoedgevallen zoals een actieve
  lekkage of gesprongen leiding is onze 24/7 spoeddienst bereikbaar. Wilt u een bericht
  achterlaten of wordt u doorverbonden met onze spoeddienst?


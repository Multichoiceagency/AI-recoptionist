faqs:
  - question: "Hebben jullie een spoeddienst?"
    answer: "Ja, onze spoeddienst is 24 uur per dag, 7 dagen per week bereikbaar, ook op zon- en feestdagen. Bij acute lekkages of gesprongen leidingen sturen wij een monteur die gemiddeld binnen 60 minuten bij u is in de regio Rotterdam."
  - question: "Wat kost een loodgieter bij u?"
    answer: "Ons reguliere tarief overdag is €65 voorrijkosten plus €75 per uur inclusief BTW. Voor spoedwerk buiten kantooruren rekenen wij €175 voorrijkosten plus €95 per uur. Grotere reparaties krijgen altijd eerst een gratis vrijblijvende offerte."
  - question: "Doen jullie ook cv-ketel onderhoud?"
    answer: "Zeker. Onze CV-expert Marcel verzorgt jaarlijks onderhoud, storingen, vervanging van cv-ketels en nieuwbouwinstallaties. We werken met alle merken zoals Remeha, Intergas, Nefit en Vaillant."
  - question: "Mijn toilet is verstopt, wat moet ik doen?"
    answer: "Probeer niet te spoelen om overstroming te voorkomen. Wij sturen een monteur met professionele ontstoppingsapparatuur. In de meeste gevallen is een verstopping binnen een uur opgelost. Wilt u een afspraak inplannen?"
  - question: "Doen jullie ook badkamer renovaties?"
    answer: "Ja, wij verzorgen complete badkamers van ontwerp tot oplevering, inclusief tegelwerk, sanitair, bekabeling en afvoeren. We werken samen met vaste tegelzetters en aannemers voor een zorgeloze verbouwing."
  - question: "Hoe snel kunnen jullie komen?"
    answer: "Voor spoedwerk zijn we er gemiddeld binnen 60 minuten. Voor reguliere afspraken plannen we meestal binnen 2 werkdagen. Bij grote drukte is onze wachtlijst maximaal 2 weken."
  - question: "Geven jullie garantie op het werk?"
    answer: "Ja, wij geven 6 maanden garantie op al het uitgevoerde werk. Bij materiaalfouten verlengen we dit naar de fabrieksgarantie. Al onze monteurs zijn VCA gecertificeerd."
  - question: "Werken jullie ook met verzekeringen?"
    answer: "Ja, wij werken samen met alle grote verzekeraars voor waterschadeherstel. We maken schaderapporten en communiceren rechtstreeks met uw verzekeraar zodat u dat niet zelf hoeft te regelen."
  - question: "Doen jullie ook zonneboilers en warmtepompen?"
    answer: "Ja, we installeren zonneboilers, warmtepompen en hybride verwarmingssystemen. Marcel is gecertificeerd installateur voor duurzame energiesystemen. Vraag naar onze subsidieadviezen."


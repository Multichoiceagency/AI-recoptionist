faqs:
  - question: "Op welke leeftijd ga ik met pensioen?"
    answer: "De AOW-leeftijd is momenteel 67 jaar en wordt gekoppeld aan de gemiddelde levensverwachting. Uw werkgeverspensioen kan op een andere leeftijd ingaan, afhankelijk van uw pensioenregeling. Bert berekent uw exacte pensioendatum en totale pensioeninkomen op basis van al uw opgebouwde rechten."
  - question: "Wat verandert er door de Wet Toekomst Pensioenen?"
    answer: "De Wet Toekomst Pensioenen (Wtp), ingegaan op 1 juli 2023, verplicht pensioenfondsen en verzekeraars over te stappen naar een nieuw stelsel met meer persoonlijke pensioenrekeningen. Dit heeft gevolgen voor uw pensioenopbouw, risicodeling en transparantie. Bert legt u precies uit wat dit voor uw situatie betekent."
  - question: "Hoe kan ik mijn pensioen opvragen?"
    answer: "U kunt uw opgebouwde pensioenrechten bekijken via MijnPensioenoverzicht.nl. Dit overzicht toont al uw pensioenopbouw bij alle pensioenfondsen en verzekeraars, plus uw verwachte AOW. Wij helpen u dit overzicht te interpreteren en te analyseren of u een tekort heeft."
  - question: "Loont het om mijn pensioen over te dragen bij een nieuwe baan?"
    answer: "Waardeoverdracht is niet altijd voordelig. Of het loont, hangt af van de dekkingsgraad van uw oude pensioenfonds, de regeling bij uw nieuwe werkgever en uw persoonlijke situatie. Bert berekent precies of overdracht in uw geval voordelig is voordat u een beslissing neemt."
  - question: "Ik ben zzp'er en heb geen pensioen opgebouwd, wat kan ik doen?"
    answer: "Als zzp'er kunt u zelf pensioen opbouwen via een lijfrentepolis of bankspaarrekening (geblokkeerd sparen). De inleg is aftrekbaar in uw inkomstenbelasting als u een pensioentekort kunt aantonen (jaarruimte en reserveringsruimte). Bert berekent uw ruimte en adviseert de beste aanpak voor uw situatie."
  - question: "Wat is pensioenverevening bij scheiding?"
    answer: "Bij echtscheiding heeft uw ex-partner recht op de helft van het ouderdomspensioen dat tijdens het huwelijk is opgebouwd (standaard verevening). U kunt ook kiezen voor conversie of afwijkende afspraken in huwelijkse voorwaarden. Wij brengen de financiële gevolgen volledig in kaart."
  - question: "Kan ik eerder stoppen met werken?"
    answer: "Eerder stoppen met werken (early retirement) is mogelijk, maar heeft financiële gevolgen: u ontvangt langer pensioen uit uw pot, wat de maandelijkse uitkering verlaagt. Bert berekent hoeveel u maandelijks nodig heeft en wat de haalbaarheid is van uw gewenste pensioendatum op basis van uw volledige financiële plaatje."
  - question: "Wat doet u voor werkgevers?"
    answer: "Wij adviseren werkgevers over de keuze en inrichting van pensioenregelingen, de selectie van een pensioenuitvoerder en de transitie naar het nieuwe pensioenstelsel (Wtp). Wij verzorgen ook de communicatie richting werknemers over hun pensioenregeling en bieden individuele spreekuren aan op locatie."
  - question: "Hoe zit het met de indexatie van mijn pensioen?"
    answer: "Indexatie betekent dat uw pensioen wordt verhoogd om koopkrachtbehoud te garanderen. Of en hoeveel uw pensioen wordt geïndexeerd, hangt af van de financiële positie van uw pensioenfonds (dekkingsgraad). In het nieuwe pensioenstelsel zijn er andere mechanismen voor dit soort aanpassingen. Bert legt u graag de specifieke situatie van uw fonds uit."


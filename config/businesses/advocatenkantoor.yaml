faqs:
  - question: "Wat zijn uw tarieven?"
    answer: "Ons kantoor werkt op uurbasis. De tarieven variëren per advocaat en type zaak. Bij het eerste gesprek ontvangt u altijd een transparante kostenopgave. In sommige gevallen is een toevoeging (gefinancierde rechtshulp) mogelijk via de Raad voor Rechtsbijstand. Ik verbind u graag door voor een concreet tarievenoverzicht."
  - question: "Kan ik een eerste gratis consult krijgen?"
    answer: "Wij bieden een oriënterend kennismakingsgesprek aan van 30 minuten. De kosten hiervoor zijn beperkt en worden vooraf gecommuniceerd. Tijdens dit gesprek beoordeelt de advocaat uw situatie en adviseert over de te nemen stappen."
  - question: "Hoe snel kunt u mij helpen?"
    answer: "Bij reguliere zaken plannen wij doorgaans binnen 3 tot 5 werkdagen een eerste afspraak. Bij spoedeisende zaken — zoals ontslag op staande voet of een kort geding — streven wij ernaar u binnen 24 tot 48 uur te woord te staan."
  - question: "Mijn werkgever heeft mij ontslagen, wat moet ik doen?"
    answer: "Een ontslag is een ingrijpende situatie waarbij snel handelen van belang kan zijn. Ik raad u aan zo snel mogelijk een afspraak te maken met Mr. Van der Berg, onze specialist arbeidsrecht. Hij beoordeelt of het ontslag rechtmatig is en welke stappen u kunt ondernemen, inclusief het aanvechten van het ontslag of het onderhandelen over een ontslagvergoeding."
  - question: "Behandelt u ook echtscheidingen?"
    answer: "Ja, Ms. Koopmans is gespecialiseerd in familierecht, waaronder echtscheiding, omgangsregeling, alimentatie en voogdij. Zij begeleidt u met grote zorgvuldigheid door dit emotioneel ingrijpende proces. Wij streven altijd naar een minnelijke oplossing waar dat mogelijk is."
  - question: "Ik heb een rechtsbijstandsverzekering. Kunnen jullie daarmee werken?"
    answer: "In veel gevallen werken wij samen met rechtsbijstandsverzekeraars of kunt u vrije advocaatkeuze inroepen. Wij adviseren u contact op te nemen met uw verzekeraar om uw dekking te bevestigen. Daarna kunnen wij de samenwerking eenvoudig opstarten."
  - question: "Wat is het verschil tussen een advocaat en een mediator?"
    answer: "Een advocaat vertegenwoordigt uw belangen en adviseert u juridisch, eventueel voor de rechtbank. Een mediator begeleidt beide partijen om samen tot een oplossing te komen. Ons kantoor kan u adviseren welke aanpak in uw situatie het meest effectief is, en wij werken ook samen met erkende mediators."
  - question: "Hoe verloopt een gesprek bij u op kantoor?"
    answer: "Na uw aanmelding ontvangt u een bevestiging per e-mail met praktische informatie. Tijdens het eerste gesprek luistert de advocaat naar uw situatie, stelt verdiepende vragen en geeft u een eerste juridische beoordeling. U ontvangt achteraf een samenvatting en een voorstel voor de vervolgstappen. Alles verloopt strikt vertrouwelijk."
  - question: "Zijn mijn gegevens veilig bij u?"
    answer: "Absoluut. Ons kantoor valt onder de strikte geheimhoudingsplicht van de Nederlandse Orde van Advocaten. Al uw gegevens worden verwerkt conform de AVG. Wij delen nooit informatie met derden zonder uw expliciete toestemming."

messages:

after_hours_message: |
  Ons kantoor is momenteel gesloten. Onze openingstijden zijn maandag tot en met donderdag
  van 09:00 tot 17:30 uur en vrijdag van 09:00 tot 17:00 uur. Voor spoedgevallen buiten
  kantooruren kunt u een bericht inspreken en wij nemen zo spoedig mogelijk contact met u op.
  Heeft u een spoedeisende juridische kwestie die geen uitstel duldt? Spreek dan een gedetailleerd
  bericht in met uw naam, telefoonnummer en de aard van de kwestie.


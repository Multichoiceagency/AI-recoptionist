after_hours_message: |
  Goedendag, u heeft Smaakvol Catering & Events gebeld. Op dit moment zijn wij gesloten.
  Onze kantooruren zijn maandag tot en met donderdag van 08:30 tot 17:00 uur en vrijdag tot 16:00 uur.
  Wilt u een offerte aanvragen of een terugbelverzoek achterlaten? Spreek uw naam, telefoonnummer,
  datum van het evenement en het aantal gasten in na de toon.
  Anita neemt dan de volgende werkdag contact met u op. U kunt ook via onze website een aanvraag doen.
  Wij kijken ernaar uit om uw evenement smaakvol te verzorgen!


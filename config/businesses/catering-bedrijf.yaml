faqs:
  - question: "Voor welke gelegenheden kunnen jullie catering verzorgen?"
    answer: "Wij verzorgen catering voor bedrijfslunches, personeelsfeesten, bruiloften, jubilea, borrels, festivals en buitenevenementen. Van 10 tot duizenden gasten — altijd met dezelfde kwaliteit en aandacht."
  - question: "Hoe vraag ik een offerte aan?"
    answer: "Bel ons, stuur een e-mail of gebruik het aanvraagformulier op onze website. We vragen naar de datum, het type evenement, het aantal gasten en uw wensen. Anita stuurt u binnen 2 werkdagen een offerte."
  - question: "Kunnen jullie ook omgaan met allergieën en dieetwensen?"
    answer: "Ja, absoluut. Chefkok Delacroix houdt rekening met alle gangbare allergieën en dieetwensen, zoals glutenvrij, lactosevrij, vegetarisch, veganistisch en halal. Geef dit altijd bij uw aanvraag door."
  - question: "Is een proeverij mogelijk voordat wij boeken?"
    answer: "Voor grotere opdrachten (bruiloft of 50+ gasten) bieden wij een gratis proefsessie aan. Zo proeft u zelf de kwaliteit van Chefkok Delacroix voordat u een definitieve keuze maakt."
  - question: "Leveren jullie ook catering voor dagelijkse bedrijfslunches?"
    answer: "Ja, wij verzorgen dagverse maaltijden voor kantoren, inclusief levering. Denk aan lunchboxes, saladebuffet of een warme soepservice. Vraag naar onze abonnementstarieven voor vaste afname."
  - question: "Hebben jullie ook een foodtruck?"
    answer: "Ja! Onze foodtruck is populair bij bedrijfsfeesten, festivals en buitenevenementen. De truck serveert verse hapjes en gerechten die ter plekke worden bereid. Ideaal voor een ongedwongen sfeer."
  - question: "Kunnen jullie ook helpen bij het kiezen van een servicevorm?"
    answer: "Zeker. We adviseren u graag op basis van uw evenement: een walking dinner is perfect voor netwerken, een buffet voor informele sfeer, en een bediend diner voor formele gelegenheden."
  - question: "Werken jullie ook op locaties buiten Den Haag?"
    answer: "Ja, wij werken door heel de regio Haaglanden en ook op locaties elders in Nederland. Onze logistieke ploeg is volledig zelfvoorzienend met eigen keukenapparatuur."


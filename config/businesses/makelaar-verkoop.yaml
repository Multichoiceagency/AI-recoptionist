faqs:
  - question: "Wat kost een waardebepaling bij Van Dijk Makelaardij?"
    answer: "Een waardebepaling is bij ons volledig gratis en vrijblijvend. Peter of een van zijn collega's komt bij u thuis, bekijkt de woning en geeft u een nauwkeurig beeld van de marktwaarde en de beste verkoopstrategie. U bent nergens aan gebonden."

  - question: "Wat is de courtage van Van Dijk Makelaardij?"
    answer: "Onze vaste courtage bedraagt 1,2 procent van de verkoopprijs inclusief BTW. Hier is geen BTW meer bovenop. In dit tarief zijn professionele woningfotografie, publicatie op Funda en alle begeleidingskosten inbegrepen. Wij werken op basis van no cure no pay: verkoopt de woning niet, dan betaalt u niets."

  - question: "Hoe lang duurt het gemiddeld om een woning te verkopen in Amsterdam?"
    answer: "In Amsterdam staat een woning gemiddeld 12 tot 28 dagen te koop. Via Van Dijk Makelaardij verkopen wij gemiddeld in 19 dagen. Populaire wijken als de Jordaan, Rivierenbuurt en Amsterdam-Zuid gaan soms al in een weekend van de markt."

  - question: "Verkopen jullie ook buiten Amsterdam?"
    answer: "Ja, wij zijn actief in de gehele Metropoolregio Amsterdam, waaronder Amstelveen, Diemen, Almere, Haarlem, Zaandam en omliggende gemeenten. Neem contact op voor uw specifieke locatie."

  - question: "Wat is het verschil tussen een verkoopmakelaar en een aankoopmakelaar?"
    answer: "Een verkoopmakelaar helpt de huidige eigenaar om de woning zo goed en snel mogelijk te verkopen voor de best mogelijke prijs. Een aankoopmakelaar begeleidt u als koper: van het bepalen van uw zoekprofiel tot het uitbrengen van het beste bod en de begeleiding naar de notaris."

  - question: "Wordt mijn woning op Funda geplaatst?"
    answer: "Absoluut. Elke woning die wij in verkoop nemen wordt promineet op Funda gepresenteerd, de grootste woningwebsite van Nederland. Daarnaast publiceren wij op onze eigen website, social media kanalen en sturen wij de woning naar ons netwerk van geregistreerde geïnteresseerden."

  - question: "Kan ik ook terecht voor een hypotheektaxatie?"
    answer: "Voor een hypotheektaxatie verwijzen wij u door naar onze partnertaxateur die een gecertificeerd NWWI-taxatierapport kan opstellen. Wij kunnen deze contactgegevens direct naar u doorsturen."

  - question: "Hoe werkt bezichtigingen organiseren als ik verkoop?"
    answer: "Valerie verzorgt alle bezichtigingen professioneel. Zij ontvangt de geïnteresseerden, geeft een uitgebreide rondleiding en rapporteert de feedback direct aan u terug via ons online verkoopportaal. U kiest zelf welke tijdsloten beschikbaar zijn."

  - question: "Wat houdt professionele woningfotografie in?"
    answer: "Onze professionele fotograaf maakt binnenfoto's met een groothoeklens voor een ruimtelijk effect, sfeervolle buitenfoto's en optioneel drone-opnames van de omgeving. Bij aanmeldingen boven de 500.000 euro bieden wij ook een 360-graden virtuele tour aan."

  - question: "Hoe snel na de waardebepaling kunnen jullie de woning op de markt brengen?"
    answer: "Na de waardebepaling en het ondertekenen van de verkoopopdracht streven wij ernaar de woning binnen vijf tot zeven werkdagen op Funda te plaatsen. Dit inclusief fotografie en het opstellen van de verkooptekst."


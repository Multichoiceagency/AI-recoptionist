after_hours_message: |
  U bent buiten kantooruren bij Van Dijk Makelaardij. Onze openingstijden zijn maandag tot
  en met vrijdag van 9 tot 18 uur en zaterdag van 10 tot 16 uur. Wij nodigen u uit een
  bericht in te spreken met uw naam, telefoonnummer en uw vraag. Wij bellen u dan zo snel
  mogelijk de volgende werkdag terug. U kunt ook een e-mail sturen naar info@vandijkmakelaardij.nl
  of onze website bezoeken voor actueel aanbod.


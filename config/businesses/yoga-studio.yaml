after_hours_message: |
  Goedendag, u heeft YogaFlow Studio in Delft gebeld. Op dit moment zijn wij gesloten.
  Wij zijn open van maandag tot en met vrijdag van 07:00 tot 21:00 uur
  en in het weekend van 09:00 tot 18:00 uur.
  Wilt u een les boeken of heeft u een vraag? Spreek uw naam en telefoonnummer in na de toon,
  dan nemen wij de volgende werkdag contact met u op.
  U kunt ook via onze website een gratis proefles aanvragen. Wij kijken ernaar uit u te verwelkomen in onze studio.


faqs:
  - question: "Ik heb nog nooit yoga gedaan — kan ik gewoon langskomen?"
    answer: "Absoluut! Wij bieden nieuwe klanten een gratis proefles aan. We raden beginners aan te starten met onze 6-weekse beginnerscursus of een Hatha les — beide zijn toegankelijk zonder voorkennis."
  - question: "Wat moet ik meenemen naar een les?"
    answer: "Comfortabele sportkleding en een flesje water. Matten, blokken en andere hulpmiddelen zijn aanwezig in de studio. U hoeft dus niets extra's aan te schaffen."
  - question: "Welke yogastijl is geschikt voor ontspanning en stress?"
    answer: "Voor ontspanning en stressvermindering raden wij Yin yoga, Restorative yoga of Yoga Nidra aan. Deze stijlen werken diep op het zenuwstelsel en helpen bij het loslaten van spanning."
  - question: "Hoe werkt de beginnerscursus?"
    answer: "Onze beginnerscursus duurt 6 weken en bestaat uit wekelijkse lessen van 75 minuten. Elke les bouwt voort op de vorige, zodat u stap voor stap de basishouding, ademhaling en meditatie leert."
  - question: "Bieden jullie ook yoga op locatie voor bedrijven aan?"
    answer: "Ja! Onze Meditatie Coach en andere instructeurs komen op locatie bij uw bedrijf voor wekelijkse yogalessen of meditatiesessies. Dit is een effectieve investering in het welzijn van uw medewerkers."
  - question: "Kan ik ook individuele privélessen volgen?"
    answer: "Ja, privélessen zijn beschikbaar bij alle instructeurs. Ideaal als u meer persoonlijke begeleiding wilt, specifieke klachten heeft of snel vooruit wilt. Neem contact op voor beschikbaarheid en tarieven."
  - question: "Zijn er retreats of meerdaagse programma's?"
    answer: "Ja! Wij organiseren jaarlijks meerdere retreats, zowel nationaal (weekend in de natuur) als internationaal. Schrijf u in voor onze nieuwsbrief om als eerste op de hoogte te zijn van nieuwe retreats."
  - question: "Wat zijn de kosten van een abonnement?"
    answer: "Wij bieden een onbeperkte maandkaart, een 10-beurtenkaart en de mogelijkheid om losse lessen te boeken. Bel ons voor de actuele tarieven of bekijk de prijspagina op onze website."
  - question: "Kan ik yoga beoefenen als ik rugklachten heb?"
    answer: "Ja, in veel gevallen is yoga zeer goed bij rugklachten. Informeer ons van tevoren zodat de instructeur de houdingen kan aanpassen. Bij ernstige klachten raden wij aan eerst uw huisarts of fysiotherapeut te raadplegen."


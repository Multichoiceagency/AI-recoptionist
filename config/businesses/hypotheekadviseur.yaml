faqs:
  - question: "Hoeveel hypotheek kan ik maximaal krijgen?"
    answer: "De maximale hypotheek is afhankelijk van uw inkomen, eventueel uw partnerinkomen, de waarde van de woning en uw persoonlijke situatie. Als vuistregel kunt u denken aan circa vier tot vijf maal uw bruto jaarinkomen. Frank berekent uw exacte maximale hypotheek in een vrijblijvend gesprek van 45 minuten."
  - question: "Wat is het verschil tussen annuïtair en lineair aflossen?"
    answer: "Bij een annuïteitenhypotheek betaalt u elke maand hetzelfde totale bedrag, maar de verhouding tussen rente en aflossing verschuift. Bij een lineaire hypotheek lost u elke maand een vast bedrag af, waardoor uw maandlasten geleidelijk dalen. Welke vorm het beste bij u past, hangt af van uw inkomen, wensen en fiscale situatie. Frank legt dit graag persoonlijk toe."
  - question: "Kan ik mijn hypotheek oversluiten?"
    answer: "Ja, oversluiten kan interessant zijn als de huidige rentes lager zijn dan uw bestaande rentevaste periode toelaat. Wij berekenen de besparing en vergelijken dit met de eventuele boeterente bij vervroegd aflossen. In veel gevallen levert oversluiten een aanzienlijke maandlast- en totaalbesparing op."
  - question: "Ik ben zzp'er, kan ik ook een hypotheek krijgen?"
    answer: "Ja, ook als zzp'er kunt u een hypotheek krijgen. Geldverstrekkers beoordelen uw gemiddeld inkomen over de afgelopen drie jaar op basis van uw belastingaangiften. Wij hebben ruime ervaring met hypotheekaanvragen voor zelfstandigen en weten welke geldverstrekkers het gunstigst zijn voor uw situatie."
  - question: "Wat is een Nationale Hypotheek Garantie (NHG)?"
    answer: "De NHG is een garantie die u beschermt bij financiële problemen, zoals werkloosheid of echtscheiding. Als u uw woning noodgedwongen moet verkopen met restschuld, dekt de NHG dit onder voorwaarden. Bovendien profiteert u van een rentevoordeel. NHG is mogelijk voor woningen tot een bepaalde koopsom; Frank adviseert of dit in uw situatie van toepassing is."
  - question: "Hoelang duurt het hypotheekproces?"
    answer: "Van het eerste adviesgesprek tot het passeren bij de notaris duurt het gemiddeld vier tot acht weken, afhankelijk van de snelheid van de geldverstrekker en de volledigheid van uw dossier. Wij begeleiden u stap voor stap en zorgen dat alles op tijd klaar is."
  - question: "Wat kost hypotheekadvies bij HypotheekWijzer?"
    answer: "Ons eerste oriëntatiegesprek is volledig gratis en vrijblijvend. De advies- en bemiddelingskosten voor een volledige hypotheekaanvraag leggen wij transparant vast in een dienstverleningsdocument. Wij werken op basis van een vaste vergoeding, niet op provisie — uw belang staat altijd voorop."
  - question: "Kan ik ook avonds een afspraak maken?"
    answer: "Ja, op donderdag zijn wij open tot 20:00 uur. Wij begrijpen dat veel mensen overdag werken en bieden avondafspraken aan om u optimaal van dienst te kunnen zijn. Ellen plant de afspraak graag voor u in."
  - question: "Welke documenten heb ik nodig voor een hypotheekaanvraag?"
    answer: "U heeft doorgaans nodig: een geldig legitimatiebewijs, recente loonstroken (3 maanden), jaaropgave(n), werkgeversverklaring, bankafschriften, een kopie van de koopovereenkomst en een taxatierapport van de woning. Voor zzp'ers gelden aanvullende documenten. Wij sturen u na uw afspraak een complete checklist."


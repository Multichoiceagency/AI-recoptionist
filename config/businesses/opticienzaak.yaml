after_hours_message: |
  U heeft OptiekVisie Opticien bereikt buiten onze openingstijden. We zijn geopend dinsdag tot en met vrijdag
  van 09:00 tot 18:00 uur en zaterdag van 09:00 tot 17:00 uur. Op maandag en zondag zijn wij gesloten.
  U kunt ook online een afspraak maken via onze website. Wilt u een bericht achterlaten?
  Wij nemen dan de eerstvolgende werkdag contact met u op.


faqs:
  - question: "Hoe lang duurt een oogmeting?"
    answer: "Een uitgebreide oogmeting bij Opticien Van Zanten duurt gemiddeld 45 minuten. We meten zowel het vergezicht als de leesbehoefte, en bespreken de uitkomst uitvoerig met u. Wilt u een afspraak inplannen?"
  - question: "Moet ik een afspraak maken voor een oogmeting?"
    answer: "Ja, voor een oogmeting werken we altijd op afspraak. Dit zodat we voldoende tijd voor u hebben en u geen onnodige wachttijden ervaart. Ik kan direct kijken wanneer er een plek beschikbaar is bij Opticien Van Zanten."
  - question: "Worden brillen vergoed door de zorgverzekering?"
    answer: "Dat hangt af van uw verzekering en aanvullend pakket. Een deel van de glazenkosten kan vergoed worden via aanvullende verzekering. Wij werken met de meeste grote zorgverzekeraars samen. Neem uw verzekeringspas mee bij uw afspraak, dan controleren we de vergoeding voor u."
  - question: "Kunnen jullie ook contactlenzen aanpassen?"
    answer: "Ja, onze contactlensspecialist Vera verzorgt contactlensaanpassingen voor zowel nieuwe als bestaande lensdragers. We bieden dag- en maandlenzen, ook voor mensen met astigmatisme of presbyopie. Een aanpassingssessie plannen we altijd via een aparte afspraak."
  - question: "Verkopen jullie ook zonnebrillen op sterkte?"
    answer: "Absoluut. We maken zonnebrillen op maat, ook met gepolariseerde en fotochrome glazen. U kunt kiezen uit een uitgebreide collectie merkzonnebrillen of uw eigen montuur meenemen voor nieuwe glazen. Afzonderlijk of gecombineerd met uw gewone bril."
  - question: "Mijn bril is kapot, kunnen jullie die repareren?"
    answer: "In veel gevallen kunnen we een bril dezelfde dag of binnen 24 uur repareren. Onze monteur Bas is gespecialiseerd in montuurherstel, scharniervervanging en neusvleugel aanpassingen. Komt u even langs of maak een korte afspraak — we kijken direct wat haalbaar is."
  - question: "Doen jullie ook ooglaseradvies?"
    answer: "Ja, Opticien Van Zanten doet een vooronderzoek om te bepalen of u in aanmerking komt voor ooglaserbehandeling. We verwijzen daarna door naar gecertificeerde klinieken. Het adviesgesprek vindt altijd plaats tijdens een uitgebreide oogmeting."
  - question: "Ik wil een bril voor mijn kind, kan dat bij jullie?"
    answer: "Zeker. We zijn gespecialiseerd in kinderoptiek voor kinderen vanaf 6 jaar. Opticien Van Zanten heeft ervaring met kindervriendelijke metingen en we hebben een ruime keuze aan stevige, kleurrijke monturen speciaal voor kinderen. Een kindermeting duurt iets langer en we nemen daar de tijd voor."
  - question: "Welke brillenmerken verkopen jullie?"
    answer: "We voeren een zorgvuldig geselecteerde collectie van premium merken zoals Silhouette, Lindberg, Oakley, Ray-Ban, Gucci, Prada, Tom Ford en diverse Italiaanse en Deense designers. We kiezen kwaliteitsmerken die ook comfortabel en duurzaam zijn."


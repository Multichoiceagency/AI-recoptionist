after_hours_message: |
  U heeft HoorGoed Audiologisch Centrum bereikt buiten onze openingstijden. We zijn bereikbaar maandag tot en met
  vrijdag van 09:00 tot 17:00 uur en vrijdag tot 16:00 uur. Op zaterdag zijn wij bereikbaar van 09:00 tot 12:30 uur.
  Op zondag zijn wij gesloten. U kunt ook een e-mail sturen naar info@hoorgoed.nl. Wilt u een bericht achterlaten?
  Wij nemen dan de eerstvolgende werkdag contact met u op.


faqs:
  - question: "Is een gehoortest bij jullie gratis?"
    answer: "Ja, een uitgebreide gehoortest bij Audioloog De Graaf is volledig gratis en vrijblijvend. U gaat naar huis met een duidelijk beeld van uw gehoor en een persoonlijk advies. U zit nergens aan vast. Wilt u een afspraak inplannen?"
  - question: "Worden hoortoestellen vergoed door de zorgverzekering?"
    answer: "Ja, hoortoestellen worden in Nederland gedeeltelijk vergoed via de basisverzekering. De exacte vergoeding hangt af van uw verzekeraar en aanvullend pakket. Wij begeleiden u volledig bij de aanvraag en regelen de administratie. Neem uw zorgverzekeringspas mee bij uw afspraak."
  - question: "Hoe weet ik of ik een hoortoestel nodig heb?"
    answer: "Gehoorverlies manifesteert zich op verschillende manieren: mensen mompelen lijken, moeite met verstaan in rumoerige omgevingen, de tv steeds harder zetten. Een gratis gehoortest geeft uitsluitsel. Eerder ingrijpen helpt beter dan wachten tot het erger wordt."
  - question: "Kan ik een hoortoestel eerst uitproberen?"
    answer: "Absoluut. Wij bieden altijd een proefperiode van 30 dagen aan. U draagt het toestel in uw dagelijkse omgeving en bepaalt zelf of het verschil maakt. Voldoet het niet, dan betaalt u niets. Zo kunt u een weloverwogen beslissing nemen."
  - question: "Wat kost een hoortoestel?"
    answer: "Hoortoestellen variëren sterk in prijs afhankelijk van het type en de technologie. Na aftrek van de zorgverzekeringsbijdrage betaalt u een eigen bijdrage. Tijdens een gehoortest bespreekt Audioloog De Graaf welk type het beste bij uw gehoor en levensstijl past, en wat de kosten zijn."
  - question: "Hoe lang duurt een afspraak voor een gehoortest?"
    answer: "Een uitgebreide gehoortest en adviesgesprek duren ca. 60 minuten. We nemen de tijd om alle aspecten van uw gehoor te meten en de resultaten uitvoerig te bespreken. Na de test weet u precies wat uw gehoorsituatie is en welke opties er zijn."
  - question: "Mijn hoortoestel doet het niet meer, wat moet ik doen?"
    answer: "Breng het toestel langs — we bekijken direct wat er mis is. Veel problemen zijn eenvoudig opgelost: lege batterij, verstopte opening, vochtigheid. Grotere storingen sturen we op naar de fabrikant voor garantiereparatie. Bent u mobiel beperkt, dan kunnen we een huisbezoek plannen."
  - question: "Kunnen jullie ook komen als ik slecht ter been ben?"
    answer: "Ja, Audioloog De Graaf biedt huisbezoeken aan voor klanten met een mobiliteitsbeperking. We brengen alle benodigde apparatuur mee voor een volledige gehoortest en aanpassing bij u thuis. Neem contact op en we plannen dit in overleg."
  - question: "Wat is tinnitus en kunnen jullie daarmee helpen?"
    answer: "Tinnitus is een aanhoudend geluid in de oren, zoals suizen, piepen of ruisen, zonder externe bron. We bieden gespecialiseerd advies en begeleiding via Audioloog De Graaf. Soms kan een hoortoestel met maskeringsfunctie helpen. Een uitgebreid adviesgesprek is de eerste stap."


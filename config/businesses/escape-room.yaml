faqs:
  - question: "Hoeveel personen kunnen meedoen aan een escape room?"
    answer: "Elke kamer is voor groepen van 2 tot 6 personen. Jullie spelen altijd in een privé kamer — nooit met onbekenden. Voor grotere groepen van 10 of meer kunnen wij meerdere kamers gelijktijdig boeken."
  - question: "Hoe lang duurt een escape room?"
    answer: "De meeste kamers duren 60 minuten. Onze geavanceerde kamers duren 75 minuten. Reken ook 15 minuten voor de briefing vooraf en wat tijd na afloop voor foto's en een drankje."
  - question: "Welke kamer is geschikt voor beginners?"
    answer: "Voor beginners raden we 'De Vergeten Kluis' aan: een klassieke bankroof met een gemiddelde moeilijkheidsgraad. Leuk en uitdagend zonder te frustrerend te zijn. Onze Game Masters helpen jullie altijd op weg."
  - question: "Zijn de escape rooms geschikt voor kinderen?"
    answer: "Ja! Onze 'Tijdmachine Chaos' en 'Piraten van de Jordaan' zijn perfect voor kinderen vanaf 10 jaar. Kinderen onder 16 jaar mogen alleen deelnemen met een volwassene. De 'Heks van Amsterdam' is 18+ vanwege horror-elementen."
  - question: "Hoe lang van tevoren moet ik boeken?"
    answer: "Voor weekendavonden en vrijdagen adviseren wij minimaal een week van tevoren te boeken. Doordeweeks is er doorgaans meer beschikbaarheid. Online boeken kan altijd en is het snelste."
  - question: "Bieden jullie kortingen aan voor groepen?"
    answer: "Ja, bij het boeken van 2 of meer kamers tegelijk bieden wij groepskortingen aan. Vraag onze Groepsevents Specialist naar de actuele tarieven en pakketten voor teambuilding."
  - question: "Wat zijn de VR ervaringen?"
    answer: "Naast onze fysieke escape rooms bieden wij ook virtual reality escape games aan. Dit is een extra toevoeging of alternatief, perfect voor groepen die iets anders willen. Vraag naar beschikbaarheid."
  - question: "Kunnen jullie een vrijgezellenfeest arrangementen?"
    answer: "Absoluut! We hebben een speciaal VIP arrangement voor vrijgezellenfeesten: inclusief prosecco, decoratie, foto's en een eigen Game Master. Neem contact op met onze Groepsevents Specialist."
  - question: "Wat als wij vastlopen in de kamer?"
    answer: "Geen zorgen! Onze Game Masters volgen jullie via camera's en geven hints via de intercom als jullie erom vragen. Het doel is dat iedereen plezier heeft — wij zorgen ervoor dat niemand gefrustreerd de kamer verlaat."
  - question: "Is er parkeergelegenheid?"
    answer: "Er zijn betaalde parkeerplaatsen in de buurt. Amsterdam heeft ook uitstekende OV-verbindingen — wij zitten dicht bij het centrum. Bekijk onze website voor het exacte adres en routebeschrijving."


after_hours_message: |
  Hey, je hebt EscapeWorld Nederland gebeld! Op dit moment zijn we gesloten.
  Doordeweeks zijn we open van 14:00 tot 23:00 uur en in het weekend van 11:00 tot 23:00 uur.
  Wil je boeken of een vraag stellen? Spreek je naam, telefoonnummer en gewenste datum in na de toon,
  dan bellen we je zo snel mogelijk terug.
  Je kunt ook altijd 24/7 online boeken via onze website — makkelijk en snel!
  Tot snel bij EscapeWorld!


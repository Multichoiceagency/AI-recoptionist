faqs:
  - question: "Hoe ver van tevoren moet ik boeken?"
    answer: "Voor een particuliere verhuizing adviseren we minimaal 2 tot 4 weken van tevoren te boeken. In het hoogseizoen (april-september) en aan het einde van de maand zijn we snel volgeboekt. Spoedverhuizingen zijn mogelijk met een toeslag van 25%, afhankelijk van beschikbaarheid."
  - question: "Is mijn inboedel verzekerd tijdens de verhuizing?"
    answer: "Ja, alle verhuizingen zijn standaard verzekerd tot €10.000 inboedelwaarde zonder eigen risico. Voor duurdere inboedels bieden we uitgebreide dekking tot €50.000 aan. We zijn lid van de Nederlandse Erkende Verhuizers en werken altijd transparant."
  - question: "Kunnen jullie ook een piano verhuizen?"
    answer: "Ja, we zijn gespecialiseerd in pianotransport met gecertificeerde pianotransporteurs en speciaal materieel. Kosten zijn €175 tot €350 toeslag afhankelijk van het type piano en de situatie (etages, wenteltrap). Vraag naar een offerte op maat."
  - question: "Doen jullie ook bedrijfsverhuizingen?"
    answer: "Ja, we verzorgen complete bedrijfsverhuizingen inclusief ICT-apparatuur, archieven en kantoormeubilair. We plannen bij voorkeur in het weekend of na werktijd zodat uw bedrijf minimale overlast heeft. We werken met een vast projectplan en tijdschema."
  - question: "Kunnen jullie ook inpakken voor mij?"
    answer: "Ja, onze inpakservice is zeer populair. Een team van 2 personen pakt uw gehele woning professioneel in met dubbelwandig karton, airkapfolie en speciaal vaatwerk. Prijs is €450 per dag. We leveren gratis verhuisdozen. Breekbaar goed wordt speciaal verpakt met garantie."
  - question: "Hebben jullie ook opslagruimte?"
    answer: "Ja, ons klimaatgecontroleerde magazijn in Breda biedt opslag voor kortdurend en langdurig gebruik. Prijs is €8,50 per m³ per week. Uw spullen zijn beveiligd met 24/7 camerabewaking. Ideaal als er een gat zit tussen de oplevering van uw oude en nieuwe woning."
  - question: "Doen jullie ook internationale verhuizingen?"
    answer: "Ja, we verzorgen verhuizingen door heel Europa en intercontinentaal. Binnen Europa leveren wij doorgaans binnen 3 tot 7 werkdagen. Voor transporten buiten Europa regelen wij douanedocumenten en zeevracht. Vraag naar een internationale offerte."
  - question: "Wat moet ik doen met parkeren voor de verhuiswagen?"
    answer: "Wij regelen het parkeerverbod bij de gemeente voor u, inclusief de vereiste borden. Dit is inbegrepen in onze dienstverlening. Geef het adres bij boeking door en wij verzorgen de aanvraag minimaal 5 werkdagen voor de verhuisdatum."


  Het kantoor van VanderHaven Transport & Verhuis is momenteel gesloten. Onze openingstijden
  zijn maandag t/m vrijdag van 07:00 tot 18:00 uur en zaterdag van 08:00 tot 14:00 uur.
  Voor spoedverhuizingen of urgente vragen laat u een bericht achter met uw naam,
  telefoonnummer en gewenste verhuisdatum. Wij nemen dan zo snel mogelijk contact op.


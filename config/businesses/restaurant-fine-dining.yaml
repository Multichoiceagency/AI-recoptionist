faqs:
  - question: "Hoe kan ik een tafel reserveren?"
    answer: "U kunt bellen naar onze receptie, dan helpt Isabelle u direct verder. Reserveren via onze website is ook mogelijk. We adviseren minimaal 3 dagen vooruit te reserveren voor weekendavonden."
  - question: "Wat zijn jullie openingstijden?"
    answer: "Wij zijn open van dinsdag tot en met zaterdag voor het avonddiner vanaf 18:00 uur. Op donderdag en vrijdag serveren wij ook lunch van 12:00 tot 15:00. Maandag en zondag zijn wij gesloten."
  - question: "Wat kost een diner bij De Gouden Lepel?"
    answer: "Ons à la carte menu start vanaf circa €65 per persoon excl. dranken. Het chef's menu met meerdere gangen begint bij €95 per persoon. Vraag naar onze actuele menukaart voor de exacte prijzen."
  - question: "Kunnen jullie omgaan met dieetwensen en allergieën?"
    answer: "Absoluut. Chef Moreau en zijn team houden bij het bereiden van elk gerecht rekening met dieetwensen zoals glutenvrij, lactosevrij of vegetarisch. Geef dit bij reservering door zodat wij ons goed kunnen voorbereiden."
  - question: "Is er een dress code?"
    answer: "Wij vragen onze gasten om smart casual kleding te dragen, passend bij de sfeer van ons restaurant. Een shirt met kraag of nette blouse is op zijn plaats. Sportkleding wordt liever niet gedragen."
  - question: "Kunnen jullie een privé diner organiseren?"
    answer: "Ja, zeker. Onze privé-eetkamer biedt ruimte aan maximaal 12 personen voor een exclusief besloten diner. Events Coördinator Sophie denkt graag met u mee over het programma, menu en decoratie."
  - question: "Wat is het Chef's Table?"
    answer: "Het Chef's Table is onze meest bijzondere ervaring: u zit direct naast de open keuken terwijl Chef Moreau persoonlijk elk gerecht toelichst. Beschikbaar voor maximaal 6 gasten op dinsdag tot en met zaterdag."
  - question: "Bieden jullie wijnparing aan?"
    answer: "Ja! Sommelier Van Houten stelt voor elk menu een persoonlijke wijnparing samen. Dit is een prachtige toevoeging aan uw diner en kan bij reservering worden aangevraagd."
  - question: "Wat is het annuleringsbeleid?"
    answer: "U kunt kosteloos annuleren tot 48 uur voor uw reservering. Bij latere annulering of no-show wordt een bijdrage van €35 per persoon in rekening gebracht. Voor gezelschappen van 8 of meer personen vragen wij een creditcardgarantie."
  - question: "Doen jullie ook catering buiten het restaurant?"
    answer: "Ja, wij verzorgen catering op locatie voor bedrijfsevents, gala-diners en privéfeesten. Neem contact op met Events Coördinator Sophie voor een offerte en de mogelijkheden."


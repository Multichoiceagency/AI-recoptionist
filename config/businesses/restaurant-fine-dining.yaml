after_hours_message: |
  Goedenavond, u heeft Restaurant De Gouden Lepel gebeld. Op dit moment zijn wij gesloten.
  Wij zijn open van dinsdag tot en met zaterdag voor het avonddiner vanaf 18:00 uur,
  en op donderdag en vrijdag ook voor lunch van 12:00 tot 15:00 uur.
  Maandag en zondag zijn wij gesloten.
  Wilt u een reservering maken of een bericht achterlaten? Spreek dan na de toon uw naam,
  telefoonnummer en gewenste reserveringsdatum in — wij bellen u de volgende werkdag terug.
  U kunt ook reserveren via onze website. Wij verheugen ons op uw bezoek!


faqs:
  - question: "Wat kost een tegelzetter per dag?"
    answer: "Ons uurtarief voor tegelzetten is €80 per uur inclusief gereedschap. Een gemiddelde badkamer (circa 12 m² vloer en 20 m² wand) kost inclusief arbeid en materialen tussen de €1.800 en €2.800. We maken altijd eerst een gratis offerte op locatie."
  - question: "Kunnen jullie ook een keuken monteren?"
    answer: "Ja, Klusman Peter monteert keukens van alle merken. We hangen de kastjes, plaatsen het werkblad en monteren het inbouwapparatuur. De wateraansluiting en elektra laten we door een erkend loodgieter of elektricien aansluiten. Vraag naar een complete keukenmontage offerte."
  - question: "Doen jullie ook stucwerk?"
    answer: "Ja, we verzorgen glad stucwerk voor muren en plafonds. Gipsplaten worden eerst voorgespijkerd, dan gestuct en glad afgewerkt. Prijs hangt af van de oppervlakte en de staat van de ondergrond. Een gemiddelde kamer stucken kost tussen de €300 en €600."
  - question: "Wat is het verschil tussen PVC en laminaat?"
    answer: "PVC vloer is waterbestendig en daardoor ideaal voor badkamers, keukens en natte ruimtes. Laminaat is goedkoper maar kan opzwellen bij vocht. PVC is ook comfortabeler onder de voet. We leggen beide soorten vloeren en adviseren u graag welke het beste past bij uw situatie."
  - question: "Kunnen jullie ook in een huurwoning werken?"
    answer: "Ja, maar bij een huurwoning gelden soms beperkingen van de verhuurder of VVE. We adviseren u altijd om toestemming te vragen voor structurele aanpassingen. Niet-structureel werk zoals tegels, schilderwerk en vloeren is in de meeste gevallen gewoon mogelijk."
  - question: "Hoe lang duurt het plaatsen van een laminaatvloer?"
    answer: "Een gemiddelde kamer van 25 m² leggen we in een halve dag inclusief voorbereiding en plinten. Grotere oppervlakken of vloeren die eerst geëgaliseerd moeten worden kosten meer tijd. We geven altijd een realistische planning vooraf."
  - question: "Doen jullie ook kleine klusjes zoals planken ophangen?"
    answer: "Ja, ook kleine klusjes zijn welkom. We hanteren een minimumfactuur van €95 inclusief voorrijkosten voor klussen tot 1 uur. Meerdere kleine klusjes tegelijk zijn goedkoper per stuk. Maak een lijstje en we doen alles in één keer."
  - question: "Geven jullie garantie op het werk?"
    answer: "Ja, wij geven 2 jaar garantie op al het uitgevoerde werk. Als er iets mis gaat door uitvoeringsfouten, herstellen we dit kosteloos. We werken altijd met kwalitatief materiaal en professioneel gereedschap voor een duurzaam resultaat."


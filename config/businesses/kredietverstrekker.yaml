faqs:
  - question: "Hoe vraag ik een persoonlijke lening aan?"
    answer: "U kunt een persoonlijke lening aanvragen via onze website of telefonisch. U heeft nodig: een geldig legitimatiebewijs, recente loonstroken of inkomensgegevens, en eventuele informatie over bestaande financiële verplichtingen. Wij beoordelen uw aanvraag op betaalbaarheid en afloscapaciteit en geven u snel uitsluitsel."
  - question: "Wat is het verschil tussen een persoonlijke lening en een doorlopend krediet?"
    answer: "Bij een persoonlijke lening ontvangt u een vast bedrag ineens en betaalt u vaste maandelijkse termijnen over een afgesproken looptijd. Bij een doorlopend krediet heeft u een kredietlimiet waarvan u kunt opnemen en aflossen naar behoefte. Een persoonlijke lening biedt meer voorspelbaarheid; een doorlopend krediet meer flexibiliteit."
  - question: "Wordt mijn BKR-registratie gecontroleerd?"
    answer: "Ja, een BKR-toetsing is een standaard onderdeel van elke kredietaanvraag. Wij controleren het Bureau Krediet Registratie (BKR) om een verantwoorde kredietbeoordeling te kunnen maken. Een negatieve BKR-registratie betekent niet automatisch afwijzing, maar wordt meegewogen in de beoordeling."
  - question: "Kan ik ook een lening krijgen als ik zzp'er ben?"
    answer: "Ja, ook als zzp'er kunt u een aanvraag indienen. Wij beoordelen uw gemiddeld inkomen over de afgelopen jaren op basis van belastingaangiften en jaaropgaven. Arjan bespreekt graag de mogelijkheden voor uw specifieke situatie."
  - question: "Hoe snel ontvang ik een beslissing op mijn aanvraag?"
    answer: "Wij streven ernaar u binnen twee werkdagen een beslissing te geven na ontvangst van alle benodigde documenten. Bij goedkeuring ontvangt u een formele offerte. Na uw akkoord wordt het bedrag zo snel mogelijk uitbetaald."
  - question: "Kan ik mijn bestaande lening oversluiten?"
    answer: "Ja, oversluiten kan voordelig zijn als u in aanmerking komt voor een lagere rente of als u meerdere leningen wilt samenvoegen. Arjan berekent of oversluiten voor u gunstig is, rekening houdend met eventuele kosten voor vervroegd aflossen van de bestaande lening."
  - question: "Wat zijn de kosten van een lening?"
    answer: "De kosten bestaan uit de rente (uitgedrukt als jaarlijks kostenpercentage, JKP) en eventuele afsluitkosten. Wij verstrekken altijd een transparante kostenoverzicht en voldoen aan de wettelijke informatieverplichtingen (SECCI-formulier). De exacte rente is afhankelijk van het geleende bedrag, de looptijd en uw kredietprofiel."
  - question: "Wat is zakelijk krediet en voor wie is het geschikt?"
    answer: "Zakelijk krediet is financiering bestemd voor ondernemingen. Het kan worden ingezet voor investeringen in bedrijfsmiddelen, werkkapitaal, uitbreiding of overbrugging. Jeroen adviseert MKB-ondernemers over de meest passende financieringsvorm, of dat nu een zakelijke lening, rekening-courant of leasingoplossing is."


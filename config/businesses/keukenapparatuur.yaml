faqs:
  - question: "Mijn wasmachine lekt water, wat moet ik doen?"
    answer: "Schakel de wasmachine direct uit en draai de watertoevoer dicht. Neem contact met ons op — waterlekkage kan ernstige schade veroorzaken. We plannen een spoedmonteur in om de bron van het lek te vinden en te repareren. Heeft u het modelnummer bij de hand?"
  - question: "Is het goedkoper om een nieuw apparaat te kopen of te laten repareren?"
    answer: "Dat hangt af van de leeftijd van het apparaat, het merk en de aard van de storing. Vuistregel: is het apparaat ouder dan 8 tot 10 jaar en zijn de reparatiekosten meer dan de helft van de nieuwprijs, dan is nieuw vaak verstandiger. Onze monteur geeft u altijd eerlijk advies na de diagnose."
  - question: "Hoe snel kunnen jullie komen?"
    answer: "In de meeste gevallen plannen we een monteur in binnen 2 tot 3 werkdagen. Voor spoedgevallen zoals waterlekkage of defecte koelkast proberen we dezelfde of volgende dag te komen. Bel ons en we kijken direct naar de beschikbaarheid."
  - question: "Welke merken repareren jullie?"
    answer: "We repareren alle gangbare merken, waaronder Bosch, Siemens, Miele, AEG, Electrolux, Samsung, LG, Whirlpool, Hotpoint en Indesit. Voor sommige A-merken zijn we erkend servicepartner, wat betekent dat reparaties onder fabrieksgarantie bij ons terechtkomen."
  - question: "Wat kost een diagnosebezoek?"
    answer: "We rekenen een vaste diagnose- en voorrijtoeslag. De kosten voor de daadwerkelijke reparatie worden apart opgegeven. U hoeft pas te betalen als u akkoord gaat met de offerte. Geen verrassingen achteraf."
  - question: "Kunnen jullie ook nieuwe apparatuur installeren en het oude meenemen?"
    answer: "Ja, onze monteurs leveren, installeren en sluiten uw nieuwe apparaat aan. Het oude apparaat nemen we voor een kleine bijdrage mee voor verantwoorde afvoer. Gratis afvoer geldt bij aankoop van apparatuur tijdens onze periodieke acties."
  - question: "Mijn vaatwasser wast niet schoon meer, wat kan de oorzaak zijn?"
    answer: "Veelvoorkomende oorzaken zijn verstopte sproeiarms, een vol zoutreservoir, verkeerde detergentvulling of een defecte pomp. We kunnen u telefonisch een paar stappen laten controleren of een monteur inplannen voor een grondige diagnose."
  - question: "Verkopen jullie ook reserveonderdelen?"
    answer: "Ja, onze parts afdeling heeft een groot assortiment onderdelen op voorraad, waaronder filters, deurrubbers, wasmiddelbakjes, ontstekingspennen en pompen. Niet op voorraad? We bestellen het voor u — doorgaans leverbaar binnen 2 tot 5 werkdagen."
  - question: "Wat als mijn apparaat nog onder garantie staat?"
    answer: "Als uw apparaat bij ons is aangekocht, handelen we de garantie direct af. Is het elders gekocht, dan kijken we of we erkend servicepartner zijn voor dat merk. In dat geval verloopt de garantiereparatie via ons. Heeft u uw aankoopbewijs bij de hand?"


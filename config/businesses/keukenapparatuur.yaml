after_hours_message: |
  U heeft KeukenTech Service & Verkoop bereikt buiten onze openingstijden. We zijn bereikbaar maandag tot en met
  vrijdag van 08:30 tot 17:30 uur en zaterdag van 09:00 tot 14:00 uur. Bij een spoedgeval zoals waterlekkage
  schakel dan uw watertoevoer af en bel ons de eerstvolgende werkdag. Wilt u een bericht achterlaten?
  Wij nemen dan zo snel mogelijk contact met u op.


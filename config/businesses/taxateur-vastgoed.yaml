after_hours_message: |
  U heeft NL Taxaties en Advies bereikt buiten onze kantooruren. Wij zijn bereikbaar van maandag
  tot en met vrijdag van 8:30 tot 17:30 uur en op zaterdag van 10 tot 13 uur. U kunt uw
  taxatieopdracht ook 24 uur per dag indienen via ons aanvraagformulier op nltaxaties.nl.
  Laat gerust een bericht achter met uw naam, telefoonnummer, het adres van de woning en
  de reden voor de taxatie, dan nemen wij de volgende ochtend direct contact met u op.


faqs:
  - question: "Wat is het verschil tussen een gewone taxatie en een NWWI-taxatie?"
    answer: "Een gewone taxatie is een marktwaarderapport dat u kunt gebruiken voor inzicht, verkoop of WOZ-bezwaar. Een NWWI-taxatie is een speciaal gevalideerd rapport dat vereist is door vrijwel alle hypotheek geldverstrekkers in Nederland. NWWI staat voor Notariaat Woning Waarde Instituut. Ons bureau is geaccrediteerd voor NWWI-validatie."

  - question: "Hoe lang is een taxatierapport geldig?"
    answer: "Voor hypothecaire financiering is een taxatierapport doorgaans 6 maanden geldig. Na die termijn kan de geldverstrekker een update of hertaxatie vereisen. Voor andere doeleinden zoals WOZ-bezwaar of erfenis hangt de geldigheidsduur af van de specifieke situatie."

  - question: "Welke documenten heeft de taxateur nodig?"
    answer: "Wij hebben doorgaans nodig: een recente kadastrale uitdraai, splitsingstekening bij een appartement, actuele VvE-informatie inclusief servicekosten en reservefonds, eventuele bouwvergunningen voor verbouwingen en een kopie van het koopcontract bij een hypotheektaxatie. Irene stuurt u na de opdracht een complete documentenlijst toe."

  - question: "Kan ik een taxatie aanvragen voor WOZ-bezwaar?"
    answer: "Zeker. Wij stellen taxatierapporten op die gebruikt kunnen worden als onderbouwing bij een WOZ-bezwaarprocedure. Drs. Kuijpers heeft uitgebreide ervaring met bezwaarprocedures en werkt nauw samen met gespecialiseerde WOZ-adviseurs. Dit is met name interessant als uw WOZ-waarde aanzienlijk hoger is dan de marktwaarde."

  - question: "Hoe snel kan ik een taxatierapport krijgen?"
    answer: "Bij standaard opdrachten hanteren wij een doorlooptijd van 5 tot 7 werkdagen na de inspectie. Voor spoedgevallen is een rapport in 48 uur tot 3 werkdagen mogelijk tegen een spoedtoeslag. Geef bij uw aanvraag altijd de gewenste opleverdatum aan zodat wij dit kunnen inplannen."

  - question: "Taxeren jullie ook bedrijfspanden en winkels?"
    answer: "Ja. Drs. Kuijpers is ook gecertificeerd voor commercieel vastgoed zoals kantoren, winkels, bedrijfsgebouwen en gemengd gebruik. De kosten en doorlooptijd voor bedrijfspandtaxaties worden altijd op maatwerkbasis vastgesteld na een korte intake. Neem contact op voor een vrijblijvende offerte."

  - question: "Wat kost een woningtaxatie bij NL Taxaties en Advies?"
    answer: "Een standaard woningtaxatie start bij 395 euro inclusief BTW. Een NWWI-hypotheektaxatie start bij 545 euro inclusief BTW. Voor spoedtaxaties geldt een toeslag van 75 tot 150 euro. De exacte prijs is afhankelijk van het type woning, de locatie en de specifieke vereisten. Irene stuurt u graag een exacte offerte toe."

  - question: "Is jullie bureau onafhankelijk van makelaars?"
    answer: "Ja, volledig. NL Taxaties en Advies is een onafhankelijk taxatiebureau dat geen banden heeft met specifieke makelaarskantoren of geldverstrekkers. Dit is een vereiste van het NRVT en een absolute voorwaarde voor NWWI-accreditatie. Onze taxateurs zijn uitsluitend werkzaam als onafhankelijke taxateurs."

  - question: "Wat als ik het niet eens ben met de getaxeerde waarde?"
    answer: "U kunt altijd bezwaar aantekenen en de taxateur om een heroverweging vragen als u gemotiveerd kunt aantonen dat er relevante vergelijkingsobjecten zijn gemist of fouten zijn gemaakt. Wij nemen elk bezwaar serieus en gaan in gesprek om de onderbouwing toe te lichten."


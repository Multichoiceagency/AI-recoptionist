faqs:
  - question: "Wat heeft u van mij nodig voor een testament?"
    answer: "Voor het opstellen van een testament heeft de notaris een geldig legitimatiebewijs nodig (paspoort of rijbewijs) en uw burgerservicenummer (BSN). Tijdens de afspraak bespreekt u uw wensen uitgebreid met Notaris Martens. U kunt van tevoren nadenken over wie uw erfgenamen zijn, of u een executeur wilt aanwijzen en of u speciale legaten wilt vastleggen."
  - question: "Hoe lang duurt het voordat mijn testament klaar is?"
    answer: "Na de eerste besprekingsafspraak wordt het testament doorgaans binnen één tot twee weken opgesteld. U krijgt een concept ter beoordeling voordat u het passeert. Het passeren zelf duurt gemiddeld 30 minuten."
  - question: "Wat zijn de kosten voor een testament?"
    answer: "De kosten voor een enkelvoudig testament beginnen vanaf circa 250 euro, afhankelijk van de complexiteit. Wij verstrekken altijd een transparante kostenopgave vóór aanvang. Voor een nauwkeurig tarief verbind ik u graag door met ons kantoor."
  - question: "Ik ga een huis kopen, wat regelt de notaris?"
    answer: "Bij een woningaankoop verzorgt de notaris de leveringsakte (eigendomsoverdracht) en de hypotheekakte (indien van toepassing). Wij controleren het kadaster, verwerken de eigendomsoverdracht en zorgen voor inschrijving bij het Kadaster. Wij kunnen ook de koopovereenkomst beoordelen op uw verzoek."
  - question: "Kan ik huwelijkse voorwaarden opstellen na het huwelijk?"
    answer: "Ja, dat is mogelijk. Huwelijkse voorwaarden kunnen zowel vóór als na het huwelijk worden opgesteld. Dit vereist een notariële akte en goedkeuring van de rechtbank. Kandidaat-Notaris De Wit of Notaris Martens begeleidt u graag door dit proces."
  - question: "Wat is een samenlevingscontract en heb ik dat nodig?"
    answer: "Een samenlevingscontract legt juridische afspraken vast voor samenwonende partners die niet getrouwd zijn. Hierin kunt u zaken regelen zoals een verdeelsleutel voor gemeenschappelijke kosten, eigendomsrechten, zorgvolmacht en afspraken bij beëindiging van de relatie. Het is niet verplicht, maar wij raden het sterk aan."
  - question: "Iemand is overleden, wat moet ik bij u regelen?"
    answer: "Bij overlijden kan een notaris een verklaring van erfrecht opstellen, waarmee erfgenamen bewijs hebben van hun status. Wij begeleiden ook de afwikkeling van de nalatenschap, het opmaken van een boedelbeschrijving en de verdeling van de erfenis. Neem bij een overlijden zo snel mogelijk contact op; wij helpen u stap voor stap."
  - question: "Kan ik een BV oprichten bij uw kantoor?"
    answer: "Ja, Kandidaat-Notaris De Wit is gespecialiseerd in ondernemingsrecht. Wij verzorgen de oprichtingsakte voor een BV, NV of stichting. U heeft hiervoor een geldig identiteitsbewijs en uw bedrijfsplan nodig. De oprichting verloopt doorgaans binnen een week nadat alle gegevens zijn aangeleverd."
  - question: "Zijn mijn gegevens bij u veilig?"
    answer: "Ja, de notaris valt onder een wettelijke geheimhoudingsplicht (Wet op het notarisambt). Alle informatie die u met ons deelt, wordt strikt vertrouwelijk behandeld en verwerkt conform de Algemene Verordening Gegevensbescherming (AVG). Wij delen nooit informatie zonder uw toestemming."


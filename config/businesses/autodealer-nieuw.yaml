faqs:
  - question: "Welke merken verkopen jullie bij AutoDeal?"
    answer: "AutoDeal Tilburg is officieel dealer voor Volkswagen, Skoda, Seat, Cupra en Renault. Naast nieuwe auto's hebben wij meer dan 120 geselecteerde occasions op het terrein van uiteenlopende merken. U bent van harte welkom in onze showroom voor een kijkje of een proefrit."

  - question: "Kan ik mijn huidige auto inruilen?"
    answer: "Ja, zeker. Mariëlle verzorgt een snelle en eerlijke inruilwaardebepaling in de showroom in circa 20 minuten. U kunt ook onze online calculator gebruiken via autodeal-tilburg.nl voor een eerste indicatie. Inruilen is volledig vrijblijvend."

  - question: "Wat zijn de financieringsmogelijkheden?"
    answer: "Stefan Claes kan u een complete financieringsoplossing op maat aanbieden. De mogelijkheden zijn: directe aankoop, autolening vanaf 3,9 procent rente, balloon-financiering met lagere maandlasten, private lease en zakelijke lease. Stefan brengt alle opties in kaart en adviseert wat fiscaal en financieel het meest voordelig is voor uw situatie."

  - question: "Hoe lang is de levertijd van een nieuwe auto?"
    answer: "Voor modellen op voorraad kunt u direct rijden. Bij bestelwagens en specifieke uitvoeringen is de levertijd momenteel 8 tot 16 weken afhankelijk van het merk en model. Kevin informeert u bij uw voorkeur meteen over de actuele levertijd."

  - question: "Bieden jullie een proefrit aan?"
    answer: "Absoluut. Voor vrijwel elk model in ons showroomaanbod kunt u een proefrit maken. De proefrit duurt circa 20 tot 30 minuten en is volledig vrijblijvend. Kevin plant deze direct in, soms al op dezelfde dag. Neem uw rijbewijs mee."

  - question: "Welke garantie krijg ik op een occasion?"
    answer: "Alle occasions bij AutoDeal zijn voorzien van BOVAG-garantie. Standaard bieden wij 6 maanden garantie en wij geven extra 3 maanden bovenop de standaard BOVAG-garantie. Voor occasions jonger dan 3 jaar met minder dan 50.000 kilometer bieden wij een uitgebreide 12 maanden garantie."

  - question: "Is private lease ook voor particulieren mogelijk?"
    answer: "Ja. Private lease is ook uitstekend geschikt voor particulieren. U betaalt een vaste maandelijkse all-in prijs inclusief onderhoud, verzekering en wegenheffing. Er is geen grote aanschaf en u rijdt altijd in een nieuw of bijna-nieuw voertuig. Stefan berekent graag een maandprijs op maat."

  - question: "Kunnen jullie ook schade herstellen?"
    answer: "Onze serviceafdeling verzorgt kleine schadeherstelwerkzaamheden en coördineert bij grotere schades met erkende carrosseriebedrijven in onze regio. Wij regelen ook het contact met uw verzekeraar als u een schade wilt declareren."


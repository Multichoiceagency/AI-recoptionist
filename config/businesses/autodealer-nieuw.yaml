after_hours_message: |
  U heeft AutoDeal Showroom Tilburg bereikt buiten onze openingstijden. Onze showroom is open
  van maandag tot en met woensdag en vrijdag van 9 tot 18 uur, donderdag tot 20 uur, zaterdag
  van 9 tot 17 uur en zondag van 12 tot 17 uur. U kunt ons actuele aanbod bekijken via
  autodeal-tilburg.nl. Laat uw naam en telefoonnummer achter en wij bellen u de volgende
  werkdag zo snel mogelijk terug.


faqs:
  - question: "Vanaf welke leeftijd kunnen kinderen beginnen met muziekles?"
    answer: "Voor piano en keyboard adviseren we vanaf 5 jaar. Gitaar is het meest geschikt vanaf 6 à 7 jaar. Viool kan al vanaf 3-4 jaar met de Suzuki-methode. Zang starten we doorgaans niet voor de leeftijd van 10 jaar vanwege de stemcontrole. Onze groepslessen zijn ideaal als eerste kennismaking voor 6-10 jarigen."
  - question: "Hoelang duurt het voordat ik een lied kan spelen?"
    answer: "Bij gitaar kun je al na 2 à 3 maanden eenvoudige nummers spelen. Piano duurt iets langer — na 4 à 6 maanden speel je herkenbare melodieën. Iedereen leert anders, maar de motivatie en oefenfrequentie thuis bepalen het tempo. We richten ons altijd op plezier en snelle successen."
  - question: "Moet ik thuis een instrument hebben?"
    answer: "Ja, dagelijks oefenen (minimaal 15 minuten) is essentieel voor progressie. Voor piano raden we een digitale piano aan met gewogen toetsen (€200-€400). Wij adviseren u graag welk instrument het beste bij uw situatie past en hebben contacten bij lokale muziekwinkels."
  - question: "Geven jullie ook lessen aan volwassenen?"
    answer: "Ja zeker, we hebben veel volwassen leerlingen van alle leeftijden. Leeftijd is geen belemmering voor muziek leren. Volwassenen leren doorgaans sneller dan kinderen dankzij betere concentratie en motivatie. We passen het programma aan op uw doelen, of u nu wilt spelen voor uw eigen plezier of examen wilt doen."
  - question: "Hoe werkt de gratis proefles?"
    answer: "U belt of mailt ons en we plannen een gratis proefles van 30 minuten in met de docent van uw keuze. U ervaart de lesaanpak en stijl van de docent, en de docent maakt een eerste inschatting van uw niveau. Geen verplichtingen — u beslist daarna of u wilt inschrijven."
  - question: "Bereiden jullie leerlingen ook voor op muziekexamens?"
    answer: "Ja, we bereiden leerlingen voor op ABRSM-gradeexamens (Grade 1 tot 8) voor piano, gitaar en viool, en Rockschool certificaten voor gitaar, drums en zang. Voor aspirant-conservatoriumstudenten bieden we speciale voorbereidingstrajecten aan."
  - question: "Wat kost muziekles bij jullie?"
    answer: "Een individuele les van 30 minuten per week kost €65 per maand. Een les van 45 minuten kost €90 per maand en een uur-les €120 per maand. Groepslessen (max 6 leerlingen) kosten €45 per maand. We bieden altijd een gratis proefles én een 4-weken geld-terug-garantie voor nieuwe leerlingen."
  - question: "Organiseren jullie ook optredens of concerten?"
    answer: "Ja! Elk jaar in juni organiseren we ons grote schoolconcert in het Delft Muziekcentrum. Alle leerlingen mogen optreden, van absolute beginner tot gevorderd. Dit is een prachtig moment voor leerlingen om hun progressie te laten zien en voor de hele familie om trots te zijn. Kaartjes zijn gratis voor familie."


faqs:
  - question: "Heb ik een verwijzing nodig om de oogarts te bezoeken?"
    answer: "Ja, voor een vergoede afspraak bij de oogarts heeft u een verwijsbrief van uw huisarts nodig. Voor optometrie en contactlenscontroles heeft u geen verwijzing nodig."
  - question: "Wat zijn de symptomen die ik direct moet laten onderzoeken?"
    answer: "Ga direct naar de spoedeisende hulp of bel ons bij: plotseling verminderd zicht, nieuwe lichtflitsen of zwarte vlekjes, een rood pijnlijk oog, of na een oogletsel."
  - question: "Worden oogheelkundige behandelingen vergoed?"
    answer: "Medisch noodzakelijke oogheelkundige behandelingen worden vergoed via de basisverzekering na aftrek van het eigen risico. Optometrie en contactlenzen vallen onder aanvullende verzekering."
  - question: "Wat is een staaroperatie?"
    answer: "Een staaroperatie (cataractoperatie) is een ingreep waarbij de troebele ooglens wordt vervangen door een kunstlens. Het is een veelvoorkomende en veilige poliklinische ingreep met snelle hersteltijd."
  - question: "Is laserbehandeling voor bijziendheid geschikt voor mij?"
    answer: "Niet iedereen is geschikt voor laserbehandeling. We voeren een uitgebreide voormeting uit om de geschiktheid te bepalen. Factoren als corneatopografie, dikte en stabiliteit van het gezichtsvermogen spelen mee."
  - question: "Wat doet een optometrist en wanneer ga ik naar een oogarts?"
    answer: "Een optometrist meet uw gezichtsvermogen en stelt brilrecepten op. Bij medische oogklachten of afwijkende bevindingen verwijst Inge u door naar Dr. Smits, de oogarts."
  - question: "Bieden jullie ook contactlenzen voor kinderen aan?"
    answer: "Ja, Roos is gespecialiseerd in orthokeratologie — nachtlenzen die bijziendheid bij kinderen stabiliseren. Dit is een populaire en veilige optie voor kinderen vanaf circa 8 jaar."
  - question: "Hoe vaak moet ik een oogcontrole laten doen?"
    answer: "Voor de meeste mensen adviseren we een controle elke 2 jaar. Mensen met diabetes, glaucoom in de familie, hoge bloeddruk of bepaalde medicatie hebben baat bij jaarlijkse controles."
  - question: "Kan ik ook terecht voor een second opinion?"
    answer: "Ja, Dr. Smits biedt second opinions aan voor oogheelkundige diagnoses. Neem uw eerdere onderzoeksuitslagen en verwijsbrief mee."
  - question: "Hoe lang duurt een standaard oogonderzoek bij de optometrist?"
    answer: "Een volledig oogonderzoek inclusief brilrecept duurt ongeveer 45 minuten. Na afloop krijgt u een volledig verslag en eventueel een doorverwijzing."


after_hours_message: |
  Oogzorgcentrum Nederland is momenteel gesloten. Onze openingstijden zijn maandag tot en met
  donderdag van 08:30 tot 17:30 en vrijdag van 08:30 tot 16:00.
  Heeft u een acuut oogprobleem zoals plotseling verlies van gezichtsvermogen, lichtflitsen of
  een oogletsel? Ga dan direct naar de spoedeisende hulp van het dichtstbijzijnde ziekenhuis.
  Voor niet-urgente vragen kunt u een bericht inspreken — wij nemen de volgende werkdag contact op.


faqs:
  - question: "Wat kost een eindschoonmaak bij jullie?"
    answer: "De kosten voor een eindschoonmaak berekenen we op basis van de oppervlakte van de woning. Gemiddeld kost een standaard woning van 80 m² tussen de €350 en €500 inclusief BTW. We geven garantie: als de inspectie niet slaagt, komen wij gratis terug."
  - question: "Hebben jullie ook vaste schoonmaakhulp voor thuis?"
    answer: "Ja, we bieden wekelijkse of tweewekelijkse huishoudelijke hulp. U krijgt altijd dezelfde schoonmaakster voor continuïteit en vertrouwen. We werken ook met PGB-indicaties. Een intakegesprek is altijd gratis en vrijblijvend."
  - question: "Doen jullie ook kantoorschoonmaak voor bedrijven?"
    answer: "Zeker, we verzorgen kantoorschoonmaak voor bedrijven van alle groottes. Van dagelijkse schoonmaak tot wekelijks onderhoud. We stellen een maatwerkcontract op met vaste prijsafspraken. Vraag naar een gratis offerte op locatie."
  - question: "Wat houdt jullie tevredenheidsgarantie in?"
    answer: "Als u na onze schoonmaak niet tevreden bent, melden we ons gratis terug voor herreiniging van de onderdelen die niet aan uw verwachting voldeden. Bij eindschoonmaak: als de inspectiekeuring niet slaagt, komen we gratis terug. Uw tevredenheid staat voorop."
  - question: "Kunnen jullie ook tapijten reinigen?"
    answer: "Ja, we reinigen tapijten met professionele stoomextractie of droge poedermethode, afhankelijk van het tapijt. Vlekken, huisstofmijt en geuren worden effectief verwijderd. Prijs is vanaf €6 per m². We adviseren u graag welke methode het beste is voor uw tapijt."
  - question: "Werken jullie ook in de avond of in het weekend?"
    answer: "Voor kantoorschoonmaak werken we ook 's avonds of in het weekend zodat uw bedrijf er 's ochtends fris bij staat. Voor particuliere schoonmaak zijn we beschikbaar van maandag t/m zaterdag. Bespreek uw wensen met onze planning."
  - question: "Zijn jullie schoonmaaksters betrouwbaar?"
    answer: "Al ons personeel is gescreend, beschikt over een Verklaring Omtrent Gedrag (VOG) en draagt zichtbare bedrijfskleding met ID-badge. We zijn volledig verzekerd tegen schade. Teamleider Fatima superviseert alle werkzaamheden."
  - question: "Doen jullie ook ramen wassen bij hoog werk?"
    answer: "Ja, glazenwasser Hassan werkt met telescopische stokken en een professioneel zuiver-watersysteem tot een hoogte van 12 meter. Voor hogere gebouwen werken we samen met gecertificeerde touwklimmers. Geen stellage of hijskraan nodig voor de meeste woningen."


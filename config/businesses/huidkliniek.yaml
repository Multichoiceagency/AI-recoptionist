faqs:
  - question: "Heb ik een verwijzing nodig voor een bezoek aan de dermatoloog?"
    answer: "Voor medische dermatologie en vergoeding via de zorgverzekering heeft u een verwijsbrief van uw huisarts nodig. Voor esthetische behandelingen heeft u geen verwijzing nodig."
  - question: "Worden esthetische behandelingen vergoed door de zorgverzekering?"
    answer: "Esthetische behandelingen zoals botox, fillers en laserbehandelingen voor esthetische doeleinden worden niet vergoed door de zorgverzekering. Medische dermatologische consulten bij Dr. Hoekstra worden wel vergoed met verwijzing."
  - question: "Wat kan ik verwachten van een botox-behandeling?"
    answer: "Botox vermindert dynamische rimpels zoals voorhoofdplooien en kraaienpootjes. Het resultaat is zichtbaar na 5-10 dagen en duurt gemiddeld 3-4 maanden. De behandeling is snel en relatief pijnloos."
  - question: "Is laserbehandeling pijnlijk?"
    answer: "De meeste laserbehandelingen worden als licht oncomfortabel ervaren, vergelijkbaar met een elastiekje dat op de huid klikt. Marie past de instellingen aan op uw huidtype en tolerantie."
  - question: "Hoe lang duurt het voor ik resultaat zie bij acnebehandeling?"
    answer: "Resultaten zijn afhankelijk van de ernst van de acne. Bij medische behandeling door Dr. Hoekstra is na 6-8 weken vaak verbetering zichtbaar. Bij huidtherapie door Loes ziet u meestal resultaat na 3-6 behandelingen."
  - question: "Kunnen jullie ook moedervlekken controleren?"
    answer: "Ja, Dr. Hoekstra voert dermoscopisch huidkankerscreening uit. Dit is een nauwkeurige visuele beoordeling van moedervlekken en huidafwijkingen. Een verwijzing van de huisarts is voor vergoeding vereist."
  - question: "Wat is meso-therapie en voor wie is het geschikt?"
    answer: "Meso-therapie is een behandeling waarbij kleine hoeveelheden voedingsstoffen in de huid worden geïnjecteerd voor een stralende, gevitaliseerde huid. Het is geschikt voor mensen die hun algehele huidkwaliteit willen verbeteren."
  - question: "Kan ik ook terecht voor permanente ontharing?"
    answer: "Ja, Marie is gespecialiseerd in laserbehandeling voor definitieve haarverwijdering. Dit werkt voor alle huidtypes. We adviseren een intakegesprek om de geschiktheid en het aantal benodigde sessies te bepalen."
  - question: "Hoe moet ik mij voorbereiden op een laserbehandeling?"
    answer: "Vermijd gedurende 4 weken voor de behandeling zonblootstelling en gebruik geen bruiningsmiddelen of zonnebank. Informeer ons over medicijngebruik. Verdere instructies ontvangt u bij het inplannen."
  - question: "Bieden jullie ook een gratis intake aan?"
    answer: "Ja, voor esthetische behandelingen bieden we een vrijblijvend intakegesprek aan waarbij Loes of Marie uw huid beoordeelt en een persoonlijk behandeladvies geeft. Bel ons om dit in te plannen."


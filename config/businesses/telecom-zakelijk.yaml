after_hours_message: |
  U heeft BizTelecom Oplossingen bereikt buiten onze kantooruren. Ons kantoor is bereikbaar maandag tot en met
  donderdag van 08:30 tot 17:30 uur en vrijdag van 08:30 tot 17:00 uur. Bij een actieve telefoniestoring kunt u
  onze 24/7 support bereiken via het nummer op uw contract of via support@biztelecom.nl. Wilt u een bericht
  achterlaten? Wij nemen dan de eerstvolgende werkdag contact met u op.


faqs:
  - question: "Wat is VoIP en is dat beter dan mijn huidige vaste lijn?"
    answer: "VoIP staat voor Voice over IP — dat betekent bellen via het internet. Het grote voordeel is lagere kosten, meer flexibiliteit en eenvoudige integratie met systemen zoals Microsoft Teams. We zetten uw huidige nummers gewoon over, u merkt geen verschil qua bereikbaarheid."
  - question: "Kunnen jullie onze telefonie in Microsoft Teams integreren?"
    answer: "Absoluut. Teams Telefonie is een van onze kernproducten. Via Direct Routing koppelen we uw bestaande nummers aan Teams, zodat u via de Teams-app kunt bellen en gebeld worden — op desktop, laptop én telefoon."
  - question: "Wat gebeurt er met mijn nummer als ik overstapt?"
    answer: "Uw bestaande nummers nemen wij mee via nummerportabiliteit. Dit is wettelijk geregeld en kost u niets extra. De migratie plannen we altijd op een rustig moment, zodat er geen onderbreking is in uw bereikbaarheid."
  - question: "Hebben jullie ook een 24/7 storingsdienst?"
    answer: "Ja, onze 24/7 Support Desk is altijd bereikbaar voor actieve storingen. We monitoren uw telefonieomgeving proactief, waardoor we storingen vaak al oplossen voordat u er last van heeft. U ontvangt het storingsnummer bij het ingaan van uw contract."
  - question: "Wat kost een zakelijke telefooncentrale bij BizTelecom?"
    answer: "Onze hosted centrales starten vanaf een vast bedrag per gebruiker per maand, inclusief onderhoud en updates. De exacte prijs hangt af van het aantal gebruikers, functies en toestellen. Joris stelt graag een vrijblijvende offerte op na een kort adviesgesprek."
  - question: "Kan ik ook een 088 of 0800 nummer bij jullie aanvragen?"
    answer: "Ja, we leveren nationale nummers zoals 088-nummers, 085-nummers en gratis 0800-nummers. We regelen de aanvraag en koppeling met uw centrale volledig voor u. Vermeldt u welk type nummer u zoekt, dan kijken we direct naar de beschikbaarheid."
  - question: "Hoe snel kunnen jullie iets installeren?"
    answer: "Voor een eenvoudige VoIP-aansluiting zijn we vaak al binnen een week actief. Een volledige PBX-installatie op locatie plannen we in overleg in, doorgaans binnen twee tot drie weken na ondertekening. Urgente situaties bekijken we altijd met prioriteit."
  - question: "Zijn er verborgen kosten?"
    answer: "Nee. BizTelecom hanteert transparante tarieven. U ontvangt één factuur per maand met alle kosten gespecificeerd. Er zijn geen activeringskosten, geen verrassende toelagen en de opzegtermijn staat helder in uw contract."
  - question: "Wat als onze internetverbinding uitvalt — werkt de telefonie dan nog?"
    answer: "We adviseren klanten altijd om een redundante internetverbinding te hebben. Daarnaast kunnen we failover-instellingen configureren, zodat bij een internet-uitval oproepen automatisch worden doorgeschakeld naar uw mobiel of een back-uplijn."


faqs:
  - question: "Wat moeten wij doen als iemand is overleden?"
    answer: "In de eerste plaats hoeft u nergens aan te denken. Bel ons en wij nemen alle stappen voor u op ons. We regelen het afhalen van uw dierbare, verzorgen de aangifte en begeleiden u in alles wat er moet gebeuren. U hoeft dit niet alleen te doen."
  - question: "Zijn jullie ook 's nachts bereikbaar?"
    answer: "Ja, wij zijn 24 uur per dag en 7 dagen per week bereikbaar, ook in het weekend en op feestdagen. Er is altijd iemand van ons team beschikbaar om u op te vangen en de eerste stappen samen te zetten."
  - question: "Hoe snel kunnen jullie komen na een overlijden?"
    answer: "Na uw melding sturen wij zo snel mogelijk een begeleider. Afhankelijk van de locatie zijn wij er doorgaans binnen een tot twee uur. We laten u van tevoren weten wanneer we precies aankomen."
  - question: "Kunnen wij zelf invulling geven aan de uitvaart?"
    answer: "Absoluut. Wij geloven dat elke uitvaart zo persoonlijk mogelijk moet zijn. Uw wensen, herinneringen, muziekkeuzes, locatiewensen en culturele of religieuze tradities staan altijd centraal. Uw begeleider neemt de tijd om alles goed te bespreken."
  - question: "Wat is het verschil tussen begraven en cremeren?"
    answer: "Bij een begrafenis wordt de overledene in de grond bijgezet, bij een crematie wordt de overledene gecremeerd. Beide kunnen gepaard gaan met een persoonlijke afscheidsdienst. Wij begeleiden u bij beide keuzes en geven u alle informatie om rustig een beslissing te nemen."
  - question: "Kunnen jullie ook een uitvaart in een andere religie of cultuur begeleiden?"
    answer: "Ja, wij hebben ervaring met uitvaarten voor verschillende culturele en religieuze achtergronden, waaronder islamitische, hindoestaanse, joodse en christelijke tradities. Uw wensen en gebruiken worden altijd gerespecteerd en centraal gesteld."
  - question: "Hoe gaat de afhandeling van een uitvaartverzekering?"
    answer: "Onze administratie verzorgt de communicatie met uw uitvaartverzekeraar. Wij regelen de declaratie en zorgen dat de papieren in orde zijn. U hoeft zich daar geen zorgen over te maken — wij nemen dit volledig van u over."
  - question: "Kunnen nabestaanden op afstand meekijken via een livestream?"
    answer: "Ja, wij bieden de mogelijkheid om de uitvaartdienst via een beveiligde livestream te volgen, zodat familieleden en vrienden die niet aanwezig kunnen zijn toch betrokken zijn bij het afscheid. Dit regelen wij voor u."
  - question: "Wat als wij nog niet weten wat wij willen?"
    answer: "Dat is volkomen begrijpelijk. Neemt u de tijd die u nodig heeft. Ons team staat klaar om u op uw eigen tempo te begeleiden. Er zijn geen beslissingen die onmiddellijk genomen hoeven te worden — op het eerste en dringendste na. Wij zijn er voor u."


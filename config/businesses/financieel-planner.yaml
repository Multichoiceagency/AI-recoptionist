faqs:
  - question: "Wat is een integraal financieel plan?"
    answer: "Een integraal financieel plan brengt alle aspecten van uw financiën in kaart: uw huidige vermogen en schulden, toekomstige inkomsten (pensioen, AOW), risico's (overlijden, arbeidsongeschiktheid), doelen (woning, studie kinderen, eerder stoppen met werken) en de optimale strategie om die doelen te bereiken. Alex maakt dit plan persoonlijk voor u op."
  - question: "Hoe werkt vermogensbeheer bij FinancePlanner Pro?"
    answer: "Renske stelt samen met u een beleggingsprofiel op gebaseerd op uw doelen, tijdshorizon en risicobereidheid. Vervolgens wordt een gediversifieerde beleggingsportefeuille samengesteld en periodiek heroverwogen. U ontvangt kwartaalrapportages en bent altijd welkom voor een voortgangsgesprek."
  - question: "Ik ben zzp'er, hoe regel ik mijn pensioen?"
    answer: "Als zzp'er bouwt u geen pensioen op via een werkgever. U kunt zelf pensioen opbouwen via een lijfrentepolis, bankspaarrekening (lijfrente) of door gebruik te maken van de Fiscale Oudedagsreserve (FOR). Onze pensioenspecialist berekent uw pensioentekort en adviseert de beste oplossing voor uw situatie."
  - question: "Hoeveel kan ik belastingvrij schenken aan mijn kinderen?"
    answer: "In 2024 kunt u per kind jaarlijks circa 6600 euro belastingvrij schenken. Er zijn verhoogde vrijstellingen voor studie (maximaal circa 66.000 euro eenmalig) en vroegere eigen woning. De regels veranderen regelmatig; Alex houdt u op de hoogte van de actuele mogelijkheden en de optimale schenkingsstrategie."
  - question: "Wat is pensioenverevening bij echtscheiding?"
    answer: "Bij echtscheiding heeft uw ex-partner in beginsel recht op de helft van het ouderdomspensioen dat tijdens het huwelijk is opgebouwd (pensioenverevening). Dit kan complex zijn bij meerdere pensioenregelingen. Wij brengen de financiële gevolgen van uw scheiding volledig in kaart en adviseren u over de beste aanpak."
  - question: "Wat is het verschil tussen een CFP en een gewone financieel adviseur?"
    answer: "Een Certified Financial Planner (CFP) heeft een internationaal erkende certificering en voldoet aan strenge kennis-, ethiek- en praktijkvereisten. CFP'ers hanteren een integrale aanpak waarbij alle financiële aspecten worden meegenomen. Alex is gecertificeerd CFP en lid van de Financial Planning Association Netherlands (FPAN)."
  - question: "Hoe onafhankelijk zijn jullie adviseurs?"
    answer: "FinancePlanner Pro werkt volledig onafhankelijk. Wij ontvangen geen provisie van banken, verzekeraars of andere financiële instellingen. Onze inkomsten bestaan uitsluitend uit het door u betaalde advieshonorarium. Dit garandeert dat ons advies altijd in uw belang is."
  - question: "Wat kost financiële planning bij jullie?"
    answer: "Ons intakegesprek is gratis en vrijblijvend. De kosten voor een volledig financieel plan zijn afhankelijk van de complexiteit van uw situatie. Wij werken op basis van een vast honorarium dat wij vooraf transparant communiceren. U heeft altijd inzicht in de kosten voordat u een opdracht verstrekt."
  - question: "Hoe vaak moeten wij ons financieel plan bijwerken?"
    answer: "Wij adviseren minimaal één keer per jaar een voortgangsgesprek om uw plan bij te stellen op basis van veranderingen in uw leven (inkomen, gezin, wetgeving, marktontwikkelingen). Bij grote levensgebeurtenissen (geboorte, erfenis, scheiding, pensioen) plannen wij direct een evaluatiegesprek in."


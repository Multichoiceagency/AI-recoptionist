faqs:
  - question: "Heb ik een verwijzing nodig van de huisarts?"
    answer: "Nee, voor fysiotherapie heeft u geen verwijzing nodig. U kunt direct een afspraak maken. Voor vergoeding door uw aanvullende verzekering is ook geen verwijzing vereist."
  - question: "Vergoedt mijn zorgverzekering de fysiotherapie?"
    answer: "Fysiotherapie wordt vergoed vanuit de aanvullende verzekering. Hoeveel behandelingen vergoed worden hangt af van uw polis. Bij bepaalde chronische aandoeningen valt fysiotherapie onder de basisverzekering."
  - question: "Wat moet ik meenemen naar de eerste afspraak?"
    answer: "Neem mee: uw legitimatiebewijs, verzekeringspas, eventuele verwijsbrief van huisarts of specialist, en comfortabele kleding om in te bewegen."
  - question: "Hoe lang duurt een behandeling?"
    answer: "De eerste intake-afspraak duurt 45 tot 60 minuten. Vervolgbehandelingen duren 30 tot 45 minuten afhankelijk van de behandeling."
  - question: "Behandelen jullie ook sportblessures?"
    answer: "Ja, Tom is onze gespecialiseerde sportfysiotherapeut. Hij behandelt alle soorten sportblessures, voert loopanalyses uit en begeleidt het terugkeertraject naar sport."
  - question: "Wat is droge naaldtherapie?"
    answer: "Droge naaldtherapie (dry needling) is een techniek waarbij dunne naalden in gespannen spierpunten worden geplaatst om pijn en spierspanning te verminderen. Het is effectief bij chronische spierpijn."
  - question: "Bieden jullie ook bekkenfysiotherapie aan?"
    answer: "Ja, we bieden gespecialiseerde bekkenfysiotherapie aan, onder andere voor bekkenbodemklachten, diastase na zwangerschap en postnatale revalidatie. Vraag naar beschikbaarheid."
  - question: "Kan ik ook 's avonds een afspraak maken?"
    answer: "Ja, we zijn op maandag tot en met donderdag geopend tot 19:00 uur, zodat u ook na werktijd terecht kunt."
  - question: "Hoe lang duurt een gemiddeld behandeltraject?"
    answer: "Een gemiddeld traject duurt 6 tot 12 sessies, afhankelijk van de klacht en uw persoonlijk herstel. Na de intake geeft de therapeut een indicatie van het verwachte traject."
  - question: "Geven jullie ook thuisoefeningen mee?"
    answer: "Ja, alle therapeuten werken met een digitale oefenapp. U ontvangt uw persoonlijke oefenprogramma direct op uw smartphone of tablet."


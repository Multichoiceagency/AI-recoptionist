after_hours_message: |
  Huisartsenpraktijk Centrum is momenteel gesloten. Onze openingstijden zijn maandag tot en met
  vrijdag van 08:00 tot 17:00 uur. Voor medische spoedvragen buiten openingstijden kunt u de
  huisartsenpost bellen via 0900-8844. Bij levensbedreigende situaties belt u altijd 112.
  Wilt u een niet-spoedeisend bericht achterlaten? Dan nemen wij de volgende werkdag contact met u op.


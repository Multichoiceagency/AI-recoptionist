faqs:
  - question: "Hoe maak ik een afspraak bij de huisarts?"
    answer: "U kunt bellen op werkdagen van 08:00 tot 17:00 uur. Voor niet-urgente zaken kunt u ook online een afspraak maken via ons patiëntenportaal MijnGezondheid.net."
  - question: "Kan ik een telefonisch consult aanvragen?"
    answer: "Ja, Dr. De Vries heeft elke werkdag een telefonisch spreekuur van 08:00 tot 09:00 uur. Bel ons voor aanvang zodat wij u kunnen inplannen."
  - question: "Hoe vraag ik een herhaalrecept aan?"
    answer: "U kunt een herhaalrecept aanvragen via ons patiëntenportaal of door te bellen. Wij verwerken dit binnen 2 werkdagen. Houd rekening met voldoende aanvraagtijd."
  - question: "Wanneer moet ik 112 bellen in plaats van de huisarts?"
    answer: "Bel 112 bij levensbedreigende situaties: benauwdheid, pijn op de borst, bewusteloosheid, beroerte (FAST-verschijnselen), ernstig trauma of bloedverlies."
  - question: "Hoe kom ik in contact buiten openingstijden?"
    answer: "Buiten openingstijden kunt u de huisartsenpost bellen via 0900-8844. Bij spoed belt u 112."
  - question: "Ik wil me inschrijven als nieuwe patiënt, hoe werkt dat?"
    answer: "U kunt contact opnemen met onze administratie. We bekijken of we nieuwe patiënten kunnen aannemen in uw postcodegebied en sturen u een inschrijfformulier toe."
  - question: "Wat is een praktijkondersteuner (POH) en wanneer word ik doorverwezen?"
    answer: "Anita is onze praktijkondersteuner en specialiseert zich in chronische aandoeningen zoals diabetes, COPD en hart- en vaatziekten. Dr. De Vries verwijst u door als dat passend is."
  - question: "Kan ik ook een huisbezoek aanvragen?"
    answer: "Huisbezoeken zijn mogelijk voor patiënten die niet mobiel zijn. Bel ons vroeg in de ochtend zodat we dit kunnen inplannen. De triagist beoordeelt de noodzaak."
  - question: "Hoe kan ik mijn uitslagen inzien?"
    answer: "Uitslagen van bloedonderzoek en andere onderzoeken kunt u inzien via ons online patiëntenportaal MijnGezondheid.net. We sturen u ook een berichtje als uitslagen beschikbaar zijn."
  - question: "Wat is het inloopspreekuur?"
    answer: "Op maandag, woensdag en vrijdag kunt u van 08:00 tot 08:30 inlopen voor één acute, enkelvoudige klacht. Geen afspraak nodig, wel op volgorde van binnenkomst."

messages:

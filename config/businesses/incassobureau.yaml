after_hours_message: |
  Incasso Nederland B.V. is momenteel gesloten. Onze kantooruren zijn maandag tot en met
  donderdag van 09:00 tot 17:30 uur en vrijdag van 09:00 tot 17:00 uur. Spreek uw naam,
  telefoonnummer en dossiernummer (indien bekend) in na de pieptoon. Wij nemen de eerstvolgende
  werkdag contact met u op. Voor betalingen kunt u ook buiten kantooruren betalingen verrichten
  via de betaallink die u heeft ontvangen.


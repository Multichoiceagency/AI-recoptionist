faqs:
  - question: "Hoe meld ik een vordering aan?"
    answer: "U kunt een vordering aanmelden via ons online portaal, per e-mail of telefonisch. Wij hebben nodig: de volledige personalia van de debiteur, het openstaande bedrag, factuurdata en eventuele correspondentie. Na ontvangst starten wij direct met het incassotraject en informeren wij u via ons portaal."
  - question: "Wat zijn de incassokosten voor de debiteur?"
    answer: "De wettelijke incassokosten zijn vastgelegd in de Wet incassokosten (WIK) en worden berekend op basis van een staffel over de hoofdsom. Voor vorderingen tot 2500 euro bedraagt dit maximaal 40 tot 375 euro exclusief btw. Boven de 2500 euro gelden lagere percentages. De debiteur is deze kosten verschuldigd naast de hoofdsom."
  - question: "Wat is no cure no pay?"
    answer: "Bij no cure no pay ontvangt u alleen een factuur van ons als wij de vordering succesvol innen. Onze vergoeding is dan een percentage van het geïnde bedrag. Dit model is met name geschikt voor particuliere vorderingen. Voor zakelijke vorderingen bieden wij ook andere tariefstructuren aan."
  - question: "Hoe lang duurt een incassotraject?"
    answer: "De minnelijke fase duurt gemiddeld vier tot acht weken. Als de debiteur niet betaalt, adviseren wij over gerechtelijke stappen. Een gerechtelijke procedure via de kantonrechter duurt gemiddeld zes tot twaalf weken. Bij verstek (debiteur reageert niet) kan dit sneller verlopen."
  - question: "Ik heb een aanmaningsbrief ontvangen, wat moet ik doen?"
    answer: "Als u een aanmaningsbrief van ons heeft ontvangen, adviseren wij u zo snel mogelijk contact op te nemen. Wij staan open voor overleg over de vordering en het treffen van een betalingsregeling. Hoe eerder u contact opneemt, hoe meer mogelijkheden er zijn om verdere stappen te voorkomen."
  - question: "Kan een vordering ook worden betwist?"
    answer: "Ja, als u meent dat de vordering onterecht of onjuist is, kunt u dit kenbaar maken bij ons. Wij beoordelen uw bezwaar en stellen de opdrachtgever in kennis. Bij een inhoudelijk geschil verwijzen wij beide partijen eventueel door naar een juridische procedure. U behoudt altijd het recht op verweer."
  - question: "Wat is executoriaal beslag?"
    answer: "Executoriaal beslag is een juridische maatregel waarbij na een rechterlijk vonnis beslag wordt gelegd op het inkomen, de bankrekening of eigendommen van de debiteur. Dit vereist een executoriale titel (vonnis). Ons Legal Department begeleidt dit volledige proces."
  - question: "Kunnen jullie ook internationaal incasseren?"
    answer: "Ja, wij incasseren ook vorderingen op debiteuren in andere EU-landen via de Europese Executoriale Titel (EEO) of de Europese Betalingsbevelprocedure. Voor landen buiten de EU werken wij samen met een netwerk van internationale incassopartners. Neem contact op voor de mogelijkheden in uw specifieke situatie."

messages:
